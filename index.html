/* Option Statistics — aggregate put/call ratio and IV skew. These are synthesized from the
   stock's volatility tier for now (placeholder, matching the same causal scaling used in the
   options chain mockups); once the real per-strike order flow engine exists (Steps 1-4 of the
   plan), this should aggregate ACTUAL call/put volume and IV across that stock's chain instead
   of being derived indirectly like this. */
/* Option Statistics (bugfix from the audit document) — aggregates REAL accumulated volume from
   optionMarketState across every strike/expiration for this stock, instead of re-rolling random
   numbers on every render. Volume here can only ever grow within a session; what visibly shifts
   tick to tick is the call/put SENTIMENT split (ASK-side = aggressive/bullish-for-calls flow,
   BID-side = passive/bearish-for-calls flow), exactly per the spec's "sentiment, not the totals,
   should fluctuate" correction. */
function computeOptionStats(stock){
  if(!stock) return { putCallRatio: 1, ivSkewPct: 0, totalCallVol: 0, totalPutVol: 0, impliedVol: 0 };
  let totalCallVol = 0, totalPutVol = 0, callAskVol = 0, callBidVol = 0, putAskVol = 0, putBidVol = 0, ivSum = 0, ivCount = 0;
  EXPIRATIONS.forEach(expiry=>{
    const strikes = getStrikesForChain(stock, expiry.key);
    strikes.forEach(strike=>{
      const callRow = optionMarketState[contractStateKey(stock.sym, strike, 'call', expiry.key)];
      const putRow = optionMarketState[contractStateKey(stock.sym, strike, 'put', expiry.key)];
      if(callRow){ totalCallVol += callRow.volume; callAskVol += callRow.buyVolume||0; callBidVol += callRow.sellVolume||0; ivSum += callRow.iv; ivCount++; }
      if(putRow){ totalPutVol += putRow.volume; putAskVol += putRow.buyVolume||0; putBidVol += putRow.sellVolume||0; ivSum += putRow.iv; ivCount++; }
    });
  });
  const putCallRatio = totalCallVol > 0 ? +(totalPutVol/totalCallVol).toFixed(2) : 0;
  // sentiment skew: aggressive call buying (ask) + aggressive put selling (bid) = bullish skew, and vice versa
  const bullishFlow = callAskVol + putBidVol, bearishFlow = callBidVol + putAskVol;
  const totalFlow = bullishFlow + bearishFlow;
  const ivSkewPct = totalFlow > 0 ? +(((bullishFlow-bearishFlow)/totalFlow)*100).toFixed(1) : 0;
  const impliedVol = ivCount > 0 ? ivSum/ivCount : { low:18, med:28, high:45, extreme:75 }[stock.volatility];
  return { putCallRatio, ivSkewPct, totalCallVol, totalPutVol, impliedVol };
}
function renderOptionStats(stock){
  const grid = document.getElementById('optStatsGrid');
  const ratioBar = document.getElementById('optRatioBar');
  const ratioLabels = document.getElementById('optRatioLabels');
  if(!grid) return;
  const stats = computeOptionStats(stock);
  const isCallSkew = stats.ivSkewPct >= 0;
  grid.innerHTML = `
    <div class="opt-stat"><div class="lbl">Put/Call Ratio</div><div class="val">${stats.putCallRatio.toFixed(2)}</div></div>
    <div class="opt-stat"><div class="lbl">IV Implícita</div><div class="val">${stats.impliedVol.toFixed(1)}%</div></div>
    <div class="opt-stat"><div class="lbl">IV Skew</div><div class="val ${isCallSkew?'skew-call':'skew-put'}">${isCallSkew?'+':''}${stats.ivSkewPct.toFixed(1)}% ${isCallSkew?'(calls)':'(puts)'}</div></div>
    <div class="opt-stat"><div class="lbl">Vol. Total Hoy</div><div class="val">${fmtVol(stats.totalCallVol+stats.totalPutVol)}</div></div>`;
  const totalVol = stats.totalCallVol + stats.totalPutVol;
  const callPct = (stats.totalCallVol/totalVol)*100;
  ratioBar.innerHTML = `<div class="call-fill" style="width:${callPct}%"></div><div class="put-fill" style="width:${100-callPct}%"></div>`;
  ratioLabels.innerHTML = `<span style="color:var(--bid)">Calls ${fmtVol(stats.totalCallVol)}</span><span style="color:var(--ask)">Puts ${fmtVol(stats.totalPutVol)}</span>`;
}

<script>
/* ================================================================
   MARKET PHASE ENGINE — produces organic price patterns
   
   Instead of drawing patterns directly, this engine creates the
   MARKET CONDITIONS that cause patterns to emerge naturally:
   
   Bull Flag    = Impulse → controlled profit-taking → buyers defend → breakout
   Bear Flag    = Impulse down → weak bounce → sellers return → continuation
   Triangle     = Compression: buyers and sellers converge, spread tightens
   Double Top   = Price reaches resistance → institutional selling → retry → fail
   H&S          = Three pushes with decreasing volume on right shoulder
   Accumulation = Institutions absorb supply quietly at low prices
   Distribution = Institutions offload into strength quietly
   
   The pattern emerges from order flow. The engine never "draws" it.
   ================================================================ */

const MARKET_PHASES = {
  IMPULSE_UP:      { duration: [15,40],  next: ['PULLBACK','CONSOLIDATION'] },
  IMPULSE_DOWN:    { duration: [15,40],  next: ['BOUNCE','CONSOLIDATION'] },
  PULLBACK:        { duration: [10,30],  next: ['IMPULSE_UP','CONSOLIDATION','REVERSAL_DOWN'] },
  BOUNCE:          { duration: [10,30],  next: ['IMPULSE_DOWN','CONSOLIDATION','REVERSAL_UP'] },
  CONSOLIDATION:   { duration: [20,60],  next: ['IMPULSE_UP','IMPULSE_DOWN','COMPRESSION'] },
  COMPRESSION:     { duration: [15,45],  next: ['IMPULSE_UP','IMPULSE_DOWN'] },
  ACCUMULATION:    { duration: [30,80],  next: ['IMPULSE_UP'] },
  DISTRIBUTION:    { duration: [30,80],  next: ['IMPULSE_DOWN'] },
  REVERSAL_UP:     { duration: [10,25],  next: ['IMPULSE_UP','CONSOLIDATION'] },
  REVERSAL_DOWN:   { duration: [10,25],  next: ['IMPULSE_DOWN','CONSOLIDATION'] },
};

// Phase transition weights — realistic market behavior
const PHASE_TRANSITIONS = {
  IMPULSE_UP:    { PULLBACK: 0.55, CONSOLIDATION: 0.35, DISTRIBUTION: 0.10 },
  IMPULSE_DOWN:  { BOUNCE: 0.55,   CONSOLIDATION: 0.35, ACCUMULATION: 0.10 },
  PULLBACK:      { IMPULSE_UP: 0.50, CONSOLIDATION: 0.30, REVERSAL_DOWN: 0.20 },
  BOUNCE:        { IMPULSE_DOWN: 0.50, CONSOLIDATION: 0.30, REVERSAL_UP: 0.20 },
  CONSOLIDATION: { IMPULSE_UP: 0.35, IMPULSE_DOWN: 0.35, COMPRESSION: 0.30 },
  COMPRESSION:   { IMPULSE_UP: 0.48, IMPULSE_DOWN: 0.48, CONSOLIDATION: 0.04 },
  ACCUMULATION:  { IMPULSE_UP: 0.85, CONSOLIDATION: 0.15 },
  DISTRIBUTION:  { IMPULSE_DOWN: 0.85, CONSOLIDATION: 0.15 },
  REVERSAL_UP:   { IMPULSE_UP: 0.70, CONSOLIDATION: 0.30 },
  REVERSAL_DOWN: { IMPULSE_DOWN: 0.70, CONSOLIDATION: 0.30 },
};

function initMarketPhase(stock){
  if(stock._phase) return;
  // Start in consolidation — let the market build context before trending
  stock._phase = 'CONSOLIDATION';
  stock._phaseTicks = 30 + Math.floor(Math.random()*30);
  stock._phaseVolumePressure = 0; // accumulated buy/sell pressure this phase
  stock._peakPrice = stock.price;   // highest price in current phase
  stock._troughPrice = stock.price; // lowest price in current phase
  stock._phaseStartPrice = stock.price;
  stock._compressionFactor = 1.0;   // 1.0 = normal, <1 = compressed (triangle forming)
  // Volume memory: key price levels with historical activity
  if(!stock._volumeMemory) stock._volumeMemory = {};
}

function transitionPhase(stock){
  const weights = PHASE_TRANSITIONS[stock._phase] || PHASE_TRANSITIONS.CONSOLIDATION;
  const keys = Object.keys(weights);
  let r = Math.random(), cumulative = 0;
  let next = keys[keys.length-1];
  for(const k of keys){ cumulative += weights[k]; if(r < cumulative){ next = k; break; } }
  stock._phase = next;
  const [minD, maxD] = MARKET_PHASES[next]?.duration || [20,50];
  stock._phaseTicks = minD + Math.floor(Math.random()*(maxD-minD));
  stock._phaseStartPrice = stock.price;
  stock._phaseVolumePressure = 0;
  stock._compressionFactor = next === 'COMPRESSION' ? 1.0 : 1.0; // resets on phase change
}

function updateMarketPhase(stock){
  initMarketPhase(stock);
  stock._phaseTicks--;

  // Track price extremes this phase (needed for double top/bottom detection)
  stock._peakPrice = Math.max(stock._peakPrice || stock.price, stock.price);
  stock._troughPrice = Math.min(stock._troughPrice || stock.price, stock.price);

  // Compression: tighten bot order sizes progressively during triangle formation
  if(stock._phase === 'COMPRESSION'){
    stock._compressionFactor = Math.max(0.25, stock._compressionFactor * 0.992);
  }

  // Record volume memory at current price level (rounded to nearest 0.5%)
  const memKey = Math.round(stock.price / (stock.price * 0.005)) * (stock.price * 0.005);
  const roundedKey = +memKey.toFixed(2);
  stock._volumeMemory[roundedKey] = (stock._volumeMemory[roundedKey] || 0) + 1;
  // Cap memory size to avoid unbounded growth
  const memKeys = Object.keys(stock._volumeMemory);
  if(memKeys.length > 200){
    const oldest = memKeys.sort((a,b) => stock._volumeMemory[a]-stock._volumeMemory[b])[0];
    delete stock._volumeMemory[oldest];
  }

  if(stock._phaseTicks <= 0) transitionPhase(stock);
}

/* Returns bot order parameters shaped by the current market phase.
   This is where patterns emerge: a PULLBACK phase generates smaller
   sell orders with buyers defending, which looks like a Bull Flag.
   A COMPRESSION phase generates orders that converge toward a point,
   which looks like a Triangle. */
function getPhaseOrderParams(stock){
  initMarketPhase(stock);
  const p = stock._phase;
  const vol = stock.volatility;
  const cf = stock._compressionFactor || 1.0;
  const baseSize = { low:200, med:400, high:700, extreme:1200 }[vol];

  switch(p){
    case 'IMPULSE_UP':
      // Strong directional buying: large aggressive buys, small reactive sells
      return {
        buyProb: 0.78, buySizeMult: 1.8*cf, sellSizeMult: 0.4*cf,
        burstProb: 0.35, // frequent bursts = momentum feel
        mmSpreadMult: 1.2, // MM widens slightly on momentum
        note: 'impulse_up'
      };
    case 'IMPULSE_DOWN':
      return {
        buyProb: 0.22, buySizeMult: 0.4*cf, sellSizeMult: 1.8*cf,
        burstProb: 0.35, mmSpreadMult: 1.2, note: 'impulse_down'
      };
    case 'PULLBACK':
      // Bull flag mechanics: weak sells, buyers defend, shrinking volume
      return {
        buyProb: 0.58, buySizeMult: 0.6*cf, sellSizeMult: 0.5*cf,
        burstProb: 0.08, // rare bursts = low volume pullback feel
        mmSpreadMult: 0.9,
        note: 'pullback_bull_flag'
      };
    case 'BOUNCE':
      // Bear flag mechanics: weak bounce, sellers absorb, low volume
      return {
        buyProb: 0.42, buySizeMult: 0.5*cf, sellSizeMult: 0.6*cf,
        burstProb: 0.08, mmSpreadMult: 0.9, note: 'bounce_bear_flag'
      };
    case 'CONSOLIDATION':
      // Range/box: balanced flow, orders cancel each other out
      return {
        buyProb: 0.50, buySizeMult: 0.7*cf, sellSizeMult: 0.7*cf,
        burstProb: 0.05, mmSpreadMult: 0.85, note: 'range'
      };
    case 'COMPRESSION':
      // Triangle: size shrinks each tick (compressionFactor decays)
      // Breakout occurs naturally when one side runs out of liquidity
      return {
        buyProb: 0.50, buySizeMult: 0.9*cf, sellSizeMult: 0.9*cf,
        burstProb: 0.04, mmSpreadMult: 0.7, // very tight spread during compression
        note: 'triangle_compression'
      };
    case 'ACCUMULATION':
      // Institutions quietly absorbing: buy dips, never chase, volume hidden
      return {
        buyProb: 0.65, buySizeMult: 0.5*cf, sellSizeMult: 0.3*cf,
        burstProb: 0.02, mmSpreadMult: 0.8, note: 'accumulation'
      };
    case 'DISTRIBUTION':
      // Institutions quietly offloading into strength
      return {
        buyProb: 0.35, buySizeMult: 0.3*cf, sellSizeMult: 0.5*cf,
        burstProb: 0.02, mmSpreadMult: 0.8, note: 'distribution'
      };
    case 'REVERSAL_UP':
      // Capitulation buyers arrive: sudden surge after exhaustion
      return {
        buyProb: 0.80, buySizeMult: 2.2*cf, sellSizeMult: 0.3*cf,
        burstProb: 0.55, mmSpreadMult: 1.5, note: 'reversal_up'
      };
    case 'REVERSAL_DOWN':
      return {
        buyProb: 0.20, buySizeMult: 0.3*cf, sellSizeMult: 2.2*cf,
        burstProb: 0.55, mmSpreadMult: 1.5, note: 'reversal_down'
      };
    default:
      return { buyProb: 0.50, buySizeMult: 1.0, sellSizeMult: 1.0, burstProb: 0.10, mmSpreadMult: 1.0 };
  }
}

/* Volume memory magnet: finds the nearest high-volume price level
   and creates a subtle attraction/resistance, like a real POC. */
function getVolumeMemoryMagnet(stock){
  if(!stock._volumeMemory) return null;
  const entries = Object.entries(stock._volumeMemory);
  if(entries.length < 5) return null;
  const current = stock.price;
  const nearby = entries
    .filter(([k]) => Math.abs(parseFloat(k) - current) < current * 0.05)
    .sort((a,b) => b[1]-a[1]);
  return nearby[0] ? parseFloat(nearby[0][0]) : null;
}



function recordStockFastFlow(stock, strike, qty, hitSide){
  if(!stock._fastFlow[strike]) stock._fastFlow[strike] = {askVol:0, bidVol:0};
  stock._fastFlow[strike][hitSide==='ask'?'askVol':'bidVol'] += qty;
}
function decayStockFastFlow(stock){
  Object.values(stock._fastFlow).forEach(f=>{ f.askVol*=0.93; f.bidVol*=0.93; });
}
function netFlowForceNear(stock, radius){
  let force = 0;
  Object.entries(stock._fastFlow).forEach(([kStr,f])=>{
    const k = parseFloat(kStr);
    const dist = Math.abs(k - stock.price);
    if(dist > radius) return;
    const totalVol = f.askVol + f.bidVol;
    if(totalVol < 3) return;
    const imbalance = (f.askVol - f.bidVol) / totalVol;
    const proximity = 1 - dist/radius;
    const directionSign = Math.sign(k - stock.price) || 1;
    force += imbalance * proximity * directionSign * Math.min(1, totalVol/40);
  });
  return force;
}
/* Real OI-based magnet (Step 8) — replaces the old fixed _dailyMagnetStrike pin. Scans the
   strikes that actually exist in this stock's MAJOR expirations (1d, 1w — where the spec says
   institutional OI concentrates) and picks whichever has the most combined call+put open
   interest near the current price. That strike becomes the live magnet, so it moves and changes
   as real flow accumulates somewhere instead of being decided once at the start of the session. */
function findOIMagnetStrike(stock){
  const majorExpiries = EXPIRATIONS.filter(e=>e.type==='major');
  const searchRadius = stock.price * 0.10; // only strikes within a plausible pinning distance count
  let bestStrike = null, bestOI = 0;
  majorExpiries.forEach(expiry=>{
    const strikes = getStrikesForChain(stock, expiry.key);
    strikes.forEach(strike=>{
      if(Math.abs(strike-stock.price) > searchRadius) return;
      const callRow = optionMarketState[contractStateKey(stock.sym, strike, 'call', expiry.key)];
      const putRow = optionMarketState[contractStateKey(stock.sym, strike, 'put', expiry.key)];
      const totalOI = (callRow?callRow.openInterest:0) + (putRow?putRow.openInterest:0);
      if(totalOI > bestOI){ bestOI = totalOI; bestStrike = strike; }
    });
  });
  return bestStrike != null ? { strike: bestStrike, oi: bestOI } : null;
}
function computeStockMagnetForce(stock){
  const magnet = findOIMagnetStrike(stock);
  if(!magnet){
    // before any OI exists yet for this stock's major chains (e.g. right at session start before
    // tickOptionChainForStock has run for it once), fall back to the original seeded pin so price
    // isn't left with zero magnet force in the meantime.
    const distance = stock._dailyMagnetStrike - stock.price;
    const absDist = Math.abs(distance);
    const radius = stock.price * 0.04;
    const closeness = Math.max(0, 1 - absDist/radius);
    const urgency = 0.3 + 0.7*sessionProgress();
    return closeness * urgency * (Math.sign(distance)||0);
  }
  stock._dailyMagnetStrike = magnet.strike; // keep this in sync so the UI/popups referencing it stay consistent
  const distance = magnet.strike - stock.price;
  const absDist = Math.abs(distance);
  const radius = stock.price * 0.04;
  const closeness = Math.max(0, 1 - absDist/radius);
  // pull strength scales with how much OI is actually defending that strike, not just proximity —
  // a thin strike barely pins anything, a strike with a real "wall" pins much harder
  const oiStrength = Math.min(1.4, magnet.oi / 1200);
  const urgency = 0.3 + 0.7*sessionProgress();
  return closeness * urgency * oiStrength * (Math.sign(distance)||0);
}
function trackStockVolatility(stock, delta){
  stock._priceDeltaWindow.push(Math.abs(delta));
  if(stock._priceDeltaWindow.length>10) stock._priceDeltaWindow.shift();
  const avg = stock._priceDeltaWindow.reduce((a,b)=>a+b,0)/stock._priceDeltaWindow.length;
  const relAvg = avg/Math.max(1,stock.price); // normalize by price so $200 and $20 stocks compare fairly
  stock._volState = relAvg>0.0025 ? 'high' : relAvg>0.0012 ? 'med' : 'low';
  // Day range ratchet (bugfix) — strictly one-directional: the low only ever falls, the high only
  // ever rises, never drifting back toward the center or re-rolling to a new random range.
  if(stock.price > stock._dayHigh) stock._dayHigh = stock.price;
  if(stock.price < stock._dayLow) stock._dayLow = stock.price;
}

/* generates a couple of synthetic option prints per stock per tick, near its current price —
   this is what feeds the aggressive-flow imbalance that pulls the underlying around, same as
   the prior project's MM-hedge causal chain, just simplified (no explicit MM inventory yet —
   that arrives with the full Market Maker step of the options plan). */

/* ================================================================
   REAL MATCHING ENGINE + SYNTHETIC BOTS + ACTIVE MM
   
   Architecture change (per design document):
   BEFORE: forces → stock.price directly
   AFTER:  forces → synthetic orders → book consumption → fills → price
   
   The book is now the single source of truth for price.
   stock.price only updates from real fills (player, bots, or MM).
   The 4 forces become order generators, not price movers.
   ================================================================ */

/* ---- CENTRAL MATCHING ENGINE ---------------------------------- */
/* Unified execution function for ALL order sources:
   player, synthetic bots, MM, institutional sweeps.
   Returns a fill summary. Never touches stock.price directly —
   price comes from lastFillPrice at the end. */
function executeOrderAgainstBook(stock, side, qty, source){
  initOrderBook(stock);
  const ob = orderBooks[stock.sym];
  const levels = side === 'buy' ? ob.asks : ob.bids;
  let remaining = qty;
  let totalCost = 0;
  let filledQty = 0;
  let lastFillPrice = stock.price;
  let sweptLevels = 0;
  const fills = [];

  while(remaining > 0 && levels.length > 0){
    const level = levels[0];
    const fillQty = Math.min(remaining, level.size);
    const fillPrice = level.price;
    totalCost += fillQty * fillPrice;
    filledQty += fillQty;
    lastFillPrice = fillPrice;
    level.size -= fillQty;
    remaining -= fillQty;
    fills.push({ price: fillPrice, qty: fillQty });
    // If this level was placed by the active MM, update MM inventory
    if(level.owner === 'MM' && stock._mmState){
      if(side === 'buy'){ // buyer hit MM's ask → MM sold
        stock._mmState.inventory -= fillQty;
      } else { // seller hit MM's bid → MM bought
        stock._mmState.inventory += fillQty;
      }
    }
    if(level.size <= 0){
      levels.shift();
      sweptLevels++;
    }
  }

  const avgPrice = filledQty > 0 ? totalCost / filledQty : stock.price;
  const slippage = Math.abs(avgPrice - (side==='buy' ? ob.asks[0]?.price||stock.price : ob.bids[0]?.price||stock.price));
  const printClass = sweptLevels > 1 ? 'SWEEP' : filledQty >= 1000 ? 'BLOCK' : 'FILL';
  const isPartialFill = remaining > 0;

  // Record real tape entry for every execution (not decorative)
  if(filledQty > 0){
    const isPlayerSource = source === 'player';
    recordStockTapeEntry(stock.sym, avgPrice, filledQty, side, printClass, isPlayerSource);
    stock._todayVolume = (stock._todayVolume||0) + filledQty;
    // Update last trade price — this is what drives stock.price
    stock._lastTradePrice = lastFillPrice;
    stock._lastTradeTime = Date.now();
    // Update price from fill (circuit breaker aware)
    // Dynamic MM response — price always updates from fills (no artificial halt)
    stock.price = Math.max(0.5, +lastFillPrice.toFixed(2));
    // Trigger dynamic MM response based on how far price has moved from open
    const dayChangePct = ((lastFillPrice / stock._openPrice) - 1) * 100;
    triggerDynamicMmResponse(stock, dayChangePct);
    if(stock.price > stock._dayHigh) stock._dayHigh = stock.price;
    if(stock.price < stock._dayLow) stock._dayLow = stock.price;

    // SINGLE SOURCE OF TRUTH: every real fill immediately updates the active candle.
    // Before this fix, recordPriceTick was only called from tickStockEngine (every 700ms),
    // so fills from executeOrderAgainstBook moved stock.price but the chart never knew —
    // leaving the current price label floating above/below the last visible candle.
    // Now the matching engine itself writes to the tick history on every fill, so:
    //   fill → lastFillPrice → stock.price → recordPriceTick → candle.close/high/low
    // Current price, active candle, and Time & Sales all come from the same lastFillPrice.
    recordPriceTick(stock.sym, stock.price, filledQty);
  }

  return { filledQty, avgPrice, levelsSwept: sweptLevels, slippage, isPartialFill, printClass };
}

/* ---- ACTIVE MARKET MAKER ------------------------------------- */
/* The MM now actively quotes bid/ask with real limit orders,
   adjusts spread by volatility, skews by inventory, and
   cancels/replaces stale quotes every few seconds. */
const MM_QUOTE_INTERVAL_MS = 2500;
const MM_BASE_SPREAD = { low: 0.08, med: 0.18, high: 0.32, extreme: 0.65 };
const MM_MAX_INVENTORY = { low: 5000, med: 3000, high: 2000, extreme: 1000 };

function initStockMmState(stock){
  if(stock._mmState) return;
  stock._mmState = {
    inventory: 0,       // positive = long, negative = short
    lastQuoteTime: 0,
    bidPrice: 0,
    askPrice: 0,
    bidSize: 0,
    askSize: 0,
  };
}

function updateStockMarketMaker(stock){
  initStockMmState(stock);
  const mm = stock._mmState;
  const now = Date.now();
  if(now - mm.lastQuoteTime < MM_QUOTE_INTERVAL_MS) return;
  mm.lastQuoteTime = now;

  const ob = orderBooks[stock.sym];
  if(!ob) return;

  const baseSpread = MM_BASE_SPREAD[stock.volatility] || 0.18;
  const volMult = stock._volState === 'extreme' ? 2.2 : stock._volState === 'high' ? 1.5 : 1.0;
  const spread = baseSpread * volMult;
  const maxInv = MM_MAX_INVENTORY[stock.volatility] || 2000;
  const invRatio = Math.max(-1, Math.min(1, mm.inventory / maxInv));
  const midPrice = stock.price;
  const skewOffset = invRatio * spread * 0.4;
  const newBid = +Math.max(0.01, midPrice - spread/2 + skewOffset).toFixed(2);
  const newAsk = +Math.max(newBid + 0.01, midPrice + spread/2 + skewOffset).toFixed(2);
  const riskFactor = 1 - Math.abs(invRatio) * 0.6;
  const params = VOL_PARAMS[stock.volatility];
  const baseSize = Math.floor((params.minSize + params.maxSize) / 2 * riskFactor);
  const bidSize = Math.max(10, Math.floor(baseSize * (invRatio < 0 ? 1.4 : 0.7)));
  const askSize = Math.max(10, Math.floor(baseSize * (invRatio > 0 ? 1.4 : 0.7)));

  // GRADUAL UPDATE — instead of wiping all MM quotes at once (which caused the
  // visual flash), update existing MM levels in place and only add/remove one
  // level at a time. This makes the book look alive rather than resetting.
  const mmBids = ob.bids.filter(l => l.owner === 'MM');
  const mmAsks = ob.asks.filter(l => l.owner === 'MM');

  if(mmBids.length > 0){
    // Drift existing bid toward new target price (not teleport)
    mmBids[0].price = +((mmBids[0].price * 0.6 + newBid * 0.4)).toFixed(2);
    mmBids[0].size = Math.floor(mmBids[0].size * 0.7 + bidSize * 0.3);
  } else {
    ob.bids.push({ price: newBid, size: bidSize, owner: 'MM' });
  }

  if(mmAsks.length > 0){
    mmAsks[0].price = +((mmAsks[0].price * 0.6 + newAsk * 0.4)).toFixed(2);
    mmAsks[0].size = Math.floor(mmAsks[0].size * 0.7 + askSize * 0.3);
  } else {
    ob.asks.push({ price: newAsk, size: askSize, owner: 'MM' });
  }

  // Occasionally add a second MM level for depth (not every tick — staggered)
  if(mmBids.length < 2 && Math.random() < 0.3){
    const tick = Math.max(0.01, +(stock.price * params.spreadPct).toFixed(2));
    ob.bids.push({ price: +(newBid - tick).toFixed(2), size: Math.floor(bidSize * 0.6), owner: 'MM' });
  }
  if(mmAsks.length < 2 && Math.random() < 0.3){
    const tick = Math.max(0.01, +(stock.price * params.spreadPct).toFixed(2));
    ob.asks.push({ price: +(newAsk + tick).toFixed(2), size: Math.floor(askSize * 0.6), owner: 'MM' });
  }

  // Remove MM levels that have drifted too far from current price (stale quotes)
  const maxDrift = stock.price * 0.015;
  ob.bids = ob.bids.filter(l => l.owner !== 'MM' || Math.abs(l.price - newBid) < maxDrift);
  ob.asks = ob.asks.filter(l => l.owner !== 'MM' || Math.abs(l.price - newAsk) < maxDrift);

  ob.bids.sort((a,b) => b.price - a.price);
  ob.asks.sort((a,b) => a.price - b.price);

  mm.bidPrice = newBid;
  mm.askPrice = newAsk;
  mm.bidSize = bidSize;
  mm.askSize = askSize;
}

/* ---- SYNTHETIC BOTS ------------------------------------------ */
/* The 4 forces now generate synthetic orders instead of moving
   price directly. Each force maps to a bot archetype. */

/* ================================================================
   OPTION MM DELTA HEDGE — net accumulated delta system
   
   Instead of hedging each small trade individually (which caused
   tiny 2% hedges with negligible market impact), the MM now tracks
   its total net delta exposure across ALL contracts of a stock,
   and only hedges when the accumulated imbalance crosses a real
   threshold. The hedge executes against the real order book
   (not a direct price modification), so it shows up in the tape.
   ================================================================ */

const OPTION_MM_HEDGE_RATIO = 0.25;       // hedge 25% of net delta exposure per cycle
const OPTION_MM_HEDGE_THRESHOLD = 500;    // minimum shares imbalance before triggering a hedge
const OPTION_MM_HEDGE_COOLDOWN_MS = 1500; // minimum ms between hedges (avoid rapid-fire)

function initOptionMmState(stock){
  if(stock._optionMmState) return;
  stock._optionMmState = {
    netDelta: 0,          // cumulative delta exposure in share-equivalents
    hedgeShares: 0,       // total shares currently held as hedge
    hedgeRatio: OPTION_MM_HEDGE_RATIO,
    hedgeThresholdShares: OPTION_MM_HEDGE_THRESHOLD,
    lastHedgeTime: 0,
  };
}

/* Called every time a contract is traded (player or synthetic).
   Updates the stock-level net delta rather than hedging per contract. */
function recordMmInventoryChange(row, hitSide, qty){
  if(row._mmNetQty == null) row._mmNetQty = 0;

  // Track per-contract inventory for skew calculation (unchanged)
  const qtyChange = hitSide === 'ask' ? -qty : qty; // MM is opposite side
  row._mmNetQty += qtyChange;

  // Update stock-level net delta exposure
  const stock = allStocks.find(s => s.sym === row.sym);
  if(!stock) return;
  initOptionMmState(stock);
  const mm = stock._optionMmState;

  // Delta contribution: MM position change × option delta × multiplier
  // MM sold calls (qtyChange negative, delta positive) → net delta goes negative (short delta)
  // MM bought puts (qtyChange positive, delta negative) → net delta goes negative (short delta)
  const delta = row._greeks ? row._greeks.delta : (row.optType === 'call' ? 0.5 : -0.5);
  const deltaChange = qtyChange * delta * OPTION_CONTRACT_MULTIPLIER;
  mm.netDelta += deltaChange;

  // Check if we need to hedge (throttled)
  const now = Date.now();
  if(now - mm.lastHedgeTime < OPTION_MM_HEDGE_COOLDOWN_MS) return;

  const targetHedgeShares = -(mm.netDelta * mm.hedgeRatio);
  const hedgeNeeded = targetHedgeShares - mm.hedgeShares;

  if(Math.abs(hedgeNeeded) < mm.hedgeThresholdShares) return; // not enough imbalance yet

  // Execute real hedge against the book (no direct price modification)
  const hedgeSide = hedgeNeeded > 0 ? 'buy' : 'sell';
  const hedgeQty = Math.round(Math.abs(hedgeNeeded));
  const result = executeOrderAgainstBook(stock, hedgeSide, hedgeQty, 'OPTION_MM_HEDGE');

  if(result && result.filledQty > 0){
    mm.hedgeShares += hedgeSide === 'buy' ? result.filledQty : -result.filledQty;
    mm.lastHedgeTime = now;
    // Log hedge tape entry for visibility
    if(!stock._mmHedgeTape) stock._mmHedgeTape = [];
    stock._mmHedgeTape.push({
      time: now, side: hedgeSide,
      shares: result.filledQty,
      avgPrice: result.avgPrice,
      netDelta: mm.netDelta,
      hedgeShares: mm.hedgeShares,
    });
    if(stock._mmHedgeTape.length > 30) stock._mmHedgeTape.shift();
  }
}

/* Per-contract skew for bid/ask pricing (unchanged behavior, same formula) */
function computeMmInventorySkew(row){
  if(row._mmNetQty == null) return 0;
  // Skew based on per-contract inventory — positive = MM is net short, pushes ask up
  const threshold = 200; // slightly higher than old MM_HEDGE_THRESHOLD for smoother skew
  return Math.max(-1, Math.min(1, -row._mmNetQty / (threshold * 2)));
}

function renderWatchlistPanel(){
  const body = document.getElementById('body-watchlist');

  // Build watchlist from allStocks sorted by % change
  const stocks = [...allStocks].sort((a,b)=>{
    const ca = (a.price/a._openPrice-1);
    const cb = (b.price/b._openPrice-1);
    return Math.abs(cb)-Math.abs(ca);
  });

  let html = '<div class="wl-wrap">';
  html += '<div class="wl-header"><span>SÍMBOLO</span><span>PRECIO</span><span>CAMBIO</span><span>VOL</span></div>';

  stocks.forEach(s=>{
    const chg = (s.price/s._openPrice-1)*100;
    const pos = chg >= 0;
    const vol = s._todayVolume || 0;
    const volStr = vol >= 1000000 ? (vol/1000000).toFixed(1)+'M' : vol >= 1000 ? (vol/1000).toFixed(0)+'K' : vol;
    const sym = s.sym;
    const name = s.name || sym;
    html += `<div class="wl-row" onclick="currentSym='${sym}';renderAllData();" title="${name}">
      <div class="wl-sym">
        <div class="wl-sym-logo" style="background:${stringToColor(sym)}">${sym[0]}</div>
        <div>
          <div class="wl-sym-name">${sym}</div>
          <div class="wl-sym-full">${name.length>18?name.slice(0,18)+'…':name}</div>
        </div>
      </div>
      <div class="wl-price" style="color:${pos?'#22D47A':'#FF4B4B'}">${s.price.toFixed(2)}</div>
      <div class="wl-chg ${pos?'pos':'neg'}">${pos?'▲':'▼'}${Math.abs(chg).toFixed(2)}%</div>
      <div class="wl-vol">${volStr}</div>
    </div>`;
  });
  html += '</div>';
  body.innerHTML = html;
}

function stringToColor(str){
  let hash = 0;
  for(let i=0;i<str.length;i++) hash = str.charCodeAt(i)+((hash<<5)-hash);
  const colors = ['#4f46e5','#7c3aed','#db2777','#dc2626','#d97706','#059669','#0891b2','#2563eb'];
  return colors[Math.abs(hash)%colors.length];
}

  { impact:'bull', text:(sym,s)=>`Flujo de opciones inusual en ${sym}: $${(Math.random()*5+1).toFixed(1)}M en calls OTM`, magnitude:0.015 },

];

const _newsLog = [];
let _lastNewsTick = 0;
const NEWS_INTERVAL_MS = 15000; // nueva noticia cada 15 segundos

function generateNewsItem(){
  if(Date.now() - _lastNewsTick < NEWS_INTERVAL_MS) return;
  _lastNewsTick = Date.now();

  const stock = allStocks[Math.floor(Math.random()*allStocks.length)];
  const template = NEWS_TEMPLATES[Math.floor(Math.random()*NEWS_TEMPLATES.length)];
  const item = {
    time: Date.now(),
    sym: stock.sym,
    text: template.text(stock.sym, stock),
    impact: template.impact,
    magnitude: template.magnitude,
    applied: false,
  };
  _newsLog.unshift(item);
  if(_newsLog.length > 30) _newsLog.pop();

  // Apply price impact via magnet force
  if(!stock._newsMagnet) stock._newsMagnet = 0;
  const direction = template.impact === 'bull' ? 1 : template.impact === 'bear' ? -1 : 0;
  stock._newsMagnet = direction * template.magnitude * stock.price;
  setTimeout(()=>{ if(stock._newsMagnet) stock._newsMagnet *= 0.1; }, 8000);
}

function renderNewsPanel(){
  const body = document.getElementById('body-news');
  if(!body) return;

  generateNewsItem();

  let html = '<div class="news-wrap">';
  if(_newsLog.length === 0){
    html += '<div class="news-empty">Esperando noticias del mercado...</div>';
  } else {
    _newsLog.forEach(item=>{
      const age = Math.floor((Date.now()-item.time)/1000);
      const ageStr = age < 60 ? age+'s' : Math.floor(age/60)+'m';
      const impactColor = item.impact==='bull'?'#22D47A':item.impact==='bear'?'#FF4B4B':'#EF9F27';
      const impactIcon = item.impact==='bull'?'▲':item.impact==='bear'?'▼':'●';
      html += `<div class="news-item">
        <div class="news-item-header">
          <span class="news-sym">${item.sym}</span>
          <span class="news-impact" style="color:${impactColor}">${impactIcon} ${item.impact.toUpperCase()}</span>
          <span class="news-time">${ageStr} ago</span>
        </div>
        <div class="news-text">${item.text}</div>
      </div>`;
    });
  }
  html += '</div>';
  body.innerHTML = html;
}

  if(_scannerTab === 'stocks'){
    const byChg   = [...allStocks].sort((a,b)=>Math.abs((b.price/b._openPrice)-1)-Math.abs((a.price/a._openPrice)-1));
    const byVol   = [...allStocks].sort((a,b)=>(b._todayVolume||0)-(a._todayVolume||0));

    const _expKey = currentExpirationKey || (typeof getExpirationKeys==='function' ? getExpirationKeys()[0] : null);
    const ivHigh  = _expKey ? [...allStocks].sort((a,b)=>{
      try{
        const ivA = genOptionChainForStock(a, _expKey)[0]?.iv||0;
        const ivB = genOptionChainForStock(b, _expKey)[0]?.iv||0;
        return ivB - ivA;
      }catch(e){ return 0; }
    }) : [...allStocks];

    const filterHtml = `<div class="scan-filter-row" style="flex-wrap:wrap;gap:4px">
      <button class="scan-filter-btn${_scannerFilter==='movers'?' active':''}"    onclick="_scannerFilter='movers';renderScannerPanel()">${t('scan.movers','🔥 Movers')}</button>

      <button class="scan-filter-btn${_scannerFilter==='losers'?' active':''}"    onclick="_scannerFilter='losers';renderScannerPanel()">${t('scan.losers','▼ Losers')}</button>
      <button class="scan-filter-btn${_scannerFilter==='ivhigh'?' active':''}"    onclick="_scannerFilter='ivhigh';renderScannerPanel()">${t('scan.ivhigh','🔮 IV High')}</button>
      <button class="scan-filter-btn${_scannerFilter==='unusual'?' active':''}"   onclick="_scannerFilter='unusual';renderScannerPanel()">${t('scan.unusual','🐋 Unusual')}</button>
      <button class="scan-filter-btn${_scannerFilter==='premarket'?' active':''}" onclick="_scannerFilter='premarket';renderScannerPanel()">${t('scan.premarket','🌅 Pre-mkt')}</button>
      <button class="scan-filter-btn${_scannerFilter==='shortpop'?' active':''}"  onclick="_scannerFilter='shortpop';renderScannerPanel()">${t('scan.shortpop','🚀 Squeeze')}</button>
    </div>`;

    // Unusual options activity — stocks con vol/OI ratio alto
    const unusual = [...allStocks].map(s=>{
      let stats = {totalCallVol:0,totalPutVol:0,putCallRatio:1};
      try{ stats = computeOptionStats(s); }catch(e){}
      const ratio = stats.totalCallVol + stats.totalPutVol > 0 ?
        (stats.totalCallVol+stats.totalPutVol) / Math.max(1, s._todayVolume * 0.001) : 0;
      return { ...s, _unusualScore: ratio * (stats.putCallRatio > 1.5 || stats.putCallRatio < 0.5 ? 2 : 1) };
    }).sort((a,b)=>b._unusualScore-a._unusualScore);
    // Pre-market movers (simulado: stocks con mayor move en primeros ticks del día)
    const premarket = [...allStocks].filter(s=>isPreMarket()||gameCalendar.dayIndex===0)
      .sort((a,b)=>Math.abs((b.price/b._openPrice)-1)-Math.abs((a.price/a._openPrice)-1));
    // Squeeze candidates — short float alto + precio subiendo
    const shortpop = [...allStocks].filter(s=>(s.shortFloat||0)>=10)
      .sort((a,b)=>{
        const scoreA = (a.shortFloat||0) * Math.max(0,(a.price/a._openPrice-1)*100);

      </select>
      <select class="scan-select" onchange="_optScanFilter.minIV=+this.value;renderScannerPanel()">
        <option value="0">IV: Any</option>
        <option value="30">IV &gt; 30%</option>
        <option value="50">IV &gt; 50%</option>
        <option value="80">IV &gt; 80%</option>
      </select>
      <select class="scan-select" onchange="_optScanFilter.minVol=+this.value;renderScannerPanel()">
        <option value="0">Vol: Any</option>
        <option value="100">Vol &gt; 100</option>
        <option value="500">Vol &gt; 500</option>
        <option value="1000">Vol &gt; 1K</option>
      </select>
    </div>`;

    // Generate option scan results
    const results = [];
    allStocks.forEach(stock=>{
      const chain = genOptionChainForStock(stock, currentExpirationKey);
      chain.forEach(row=>{
        if(_optScanFilter.type!=='all' && row.optType!==_optScanFilter.type) return;
        if(row.iv < _optScanFilter.minIV) return;
        if(row.volume < _optScanFilter.minVol) return;
        if(row.openInterest < _optScanFilter.minOI) return;
        const score = row.volume * row.iv;
        results.push({stock, row, score});
      });
    });
    results.sort((a,b)=>b.score-a.score);

    const optRows = results.slice(0,20).map(function(r){
      var stock=r.stock; var row=r.row;
      var isCall = row.optType==='call';
      var moneyness = isCall ? (stock.price > row.strike ? 'ITM':'OTM') : (stock.price < row.strike ? 'ITM':'OTM');
      return '<div class="scan-opt-row" data-sym="'+stock.sym+'">'
        +'<span class="scan-sym">'+stock.sym+'</span>'
        +'<span style="color:'+(isCall?'#22D47A':'#FF4B4B')+';font-weight:700">'+(isCall?'C':'P')+row.strike.toFixed(0)+'</span>'
        +'<span style="color:var(--text-dim);font-size:8px">'+moneyness+'</span>'
        +'<span>$'+row.lastPrice.toFixed(2)+'</span>'
        +'<span style="color:var(--text-dim)">IV '+row.iv.toFixed(0)+'%</span>'
        +'<span style="color:var(--text-dim)">V:'+row.volume+'</span>'
        +'<span style="color:var(--text-dim)">OI:'+row.openInterest+'</span>'
        +'</div>';
    }).join('') || '<div style="padding:16px;text-align:center;color:var(--text-dim);font-size:10px">No hay contratos que coincidan</div>';

    wrap.innerHTML = tabHtml + filterHtml
      + '<div class="scan-opt-header"><span>SYM</span><span>CONTRATO</span><span></span><span>PRECIO</span><span>IV</span><span>VOL</span><span>OI</span></div>'
      + optRows;
    wrap.querySelectorAll('.scan-opt-row[data-sym]').forEach(function(row){
      row.style.cursor='pointer';
      row.onclick=function(){ currentSym=this.dataset.sym; renderAllData(); };
    });
  }
}

/* ================================================================
   DARK POOL — GDD: Prints off-exchange
   ================================================================ */
const _darkPoolLog = [];
let _lastDpTick = 0;
const DP_INTERVAL_MS = 4000;
const DP_MIN_SIZE = 5000; // minimum shares for a dark pool print

function generateDarkPoolPrint(){
  if(Date.now()-_lastDpTick < DP_INTERVAL_MS) return;
  _lastDpTick = Date.now();
  if(Math.random() > 0.4) return; // not every tick

  const stock = allStocks[Math.floor(Math.random()*allStocks.length)];
  const size = Math.floor(DP_MIN_SIZE + Math.random()*50000);
  const spread = stock.price * 0.001;
  const price = +(stock.price + (Math.random()-0.5)*spread*2).toFixed(2);
  const exchanges = ['FINRA','DARK','XADF','BATS-D','IEX'];
  const print = {
    time: Date.now(),
    sym: stock.sym,
    price,
    size,
    notional: price * size,
    exchange: exchanges[Math.floor(Math.random()*exchanges.length)],
    side: Math.random() > 0.5 ? 'buy' : 'sell',
  };
  _darkPoolLog.unshift(print);
  if(_darkPoolLog.length > 50) _darkPoolLog.pop();
}

function renderDarkPoolPanel(){
  const wrap = document.getElementById('dpWrap');
  if(!wrap) return;

  generateDarkPoolPrint();

  const fmtNotional = n => n>=1000000?(n/1000000).toFixed(2)+'M':n>=1000?(n/1000).toFixed(0)+'K':n.toFixed(0);
  const fmtTime = t => new Date(t).toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:false});

  let html = `<div class="dp-header-row">
    <span>HORA</span><span>SYM</span><span>PRECIO</span><span>TAMAÑO</span><span>NOCIONAL</span><span>EXCH</span>
  </div>`;

  if(_darkPoolLog.length === 0){
    html += '<div class="dp-empty">Monitoreando prints off-exchange...</div>';
  } else {
    _darkPoolLog.slice(0,20).forEach(p=>{
      const isBig = p.notional > 500000;
      html += `<div class="dp-row${isBig?' dp-big':''}" onclick="currentSym='${p.sym}';renderAllData();">
        <span class="dp-time">${fmtTime(p.time)}</span>
        <span class="dp-sym">${p.sym}</span>
        <span class="dp-price">${p.price.toFixed(2)}</span>
        <span class="dp-size">${p.size.toLocaleString()}</span>
        <span class="dp-notional${isBig?' dp-notional-big':''}">${fmtNotional(p.notional)}</span>
        <span class="dp-exch">${p.exchange}</span>
      </div>`;
    });
  }

  wrap.innerHTML = html;
}

<script>
/* ================================================================
   COMPANY PROFILE — GDD Feature
   Shows company overview, key metrics, earnings history, and
   analyst ratings. Replaces the generic financials header.
   ================================================================ */

const COMPANY_SECTORS = {
  ai: { label: 'AI / Semiconductors', color: '#7c3aed' },
  quantum: { label: 'Quantum Computing', color: '#2563eb' },
  biotech: { label: 'Biotech / Healthcare', color: '#059669' },
  energy: { label: 'Energy / Oil', color: '#d97706' },
  banks: { label: 'Banking / Finance', color: '#dc2626' },
  retail: { label: 'Retail / Consumer', color: '#db2777' },
  defense: { label: 'Defense / Aerospace', color: '#4f46e5' },
};

const ANALYST_RATINGS = ['Strong Buy','Buy','Hold','Sell','Strong Sell'];
const _analystCache = {};

function getAnalystData(stock){
  if(_analystCache[stock.sym]) return _analystCache[stock.sym];
  const ratingIdx = Math.floor(Math.random()*3); // bias toward positive
  const priceTarget = stock.price * (0.85 + Math.random()*0.45);
  const numAnalysts = Math.floor(8 + Math.random()*24);
  const data = {
    rating: ANALYST_RATINGS[ratingIdx],
    ratingIdx,
    priceTarget: +priceTarget.toFixed(2),
    numAnalysts,
    upside: +((priceTarget/stock.price-1)*100).toFixed(1),
    distribution: [
      Math.floor(numAnalysts*0.3),
      Math.floor(numAnalysts*0.35),
      Math.floor(numAnalysts*0.25),
      Math.floor(numAnalysts*0.07),
      Math.floor(numAnalysts*0.03),
    ]
  };
  _analystCache[stock.sym] = data;
  return data;
}

function renderCompanyProfile(stock, container){
  if(!container || !stock) return;

  const quarters = genFinancialsForStock(stock);
  const latestQ = quarters[quarters.length-1];
  const analyst = getAnalystData(stock);
  const sector = COMPANY_SECTORS[stock.sectorKey] || { label: stock.sectorKey, color: '#666' };

  // Key metrics
  const pe = stock.price / (latestQ.income.epsActual * 4);
  const ps = stock.marketCap / (latestQ.income.revenue * 4);
  const sharesOut = stock.marketCap / stock.price;
  const roe = (latestQ.income.netIncome * 4) / latestQ.balance.totalEquity * 100;
  const debtToEquity = latestQ.balance.totalLiabilities / latestQ.balance.totalEquity;
  const grossMargin = (latestQ.income.grossProfit / latestQ.income.revenue * 100).toFixed(1);
  const netMargin = (latestQ.income.netIncome / latestQ.income.revenue * 100).toFixed(1);

  const fmtB = n => n >= 1e9 ? '$'+(n/1e9).toFixed(2)+'B' : n >= 1e6 ? '$'+(n/1e6).toFixed(1)+'M' : '$'+n.toFixed(0);

  // Rating color
  const ratingColor = analyst.ratingIdx <= 1 ? '#22D47A' : analyst.ratingIdx === 2 ? '#EF9F27' : '#FF4B4B';

  // Earnings surprise bars
  const earningsBars = quarters.map((q,i) => {
    const surprise = q.income.surprisePct * 100;
    const beat = surprise >= 0;
    return `<div class="cp-earn-bar-wrap" title="${q.quarter}: EPS ${beat?'Beat':'Miss'} ${Math.abs(surprise).toFixed(1)}%">
      <div class="cp-earn-bar" style="height:${Math.min(40,Math.abs(surprise)*3+6)}px;background:${beat?'#22D47A':'#FF4B4B'};opacity:.85"></div>
      <div class="cp-earn-label">${beat?'▲':'▼'}${Math.abs(surprise).toFixed(0)}%</div>
      <div class="cp-earn-q">${q.quarter.replace('Q','').replace(' ','')}</div>
    </div>`;
  }).join('');

  container.innerHTML = `
    <div class="company-profile">

      <!-- HEADER -->
      <div class="cp-profile-header">
        <div class="cp-logo" style="background:${sector.color}">${stock.sym[0]}</div>
        <div class="cp-header-info">
          <div class="cp-company-name">${stock.name || stock.sym}</div>
          <div class="cp-ticker-sector">
            <span class="cp-ticker">${stock.sym}</span>
            <span class="cp-sector-badge" style="border-color:${sector.color};color:${sector.color}">${sector.label}</span>
          </div>
          <div class="cp-description">${stock.description || 'Leading company in the '+sector.label+' sector with innovative products and strong market position.'}</div>
        </div>
        <div class="cp-price-block">
          <div class="cp-current-price">${stock.price.toFixed(2)}</div>
          <div class="cp-day-change" style="color:${(stock.price/stock._openPrice-1)>=0?'#22D47A':'#FF4B4B'}">
            ${((stock.price/stock._openPrice-1)*100).toFixed(2)}% hoy
          </div>
          <div class="cp-mktcap">${fmtB(stock.marketCap)}</div>
        </div>
      </div>

      <!-- KEY METRICS GRID -->
      <div class="cp-metrics-grid">
        <div class="cp-metric"><div class="cp-metric-lbl">P/E Ratio</div><div class="cp-metric-val">${pe>0?pe.toFixed(1):'N/A'}</div></div>
        <div class="cp-metric"><div class="cp-metric-lbl">P/S Ratio</div><div class="cp-metric-val">${ps.toFixed(2)}x</div></div>
        <div class="cp-metric"><div class="cp-metric-lbl">Market Cap</div><div class="cp-metric-val">${fmtB(stock.marketCap)}</div></div>
        <div class="cp-metric"><div class="cp-metric-lbl">Shares Out.</div><div class="cp-metric-val">${(sharesOut/1e6).toFixed(1)}M</div></div>
        <div class="cp-metric"><div class="cp-metric-lbl">Gross Margin</div><div class="cp-metric-val ${parseFloat(grossMargin)>40?'pos':''}"> ${grossMargin}%</div></div>
        <div class="cp-metric"><div class="cp-metric-lbl">Net Margin</div><div class="cp-metric-val ${parseFloat(netMargin)>10?'pos':'neg'}">${netMargin}%</div></div>
        <div class="cp-metric"><div class="cp-metric-lbl">ROE</div><div class="cp-metric-val ${roe>15?'pos':''}">${roe.toFixed(1)}%</div></div>
        <div class="cp-metric"><div class="cp-metric-lbl">Debt/Equity</div><div class="cp-metric-val ${debtToEquity<1?'pos':'neg'}">${debtToEquity.toFixed(2)}x</div></div>
        <div class="cp-metric"><div class="cp-metric-lbl">Revenue TTM</div><div class="cp-metric-val">${fmtB(latestQ.income.revenue*4)}</div></div>
        <div class="cp-metric"><div class="cp-metric-lbl">Net Income TTM</div><div class="cp-metric-val ${latestQ.income.netIncome>=0?'pos':'neg'}">${fmtB(latestQ.income.netIncome*4)}</div></div>
        <div class="cp-metric"><div class="cp-metric-lbl">Cash</div><div class="cp-metric-val pos">${fmtB(latestQ.balance.cash)}</div></div>
        <div class="cp-metric"><div class="cp-metric-lbl">Free Cash Flow</div><div class="cp-metric-val ${latestQ.cashflow.freeCashFlow>=0?'pos':'neg'}">${fmtB(latestQ.cashflow.freeCashFlow)}</div></div>
      </div>

      <!-- ANALYST RATINGS -->
      <div class="cp-section-title">📊 Analyst Consensus</div>
      <div class="cp-analyst-block">
        <div class="cp-analyst-rating" style="color:${ratingColor}">${analyst.rating}</div>
        <div class="cp-analyst-sub">${analyst.numAnalysts} analysts · Target: $${analyst.priceTarget} (${analyst.upside>0?'+':''}${analyst.upside}%)</div>
        <div class="cp-analyst-bars">
          ${ANALYST_RATINGS.map((r,i)=>`<div class="cp-analyst-bar-row">
            <span class="cp-analyst-bar-lbl">${r}</span>
            <div class="cp-analyst-bar-track"><div class="cp-analyst-bar-fill" style="width:${analyst.distribution[i]/analyst.numAnalysts*100}%;background:${i<=1?'#22D47A':i===2?'#EF9F27':'#FF4B4B'}"></div></div>
            <span class="cp-analyst-bar-count">${analyst.distribution[i]}</span>
          </div>`).join('')}
        </div>
      </div>

      <!-- EARNINGS HISTORY -->
      <div class="cp-section-title">📈 Earnings History (EPS Surprise)</div>
      <div class="cp-earnings-chart">
        ${earningsBars}
      </div>

    </div>`;
}

</script>

<script>
/* ================================================================
   MARKET MAKER MODE — Full Implementation
   GDD: Player can choose to be a Market Maker instead of a trader.
   - Player quotes bid/ask in the real order book
   - Receives fills when bots/other players hit their quotes
   - Manages inventory and delta exposure
   - Receives incoming institutional orders to internalize
   - Competes with bot MMs for order flow
   ================================================================ */

// ── STATE ──────────────────────────────────────────────────────
const MM_MODE = {
  active: false,
  sym: null,

  // Player's active quotes per symbol
  quotes: {},       // { sym: { bid, bidSize, ask, askSize, active } }

  // Inventory (separate from normal positions)
  inventory: {},    // { sym: { shares, avgCost, unrealizedPL } }

  // P&L breakdown
  pnl: {
    spreadEarned: 0,
    inventoryPL: 0,
    adverseSelection: 0,
    hedgingCost: 0,
    commissions: 0,
  },

  // Stats
  stats: {
    fillsReceived: 0,
    ordersInternalized: 0,
    ordersRejected: 0,
    totalVolume: 0,
  },

  // Incoming order queue (from brokers)
  incomingQueue: [],
  _incomingTimer: null,
};

// ── INIT ───────────────────────────────────────────────────────
function activateMMMode(sym) {
  MM_MODE.active = true;
  MM_MODE.sym = sym || currentSym;

  // Set default quote around current price
  const stock = allStocks.find(s => s.sym === MM_MODE.sym);
  if (!stock) return;

  const spread = stock.price * 0.002; // 0.2% spread default
  MM_MODE.quotes[MM_MODE.sym] = {
    bid: +(stock.price - spread/2).toFixed(2),
    bidSize: 500,
    ask: +(stock.price + spread/2).toFixed(2),
    askSize: 500,
    active: true,
  };

  if (!MM_MODE.inventory[MM_MODE.sym]) {
    MM_MODE.inventory[MM_MODE.sym] = { shares: 0, avgCost: 0 };
  }

  // Start incoming order generator
  clearInterval(MM_MODE._incomingTimer);
  MM_MODE._incomingTimer = setInterval(generateIncomingOrder, 8000 + Math.random() * 7000);

  // Add sidebar icon state
  const sbEl = document.getElementById('sb-mmdesk');
  if (sbEl) sbEl.classList.add('active');

  renderMMDesk();
  console.log('[MM Mode] Activated for', MM_MODE.sym);
}

function mmHedgeDelta(sym) {
  const inv = MM_MODE.inventory[sym];
  if (!inv || inv.shares === 0) return;

  const stock = allStocks.find(s => s.sym === sym);
  if (!stock) return;

  // Hedge: buy/sell shares to neutralize delta
  const sharesToHedge = -inv.shares;
  const hedgeCost = Math.abs(sharesToHedge) * stock.price * 0.001; // slippage cost

  if (sharesToHedge > 0) {
    // Buy shares to cover short inventory
    playerAccount.cashBalance -= sharesToHedge * stock.price + hedgeCost;
    inv.shares = 0;
  } else {
    // Sell shares to cover long inventory
    playerAccount.cashBalance += Math.abs(sharesToHedge) * stock.price - hedgeCost;
    inv.shares = 0;
  }

  inv.avgCost = 0;
  MM_MODE.pnl.hedgingCost -= hedgeCost;
  MM_MODE.pnl.commissions -= calculateCommission(Math.abs(sharesToHedge));

  showMMAlert('success', '⚡ Delta hedged', 'Position neutralized. Cost: $' + hedgeCost.toFixed(2));
  renderMMDesk();
}

// ── FILL ENGINE ────────────────────────────────────────────────
// Called from tickStockEngine when price moves through MM's quote
function checkMMQuoteFills(stock) {
  if (!MM_MODE.active) return;

  const q = MM_MODE.quotes[stock.sym];
  if (!q || !q.active) return;

  const price = stock.price;
  const inv = MM_MODE.inventory[stock.sym] || { shares: 0, avgCost: 0 };
  if (!MM_MODE.inventory[stock.sym]) MM_MODE.inventory[stock.sym] = inv;

  // Random chance of getting hit based on price proximity
  const bidProximity = Math.abs(price - q.bid) / price;
  const askProximity = Math.abs(price - q.ask) / price;

  // Someone hits our bid (we BUY from them)
  if (bidProximity < 0.003 && Math.random() < 0.15) {
    const fillQty = Math.floor(50 + Math.random() * q.bidSize * 0.4);
    const fillPx = q.bid;

    // Update inventory
    const prevShares = inv.shares;
    const prevCost = inv.avgCost * Math.abs(prevShares);
    inv.shares += fillQty;
    if (inv.shares !== 0) {
      inv.avgCost = (prevCost + fillQty * fillPx) / Math.abs(inv.shares);
    }

    // P&L: we bought at bid, spread earned when we eventually sell at ask
    const spreadEarned = fillQty * (q.ask - q.bid) * 0.5; // partial credit
    MM_MODE.pnl.spreadEarned += spreadEarned;
    MM_MODE.pnl.commissions -= calculateCommission(fillQty);
    MM_MODE.stats.fillsReceived++;
    MM_MODE.stats.totalVolume += fillQty;

    addMMTapeEntry({
      time: Date.now(), sym: stock.sym, px: fillPx,
      qty: fillQty, side: 'buy', type: 'MY_FILL',
      note: 'Hit our bid +$' + spreadEarned.toFixed(0),
    });

    renderMMDesk();
  }

  // Someone lifts our ask (we SELL to them)
  if (askProximity < 0.003 && Math.random() < 0.15) {
    const fillQty = Math.floor(50 + Math.random() * q.askSize * 0.4);
    const fillPx = q.ask;

    inv.shares -= fillQty;
    if (inv.shares !== 0) {
      inv.avgCost = fillPx; // simplified
    }

    const spreadEarned = fillQty * (q.ask - q.bid) * 0.5;
    MM_MODE.pnl.spreadEarned += spreadEarned;
    MM_MODE.pnl.commissions -= calculateCommission(fillQty);
    MM_MODE.stats.fillsReceived++;
    MM_MODE.stats.totalVolume += fillQty;

    addMMTapeEntry({
      time: Date.now(), sym: stock.sym, px: fillPx,
      qty: fillQty, side: 'sell', type: 'MY_FILL',
      note: 'Lifted our ask +$' + spreadEarned.toFixed(0),
    });

    renderMMDesk();
  }

  // Update inventory P&L
  inv.unrealizedPL = inv.shares * (price - inv.avgCost);
  MM_MODE.pnl.inventoryPL = inv.unrealizedPL;
}

// ── INCOMING ORDER ENGINE ───────────────────────────────────────
const BROKER_NAMES = ['TD Securities', 'Goldman Flow', 'Citadel Connect', 'Virtu Wholesale', 'Two Sigma Exec'];
const ORDER_TYPES = ['Market Order (Internalized)', 'Block Trade', 'Institutional Sweep', 'Client Hedge'];

function generateIncomingOrder() {
  if (!MM_MODE.active) return;

  const stock = allStocks.find(s => s.sym === MM_MODE.sym);
  if (!stock) return;

  const isBuy = Math.random() > 0.45;
  const size = Math.floor(500 + Math.random() * 4500);
  const broker = BROKER_NAMES[Math.floor(Math.random() * BROKER_NAMES.length)];
  const orderType = ORDER_TYPES[Math.floor(Math.random() * ORDER_TYPES.length)];
  const q = MM_MODE.quotes[MM_MODE.sym] || { bid: stock.price * 0.999, ask: stock.price * 1.001 };

  const execPrice = isBuy ? q.ask : q.bid;
  const spreadCapture = size * Math.abs(q.ask - q.bid);
  const invChange = isBuy ? size : -size;
  const newInv = (MM_MODE.inventory[MM_MODE.sym]?.shares || 0) + invChange;

  showIncomingOrderPopup({
    broker, orderType, sym: MM_MODE.sym, size, isBuy,
    execPrice, spreadCapture, invChange, newInv, stock,
  });
}

function executeMMinternalization(order) {
  const inv = MM_MODE.inventory[order.sym] || { shares: 0, avgCost: 0 };
  if (!MM_MODE.inventory[order.sym]) MM_MODE.inventory[order.sym] = inv;

  // Update inventory
  const prevShares = inv.shares;
  inv.shares += order.isBuy ? order.size : -order.size;
  if (inv.shares !== 0) {
    inv.avgCost = order.execPrice;
  }

  MM_MODE.pnl.spreadEarned += order.spreadCapture;
  MM_MODE.pnl.commissions -= calculateCommission(order.size) * 0.5; // discounted as MM
  MM_MODE.stats.ordersInternalized++;
  MM_MODE.stats.fillsReceived++;
  MM_MODE.stats.totalVolume += order.size;

  addMMTapeEntry({
    time: Date.now(), sym: order.sym,
    px: order.execPrice, qty: order.size,
    side: order.isBuy ? 'buy' : 'sell',
    type: 'INTERNALIZED',
    note: 'Internalized +$' + order.spreadCapture.toFixed(0),
  });

  showMMAlert('success',
    '✓ Order internalized',
    order.size.toLocaleString() + ' shares @ $' + order.execPrice.toFixed(2) + ' · Spread: +$' + order.spreadCapture.toFixed(0)
  );

  renderMMDesk();
  renderAllData();
}

  const pnl = MM_MODE.pnl;

/* ── 1. PHASE ENGINE → TICK FORCE ───────────────────────────────────
   Conecta updateMarketPhase y getPhaseOrderParams al tickStockEngine.
   Añade FAKEOUT, LIQUIDITY_GRAB y STOP_HUNT como fases especiales.
   ----------------------------------------------------------------- */

// Nuevas fases de trampa
MARKET_PHASES['FAKEOUT_UP']    = { duration:[5,12],  next:['IMPULSE_DOWN','CONSOLIDATION'] };
MARKET_PHASES['FAKEOUT_DOWN']  = { duration:[5,12],  next:['IMPULSE_UP','CONSOLIDATION'] };
MARKET_PHASES['STOP_HUNT']     = { duration:[3,8],   next:['REVERSAL_UP','REVERSAL_DOWN'] };
MARKET_PHASES['SQUEEZE']       = { duration:[20,50], next:['DISTRIBUTION','CONSOLIDATION'] };

PHASE_TRANSITIONS['PULLBACK']['FAKEOUT_DOWN']     = 0.08;
PHASE_TRANSITIONS['BOUNCE']['FAKEOUT_UP']         = 0.08;
PHASE_TRANSITIONS['CONSOLIDATION']['STOP_HUNT']   = 0.06;
PHASE_TRANSITIONS['COMPRESSION']['FAKEOUT_UP']    = 0.25;
PHASE_TRANSITIONS['COMPRESSION']['FAKEOUT_DOWN']  = 0.25;
// Normalizar pesos (aproximado, el selector ya maneja overflow)

function getPhaseForceBias(stock){
  const p = stock._phase;
  if(!p) return 0;
  switch(p){
    case 'IMPULSE_UP':    return  0.80;
    case 'IMPULSE_DOWN':  return -0.80;
    case 'PULLBACK':      return -0.20;
    case 'BOUNCE':        return  0.20;
    case 'ACCUMULATION':  return  0.10; // quiet, hidden
    case 'DISTRIBUTION':  return -0.10;
    case 'REVERSAL_UP':   return  0.60;
    case 'REVERSAL_DOWN': return -0.60;
    case 'COMPRESSION':   return  0;
    case 'FAKEOUT_UP':    return  0.90; // fuerte arriba — trampa alcista
    case 'FAKEOUT_DOWN':  return -0.90; // fuerte abajo — trampa bajista
    case 'STOP_HUNT':     // barre stops: pico breve en dirección contraria al trend
      return stock._regime === 'trend_up' ? -0.70 : 0.70;
    case 'SQUEEZE':       return  1.20; // explosivo
    default: return 0;
  }
}

function announcePhaseTrap(stock, phase){
  if(stock.sym !== currentSym) return; // solo para el símbolo activo
  const msgs = {
    FAKEOUT_UP:   `⚠️ ${stock.sym}: Fakeout alcista detectado — trampa posible`,
    FAKEOUT_DOWN: `⚠️ ${stock.sym}: Fakeout bajista detectado — trampa posible`,
    STOP_HUNT:    `🎯 ${stock.sym}: Stop hunt — barrido de stops en curso`,
    SQUEEZE:      `🚀 ${stock.sym}: SHORT SQUEEZE iniciado`,
  };
  if(msgs[phase]) showSurvivalAlert(msgs[phase], phase==='SQUEEZE'?'ok':'warn');
}

// Patch transitionPhase para anunciar trampas
const _origTransitionPhase = transitionPhase;
window.transitionPhase = function(stock){
  _origTransitionPhase(stock);
  announcePhaseTrap(stock, stock._phase);
  // Squeeze: solo si tiene high short float
  if(stock._phase === 'SQUEEZE' && (stock.shortFloat||0) < 10){
    // No hay suficientes cortos — no hay squeeze real, volver a impulse_up
    stock._phase = 'IMPULSE_UP';
  }
};
transitionPhase = window.transitionPhase;

/* ── 2. OPTIONS → PRECIO SUBYACENTE (GEX / Dealer Hedging) ──────────
   Cuando alguien compra calls: dealer vendió calls → compra acciones
   Cuando alguien compra puts: dealer vendió puts → vende acciones
   La fuerza es proporcional al volumen neto y al delta del strike
   ----------------------------------------------------------------- */
const GEX_HEDGE_RATIO  = 0.00018; // cuánto mueve el precio 1 contrato comprado
const GEX_DECAY        = 0.92;    // la fuerza decae por tick

function computeGEXForce(stock){
  if(!stock._fastFlow) return 0;
  let netDelta = 0;
  const chain = genOptionChainForStock(stock, currentExpirationKey);
  chain.forEach(row=>{
    const stateKey = contractStateKey(stock.sym, row.strike, row.optType, currentExpirationKey);
    const state = optionMarketState[stateKey];
    if(!state) return;
    const netBuy = (state.buyVolume||0) - (state.sellVolume||0);
    if(netBuy === 0) return;
    // Delta del contrato: calls positivo, puts negativo
    const contractDelta = row.optType === 'call' ? (row.delta||0.5) : -(Math.abs(row.delta)||0.5);
    // Dealer hedge: dealer vendió → tiene delta contrario → hedgea en dirección opuesta
    // Si player compra call (buy), dealer es short call → dealer compra acciones → +force
    netDelta += netBuy * contractDelta * GEX_HEDGE_RATIO;
  });
  return Math.max(-0.8, Math.min(0.8, netDelta)); // capped
}

/* ── 3. IV CRUSH post-earnings ───────────────────────────────────────
   Cuando hay un earnings event: IV sube 2-3x antes, luego colapsa
   ----------------------------------------------------------------- */
const stockEarningsState = {}; // sym -> { scheduled: bool, daysUntil: int, happened: bool }

function scheduleEarnings(stock){
  if(stockEarningsState[stock.sym]) return;
  // Earnings cada 90 días de juego aprox, con algo de aleatorio
  const daysUntil = 5 + Math.floor(Math.random()*15);
  stockEarningsState[stock.sym] = { scheduled:true, daysUntil, happened:false, ivMult:1 };
}

function updateEarningsIV(stock){
  scheduleEarnings(stock);
  const state = stockEarningsState[stock.sym];
  if(!state) return 1;
  state.daysUntil -= (1/500); // decrementar por tick (500 ticks ≈ 1 día de juego)
  if(state.daysUntil > 1){
    // Normal
    state.ivMult = 1;
  } else if(state.daysUntil > 0){
    // Pre-earnings: IV sube progresivamente hasta 2.5x
    state.ivMult = 1 + (1-state.daysUntil) * 1.5;
  } else if(!state.happened){
    // EARNINGS — gap de precio + IV crush inmediato
    state.happened = true;
    state.ivMult = 0.4; // IV crush: cae al 40%
    const beatOrMiss = Math.random();
    const gapPct = stock.volatility === 'extreme' ? 0.25 : stock.volatility === 'high' ? 0.15 : 0.08;
    const direction = beatOrMiss > 0.55 ? 1 : beatOrMiss < 0.30 ? -1 : (Math.random()>0.5?0.3:-0.3);
    const gap = stock.price * gapPct * direction;
    stock.price = Math.max(0.5, +(stock.price + gap).toFixed(2));
    if(stock.sym === currentSym){
      const msg = direction > 0.5 ? `📈 EARNINGS BEAT — ${stock.sym} +${(gapPct*100).toFixed(0)}%` :
                  direction < -0.5 ? `📉 EARNINGS MISS — ${stock.sym} ${(gapPct*100*direction).toFixed(0)}%` :
                  `📊 EARNINGS IN-LINE — ${stock.sym} (IV crush activo)`;
      showSurvivalAlert(msg, direction > 0 ? 'ok' : 'danger');
    }
    // Reagendar earnings
    setTimeout(()=>{
      stockEarningsState[stock.sym] = { scheduled:true, daysUntil: 20+Math.floor(Math.random()*25), happened:false, ivMult:1 };
    }, 8000);
  }
  return Math.max(0.35, state.ivMult);
}

/* ── 4. BLACK SWAN ───────────────────────────────────────────────────
   1% probabilidad por día de juego de un crash sectorial o raro
   ----------------------------------------------------------------- */
let _blackSwanCooldown = 0;

function maybeBlackSwan(){
  if(Date.now() < _blackSwanCooldown) return;
  if(Math.random() > 0.0002) return; // ~1% por día de juego a 500 ticks/día
  _blackSwanCooldown = Date.now() + 60000 * 15; // cooldown 15 min reales
  
  const swanTypes = [
    { name:'Flash Crash',        sectorWide:false, pct:-0.18, single:true },
    { name:'Sector Collapse',    sectorWide:true,  pct:-0.22, single:false },
    { name:'Liquidity Crisis',   sectorWide:false, pct:-0.12, spreadMult:8 },
    { name:'Geopolitical Shock', sectorWide:true,  pct:-0.15, single:false },
    { name:'Short Squeeze Mania',sectorWide:false, pct:+0.35, single:true },
  ];
  const swan = swanTypes[Math.floor(Math.random()*swanTypes.length)];
  
  if(swan.single){
    const target = allStocks[Math.floor(Math.random()*allStocks.length)];
    target.price = Math.max(0.5, +(target.price * (1+swan.pct)).toFixed(2));
    if(swan.spreadMult && orderBooks[target.sym]){
      // Spreads se abren — reinit book con parámetros extremos
      orderBooks[target.sym] = null;
    }
  } else {
    // Sector entero
    const sector = universe[Math.floor(Math.random()*universe.length)];
    allStocks.filter(s=>s.sectorKey===sector.sectorKey).forEach(s=>{
      s.price = Math.max(0.5, +(s.price*(1+swan.pct*(0.8+Math.random()*0.4))).toFixed(2));
      orderBooks[s.sym] = null;
    });
  }
  
  showSurvivalAlert(`🦢 BLACK SWAN: ${swan.name} — mercado en shock`, 'danger');
  survivalDamageRiskScore(5, 'Black swan event');
  try{playSound('blackswan');}catch(e){}
  flashToast(`⚠️ BLACK SWAN: ${swan.name}`, true);
}

/* ── 5. SHORT SQUEEZE ────────────────────────────────────────────────
   Stocks con shortFloat alto son candidatos a squeeze cuando
   el precio sube rápidamente y los cortos tienen que cubrir
   ----------------------------------------------------------------- */
function maybeShortSqueeze(stock){
  const sf = stock.shortFloat || 0;
  if(sf < 15) return; // solo si hay suficientes cortos (>15% float)
  const priceUp3Day = stock._peakPrice ? (stock.price/stock._troughPrice - 1) : 0;
  if(priceUp3Day < 0.05) return; // necesita haber subido 5%+ para disparar
  if(Math.random() > 0.002) return; // baja probabilidad por tick
  if(stock._phase === 'SQUEEZE') return; // ya está en squeeze
  stock._phase = 'SQUEEZE';
  stock._phaseTicks = 20 + Math.floor(Math.random()*30);
  announcePhaseTrap(stock, 'SQUEEZE');
}

/* ── 6. HALT ─────────────────────────────────────────────────────────
   Acción se detiene N minutos reales. Si tienes posición: no puedes salir
   ----------------------------------------------------------------- */
const haltedStocks = {}; // sym -> { until: timestamp }
let _haltCooldown = 0;

function maybeHalt(){
  if(Date.now() < _haltCooldown) return;
  if(Math.random() > 0.00015) return;
  _haltCooldown = Date.now() + 120000; // cooldown 2 min
  
  // Solo stocks extremos o high vol
  const candidates = allStocks.filter(s=>['extreme','high'].includes(s.volatility));
  if(!candidates.length) return;
  const target = candidates[Math.floor(Math.random()*candidates.length)];
  if(haltedStocks[target.sym]) return;
  
  const haltMinutes = 2 + Math.floor(Math.random()*8); // 2-10 minutos reales
  haltedStocks[target.sym] = { until: Date.now() + haltMinutes*60000, sym:target.sym };
  
  const isCurrentSym = target.sym === currentSym;
  if(isCurrentSym) showSurvivalAlert(`⛔ HALT — ${target.sym} detenido ${haltMinutes} min. No puedes operar.`, 'danger');
  flashToast(`⛔ TRADING HALT: ${target.sym} — ${haltMinutes} minutos`, true);
  
  setTimeout(()=>{
    delete haltedStocks[target.sym];
    if(target.sym === currentSym) showSurvivalAlert(`✅ ${target.sym} RESUMED — Trading habilitado`, 'ok');
  }, haltMinutes*60000);
}

function isStockHalted(sym){ return !!haltedStocks[sym]; }
let _haltCountdownInterval = null;
function startHaltCountdown(sym){
  stopHaltCountdown();
  const ind = document.getElementById('haltIndicator');
  const tim = document.getElementById('haltTimer');
  if(ind) ind.style.display = 'flex';
  _haltCountdownInterval = setInterval(()=>{
    const h = haltedStocks[sym];
    if(!h){ stopHaltCountdown(); return; }
    const rem = Math.max(0, h.until - Date.now());
    const mins = Math.floor(rem/60000);
    const secs = Math.floor((rem%60000)/1000);
    if(tim) tim.textContent = `${sym} ${mins}:${secs.toString().padStart(2,'0')}`;
    if(rem <= 0){ stopHaltCountdown(); delete haltedStocks[sym]; }
  }, 500);
}
function stopHaltCountdown(){
  if(_haltCountdownInterval){ clearInterval(_haltCountdownInterval); _haltCountdownInterval=null; }
  const ind = document.getElementById('haltIndicator');
  if(ind) ind.style.display = 'none';
}


/* ── 7. HOOK CENTRAL — conectar todo a tickStockEngine ──────────────
   Se engancha en el loop del tick para ejecutar todos los sistemas
   ----------------------------------------------------------------- */
(function patchTickEngine(){
  const _origTick2 = window.tickStockEngine || tickStockEngine;
  const _patched = function(stock){
    // Halt check — skip tick si está detenida
    if(isStockHalted(stock.sym)) return;
    
    // Phase Engine
    updateMarketPhase(stock);
    const phaseBias = getPhaseForceBias(stock);
    
    // GEX force (opciones → precio)
    const gexForce = computeGEXForce(stock);
    
    // Earnings IV
    const ivMult = updateEarningsIV(stock);
    if(ivMult !== 1) stock._earningsIVMult = ivMult;
    
    // Short squeeze check
    maybeShortSqueeze(stock);
    
    // Black swan (baja prob)
    if(stock === allStocks[0]) maybeBlackSwan(); // solo en el primer stock para no multiplicar
    
    // Halt check
    if(stock === allStocks[0]) maybeHalt();
    
    // Inject phase bias y GEX en stock para que tickStockEngine lo use
    // Player large limit order magnet effect
  let playerMagnetForce = 0;
  const playerOrdsForStock = (window.playerLimitOrders||[]).filter(o=>o.status==='open'&&o.sym===stock.sym&&o.qty>=10000);
  if(playerOrdsForStock.length){
    playerOrdsForStock.forEach(o=>{
      const dist = (o.price - stock.price) / stock.price;
      const strength = Math.min(0.3, o.qty/50000); // max 0.3 force
      playerMagnetForce += dist * strength * 0.5;
    });
    playerMagnetForce = Math.max(-0.3, Math.min(0.3, playerMagnetForce));
  }
  stock._externalForceBias = (phaseBias * 0.012) + (gexForce * 0.008) + playerMagnetForce;
    
    // Llamar al tick original
    _origTick2(stock);
    
    // Limpiar
    stock._externalForceBias = 0;
  };
  window.tickStockEngine = _patched;
  // Actualizar la referencia en el interval también
  if(typeof allStocks !== 'undefined'){
    allStocks.forEach(s=>{ if(!s._phase) initMarketPhase(s); });
  }
})();
