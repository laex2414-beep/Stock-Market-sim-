<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700;800&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<title>Market Sim — App</title>
<style>
  :root{
    --bg: #000000; --panel: #0A0A0A; --panel-elevated: #111111; --border: #1E1E1E;
    --text: #E8E8E8; --text-dim: #404040;
    --bid: #00E676; --bid-bg: rgba(0,230,118,0.07);
    --ask: #FF1744; --ask-bg: rgba(255,23,68,0.07);
    --amber: #FFD600; --blue: #448AFF; --purple: #E040FB;
    --mono: 'JetBrains Mono', 'IBM Plex Mono', 'SF Mono', Consolas, monospace;
    --sans: 'Inter', -apple-system, sans-serif;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  html,body{ background:var(--bg); color:var(--text); font-family:var(--sans); font-size:13px; height:100%; }

  .market-pulse{ height:5px; width:100%; background:var(--panel); position:relative; overflow:hidden; }
  .market-pulse-fill{ position:absolute; top:0; bottom:0; left:50%; width:38%; background:linear-gradient(90deg, transparent, var(--bid)); }

  .app-shell{ display:flex; height:calc(100vh - 5px); }

  /* ===== SIDEBAR (Trading / Investing switcher) ===== */
  .sidebar{
    width:74px; background:var(--panel-elevated); border-right:1px solid var(--border);
    display:flex; flex-direction:column; align-items:center; padding:14px 0; gap:8px; flex-shrink:0;
  }
  .sidebar .brand-mark{ font-family:var(--mono); font-weight:800; color:var(--amber); font-size:16px; margin-bottom:10px; }
  .sidebar-tab{
    width:58px; display:flex; flex-direction:column; align-items:center; gap:4px; padding:10px 4px;
    border-radius:8px; cursor:pointer; color:var(--text-dim); border:1px solid transparent;
  }
  .sidebar-tab .icon{ font-size:18px; }
  .sidebar-tab .lbl{ font-size:9px; text-transform:uppercase; letter-spacing:0.3px; font-weight:600; }
  .sidebar-tab:hover{ background:rgba(255,255,255,0.03); }
  .sidebar-tab.active{ background:rgba(232,163,61,0.1); border-color:var(--amber); color:var(--amber); }
  .sidebar-tab.active.investing{ background:rgba(77,143,229,0.1); border-color:var(--blue); color:var(--blue); }
  .sidebar-divider{ width:32px; height:1px; background:var(--border); margin:6px 0; }
  .sidebar-tab.active.sandbox{ background:rgba(229,86,107,0.1); border-color:var(--ask); color:var(--ask); }

  .main-area{ flex:1; display:flex; flex-direction:column; min-width:0; overflow:hidden; }

  .topbar{
    height:48px; background:var(--panel-elevated); border-bottom:1px solid var(--border);
    display:flex; align-items:center; padding:0 18px; gap:14px; flex-shrink:0;
  }
  .topbar .section-title{ font-family:var(--mono); font-weight:700; font-size:13px; color:#fff; }
  .topbar .section-title.investing{ color:var(--blue); }
  .topbar .section-title.trading{ color:var(--amber); }
  .topbar select{ background:var(--panel); border:1px solid var(--border); color:#fff; font-family:var(--mono); font-size:12px; padding:6px 10px; border-radius:5px; min-width:220px; }
  .topbar .mode-toggle{ display:flex; gap:4px; }
  .topbar .mode-toggle button{ background:var(--panel); border:1px solid var(--border); color:var(--text-dim); font-size:11px; padding:6px 12px; border-radius:5px; cursor:pointer; font-family:var(--sans); }
  .topbar .mode-toggle button.active{ border-color:var(--amber); color:var(--amber); background:rgba(232,163,61,0.08); }
  .topbar .lang-toggle{ display:flex; gap:2px; }
  .topbar .lang-toggle button{ background:var(--panel); border:1px solid var(--border); color:var(--text-dim); font-size:10px; padding:6px 9px; border-radius:5px; cursor:pointer; font-family:var(--mono); font-weight:700; }
  .topbar .lang-toggle button.active{ border-color:var(--blue); color:var(--blue); background:rgba(77,143,229,0.08); }
  .topbar .session-clock{ margin-left:auto; font-family:var(--mono); font-size:11px; color:var(--text-dim); }
  .topbar .add-chart-btn{
    background:var(--panel); border:1px dashed var(--blue); color:var(--blue); font-size:11px;
    padding:6px 12px; border-radius:5px; cursor:pointer; font-family:var(--sans);
  }

  .panel-tray{ padding:10px 18px 0; display:flex; gap:8px; flex-wrap:wrap; min-height:8px; flex-shrink:0; }
  .panel-tray .tray-label{ font-size:10px; color:var(--text-dim); text-transform:uppercase; align-self:center; margin-right:4px; }
  .panel-tray button{ background:var(--panel); border:1px dashed var(--border); color:var(--text-dim); font-size:10.5px; padding:6px 12px; border-radius:14px; cursor:pointer; font-family:var(--sans); }
  .panel-tray button:hover{ border-color:var(--blue); color:var(--blue); }

  .content-scroll{ flex:1; overflow:auto; padding:8px 10px; }

  .layout{ display:grid; gap:10px; align-items:start; }
  .layout.trading-layout{ grid-template-columns: 1fr 300px; }
  .layout.investing-layout{ grid-template-columns: 260px 1fr 1fr; }
  .layout.sandbox-section-layout{ display:block; }
  .col{ display:flex; flex-direction:column; gap:14px; min-width:0; min-height:40px; }

  .charts-zone{ display:flex; flex-direction:column; gap:14px; }
  .charts-grid{ display:grid; gap:14px; }
  .charts-grid.n1{ grid-template-columns: 1fr; }
  .charts-grid.n2{ grid-template-columns: 1fr 1fr; }
  .charts-grid.n3, .charts-grid.n4{ grid-template-columns: 1fr 1fr; }

  .panel{ background:var(--panel); border:1px solid var(--border); border-radius:8px; overflow:hidden; }
  .panel-header{ padding:10px 14px; border-bottom:1px solid var(--border); background:var(--panel-elevated); display:flex; align-items:center; justify-content:space-between; gap:8px; }
  .panel-header h2{ font-size:10.5px; text-transform:uppercase; letter-spacing:0.5px; color:var(--text-dim); font-weight:600; }
  .panel-close{ width:18px; height:18px; border-radius:4px; border:1px solid var(--border); background:transparent; color:var(--text-dim); cursor:pointer; font-size:11px; line-height:1; flex-shrink:0; display:flex; align-items:center; justify-content:center; }
  .drag-handle{ cursor:grab; color:var(--text-dim); font-size:13px; padding-right:2px; user-select:none; }
  .drag-handle:hover{ color:var(--text); }
  .panel.dragging{ opacity:0.35; outline:1px dashed var(--blue); }
  .col.drag-over{ background:rgba(77,143,229,0.04); border-radius:8px; outline:1px dashed rgba(77,143,229,0.3); }
  .panel-close:hover{ border-color:var(--ask); color:var(--ask); background:rgba(229,86,107,0.08); }

  /* ===== CHART PANEL ===== */
  .chart-toolbar{ display:flex; align-items:center; gap:8px; padding:8px 12px; border-bottom:1px solid var(--border); flex-wrap:wrap; }
  .chart-toolbar select{ background:var(--panel-elevated); border:1px solid var(--border); color:#fff; font-family:var(--mono); font-size:10.5px; padding:4px 8px; border-radius:4px; }
  .chart-tf-group{ display:flex; gap:3px; }
  .chart-draw-group{ display:flex; gap:3px; margin-left:6px; padding-left:6px; border-left:1px solid var(--border); }
  .chart-draw-group button{ background:var(--panel); border:1px solid var(--border); color:var(--text-dim); font-size:11px; padding:4px 6px; border-radius:5px; cursor:pointer; }
  .chart-draw-group button.active{ border-color:var(--amber); color:var(--amber); background:rgba(232,163,61,0.1); }
  .chart-canvas-wrap.drawing-armed{ cursor:crosshair; }
  .chart-tf-group button{ background:transparent; border:1px solid var(--border); color:var(--text-dim); font-size:9.5px; padding:4px 8px; border-radius:4px; cursor:pointer; font-family:var(--sans); }
  .chart-tf-group button.active{ border-color:var(--amber); color:var(--amber); background:rgba(232,163,61,0.08); }
  .chart-price-tag{ margin-left:auto; font-family:var(--mono); font-size:13px; font-weight:700; }
  .chart-stats-row{ display:flex; gap:14px; padding:4px 12px 6px; font-family:var(--mono); font-size:9.5px; color:var(--text-dim); border-bottom:1px solid var(--border); }
  .chart-stats-row .cs-item b{ font-weight:700; }
  .chart-stats-row .cs-pos{ color:var(--bid); }
  .chart-stats-row .cs-neg{ color:var(--ask); }
  .chart-canvas-wrap{ position:relative; height:340px; background:var(--bg); }
  .chart-canvas-wrap svg{ width:100%; height:100%; display:block; }

  .instrument-bar{ display:flex; align-items:center; gap:14px; padding:14px 16px; flex-wrap:wrap; }
  .instrument-bar .sym{ font-family:var(--mono); font-size:20px; font-weight:700; color:#fff; }
  .instrument-bar .name{ font-size:10px; color:var(--text-dim); }
  .instrument-bar .px{ font-family:var(--mono); font-size:20px; font-weight:700; }
  .instrument-bar .px.up{ color:var(--bid); } .instrument-bar .px.down{ color:var(--ask); }
  .instrument-bar .chg{ font-family:var(--mono); font-size:12px; }
  .vol-badge{ font-family:var(--mono); font-size:9px; padding:4px 9px; border-radius:10px; font-weight:700; text-transform:uppercase; margin-left:auto; }
  .vol-badge.low{ background:rgba(63,191,127,0.15); color:var(--bid); }
  .vol-badge.med{ background:rgba(232,163,61,0.15); color:var(--amber); }
  .vol-badge.high{ background:rgba(229,86,107,0.15); color:var(--ask); }
  .vol-badge.extreme{ background:rgba(229,86,107,0.28); color:#ff6b80; box-shadow:0 0 0 1px rgba(255,107,128,0.4); }

  /* ===== ACTIVE TRADER ===== */
  .at-toolbar{ padding:8px 12px; border-bottom:1px solid var(--border); display:flex; gap:8px; align-items:center; }
  .at-toolbar input{ width:60px; background:var(--panel-elevated); border:1px solid var(--border); color:var(--amber); font-family:var(--mono); font-size:11px; padding:4px 6px; border-radius:4px; font-weight:700; }
  .at-toolbar .qty-quick{ background:transparent; border:1px solid var(--border); color:var(--text-dim); font-size:9.5px; padding:4px 7px; border-radius:4px; cursor:pointer; }
  .at-rows{ max-height:300px; overflow-y:auto; }
  .at-row{ display:grid; grid-template-columns: 1fr 70px 1fr; height:24px; align-items:center; font-family:var(--mono); font-size:11px; position:relative; }
  .at-btn{ border:none; height:100%; width:100%; cursor:pointer; font-size:9px; font-weight:700; color:transparent; }
  .at-row:hover .at-btn.buy{ background:rgba(63,191,127,0.3); color:#fff; }
  .at-row:hover .at-btn.sell{ background:rgba(229,86,107,0.3); color:#fff; }
  .at-price{ text-align:center; font-weight:600; background:var(--panel-elevated); }
  .at-price.spot{ color:var(--amber); }

  /* ===== ACTIVE OPTION TRADER (dedicated panel) ===== */
  .aot-toolbar{ display:flex; align-items:center; gap:6px; padding:8px 12px; border-bottom:1px solid var(--border); flex-wrap:wrap; }
  .aot-toolbar select{ background:var(--panel-elevated); border:1px solid var(--border); color:#fff; font-family:var(--mono); font-size:10px; padding:4px 6px; border-radius:4px; }
  .aot-toolbar input{ width:46px; background:var(--panel-elevated); border:1px solid var(--border); color:var(--amber); font-family:var(--mono); font-size:11px; padding:3px 5px; border-radius:4px; }
  .aot-quote-bar{ display:flex; justify-content:space-around; padding:10px 12px; border-bottom:1px solid var(--border); font-family:var(--mono); }
  .aot-quote-bar .q-lbl{ font-size:8px; color:var(--text-dim); text-transform:uppercase; display:block; }
  .aot-quote-bar .q-val{ font-size:14px; font-weight:700; }
  .aot-btn-grid{ display:grid; grid-template-columns:1fr 1fr; gap:6px; padding:10px 12px; }
  .aot-btn-grid button{ padding:10px; border:none; border-radius:5px; font-weight:700; font-size:11px; cursor:pointer; font-family:var(--sans); }
  .aot-btn-buy{ background:var(--bid); color:#08130C; }
  .aot-btn-buy-bid{ background:rgba(63,191,127,0.25); color:var(--bid); border:1px solid var(--bid); }
  .aot-btn-buyall{ background:var(--amber); color:#1A1306; }
  .aot-btn-sellall{ background:var(--ask); color:#1A0707; }
  .aot-btn-sell-bid{ background:rgba(229,86,107,0.25); color:var(--ask); border:1px solid var(--ask); }
  .aot-btn-shortcall{ background:var(--purple); color:#fff; }
  .aot-btn-shortall{ background:rgba(155,126,224,0.3); color:var(--purple); border:1px solid var(--purple); }
  .aot-routing-row{ display:flex; align-items:center; gap:8px; padding:8px 12px; border-bottom:1px solid var(--border); }
  .aot-routing-label{ font-size:9px; color:var(--text-dim); text-transform:uppercase; flex-shrink:0; }
  .aot-routing-group{ display:flex; gap:3px; flex:1; }
  .aot-routing-group button{ flex:1; background:transparent; border:1px solid var(--border); color:var(--text-dim); font-size:8.5px; padding:5px 4px; border-radius:4px; cursor:pointer; font-family:var(--mono); font-weight:700; }
  .aot-routing-group button[data-routing="sweep"].active{ border-color:#9B59E0; color:#9B59E0; background:rgba(155,89,224,0.12); }
  .aot-routing-group button[data-routing="block"].active{ border-color:#3D8FE5; color:#3D8FE5; background:rgba(61,143,229,0.12); }
  .aot-routing-group button[data-routing="split"].active{ border-color:#E5872E; color:#E5872E; background:rgba(229,135,46,0.12); }
  .aot-routing-group button[data-routing="normal"].active{ border-color:var(--text-dim); color:#fff; background:rgba(255,255,255,0.06); }
  .aot-panic-grid{ border-top:1px solid var(--border); padding-top:10px; }
  .aot-pos-row{ display:flex; justify-content:space-between; padding:6px 12px; font-family:var(--mono); font-size:10.5px; border-top:1px solid var(--border); }

  /* WATCHLIST */
  .sector-group{ padding:10px 14px; }
  .sector-label{ font-size:9.5px; color:var(--purple); text-transform:uppercase; letter-spacing:0.4px; margin-bottom:6px; font-weight:600; }
  .stock-row{ display:flex; align-items:center; justify-content:space-between; padding:5px 0; cursor:pointer; border-bottom:1px solid rgba(255,255,255,0.03); }
  .stock-row:hover{ background:rgba(255,255,255,0.02); }
  .stock-row.selected{ outline:1px solid var(--amber); border-radius:4px; }
  .stock-row .sym{ font-family:var(--mono); font-weight:700; font-size:11px; }
  .stock-row .px{ font-family:var(--mono); font-size:11px; text-align:right; }

  .dom-cols-header{ display:grid; grid-template-columns: 22px 56px 1fr 60px 60px 1fr 56px 22px; gap:5px; padding:7px 14px; font-size:8px; color:var(--text-dim); text-transform:uppercase; border-bottom:1px solid var(--border); }
  .dom-cols-header span{ text-align:center; }
  .dom-rows{ max-height:300px; overflow-y:auto; }
  .dom-row{ display:grid; grid-template-columns: 22px 56px 1fr 60px 60px 1fr 56px 22px; gap:5px; align-items:center; height:24px; font-family:var(--mono); font-size:10px; padding:0 14px; border-bottom:1px solid rgba(255,255,255,0.025); }
  .dom-row.spot-row{ background:var(--panel-elevated); height:26px; }
  .dom-row .lvl-idx{ font-size:8px; color:var(--text-dim); opacity:0.55; text-align:center; }
  .dom-size-cell{ text-align:right; font-weight:700; border-radius:3px; padding:2px 5px; height:16px; display:flex; align-items:center; justify-content:flex-end; }
  .dom-size-cell.bid{ color:var(--bid); background:rgba(63,191,127,0.08); }
  .dom-size-cell.ask{ color:var(--ask); background:rgba(229,86,107,0.08); justify-content:flex-start; text-align:left; }
  .dom-bar-track{ height:12px; border-radius:3px; overflow:hidden; position:relative; background:rgba(255,255,255,0.025); }
  .dom-bar-track.bid-track{ direction:rtl; }
  .dom-bar-fill{ height:100%; border-radius:3px; }
  .dom-bar-fill.bid{ background:linear-gradient(90deg, rgba(63,191,127,0.3), var(--bid)); }
  .dom-bar-fill.ask{ background:linear-gradient(270deg, rgba(229,86,107,0.3), var(--ask)); }
  .dom-price-cell{ text-align:center; font-weight:700; color:var(--text-dim); padding:2px 4px; border-radius:3px; }
  .dom-price-cell.spot{ color:#0A0C10; background:var(--amber); font-size:11px; font-weight:800; }
  .dom-price-cell.bid-price{ color:var(--bid); } .dom-price-cell.ask-price{ color:var(--ask); }
  .dom-price-cell.wall{ background:rgba(155,126,224,0.14); outline:1px solid var(--purple); }
  .dom-footer{ padding:8px 14px; border-top:1px solid var(--border); display:grid; grid-template-columns:1fr 1fr; gap:8px; }
  .dom-footer-stat{ font-family:var(--mono); font-size:9.5px; background:var(--panel-elevated); border-radius:5px; padding:6px 10px; }
  .dom-footer-stat .lbl{ color:var(--text-dim); font-family:var(--sans); font-size:8.5px; text-transform:uppercase; }
  .dom-footer-stat .val{ font-size:13px; font-weight:700; }
  .dom-footer-stat .val.bid-c{ color:var(--bid); } .dom-footer-stat .val.ask-c{ color:var(--ask); }

  /* === L2 v2: columnas separadas, colores por intensidad === */
  .l2v2-header{ display:flex; justify-content:space-between; align-items:baseline; padding:7px 10px 3px; background:var(--panel-elevated); border-bottom:0.5px solid var(--border); }
  .l2v2-sym{ font-family:var(--mono); font-size:11px; font-weight:700; color:var(--text-primary); letter-spacing:.5px; }
  .l2v2-spot{ font-family:var(--mono); font-size:13px; font-weight:700; }
  .l2v2-pressure{ height:6px; display:flex; background:var(--border); margin:0 10px 2px; border-radius:3px; overflow:hidden; }
  .l2v2-pbar-ask{ background:#FF4B4B; opacity:.7; }
  .l2v2-pbar-bid{ background:#22D47A; opacity:.7; }
  .l2v2-plabels{ display:flex; justify-content:space-between; padding:0 10px 3px; font-family:var(--mono); font-size:8.5px; }
  .l2v2-walls{ display:flex; justify-content:space-between; padding:2px 10px 5px; font-family:var(--mono); font-size:8.5px; border-bottom:1px solid var(--border); }
  .l2v2-col-hdr{ display:grid; grid-template-columns:46px 48px 60px 1fr 60px 48px 46px; padding:3px 8px; font-size:7.5px; text-transform:uppercase; letter-spacing:.5px; color:var(--text-dim); border-bottom:1px solid var(--border); background:var(--panel-elevated); }
  .l2v2-col-hdr .l2v2-ask-px-hdr{ text-align:right; padding-right:4px; color:#FF4B4B; }
  .l2v2-col-hdr .l2v2-price-hdr{ text-align:center; color:var(--amber); }
  .l2v2-col-hdr .l2v2-bid-px-hdr{ text-align:left; padding-left:4px; color:#22D47A; }
  .l2v2-row{ display:grid; grid-template-columns:46px 48px 60px 1fr 60px 48px 46px; padding:2px 8px; border-bottom:0.5px solid rgba(255,255,255,.04); align-items:center; min-height:19px; font-family:var(--mono); transition:background .15s; }
  .l2v2-row:hover{ filter:brightness(1.2); }
  .l2v2-exch{ font-size:8px; letter-spacing:.3px; }
  .l2v2-sz{ font-size:10px; text-align:center; }
  .l2v2-ask-px{ font-size:11px; font-weight:500; text-align:right; padding-right:6px; }
  .l2v2-bid-px{ font-size:11px; font-weight:500; text-align:left; padding-left:6px; }
  .l2v2-center-px{ display:block; }
  .l2v2-spot-row{ display:grid; grid-template-columns:46px 48px 60px 1fr 60px 48px 46px; padding:6px 8px; border-top:1.5px solid var(--amber); border-bottom:1.5px solid var(--amber); background:var(--panel-elevated); align-items:center; }
  .l2v2-spot-center{ display:flex; flex-direction:column; align-items:center; gap:1px; }
  .l2v2-spot-px{ font-family:var(--mono); font-size:15px; font-weight:700; color:var(--amber); }
  .l2v2-spot-spread{ font-size:8px; color:var(--text-dim); font-family:var(--mono); }

  /* === NUEVO TS: Absorción === */
  /* === NUEVO TS: Absorción === */
  .ts-absorb-top{ padding:7px 10px 5px; background:var(--panel-elevated); border-bottom:1px solid var(--border); }
  .ts-absorb-label{ font-size:8px; color:var(--text-dim); text-transform:uppercase; letter-spacing:.4px; margin-bottom:4px; }
  .ts-absorb-track{ height:9px; border-radius:5px; background:var(--border); overflow:hidden; display:flex; }
  .ts-absorb-buy{ height:100%; background:var(--bid); }
  .ts-absorb-sell{ height:100%; background:var(--ask); }
  .ts-absorb-nums{ display:flex; justify-content:space-between; font-family:var(--mono); font-size:9px; margin-top:3px; }
  .ts-print-row{ display:grid; grid-template-columns:44px 1fr 60px; gap:6px; padding:4px 8px; border-bottom:0.5px solid var(--border); align-items:center; }
  .ts-print-row.ts-sweep{ background:rgba(232,163,61,.07); }
  .ts-p-time{ font-family:var(--mono); font-size:8.5px; color:var(--text-dim); }
  .ts-p-mid{ display:flex; flex-direction:column; gap:2px; }
  .ts-p-px{ font-family:var(--mono); font-size:11px; font-weight:500; }
  .ts-p-bar-wrap{ height:5px; background:var(--border); border-radius:3px; overflow:hidden; }
  .ts-p-bar{ height:100%; border-radius:3px; }
  .ts-p-right{ display:flex; flex-direction:column; align-items:flex-end; gap:2px; }
  .ts-p-sz{ font-family:var(--mono); font-size:10px; }

    flex:1; height:20px; border:none; border-radius:3px; font-size:9px; font-weight:700; cursor:pointer; font-family:var(--sans);
  }
  .oc-trade-btn.buy{ background:rgba(63,191,127,0.2); color:var(--bid); }
  .oc-trade-btn.buy:hover{ background:var(--bid); color:#08130C; }
  .oc-trade-btn.sell{ background:rgba(229,86,107,0.2); color:var(--ask); }
  .oc-trade-btn.sell:hover{ background:var(--ask); color:#1A0707; }
  .oc-flow-row{ display:flex; align-items:center; gap:8px; padding:5px 14px; }
  .oc-flow-lbl{ font-family:var(--mono); font-size:9px; font-weight:700; width:36px; }
  .oc-flow-lbl.call{ color:var(--bid); } .oc-flow-lbl.put{ color:var(--ask); }
  .oc-flow-track{ flex:1; height:6px; border-radius:3px; background:var(--ask); opacity:0.5; overflow:hidden; }
  .oc-flow-fill.buy{ height:100%; background:var(--bid); opacity:1; }
  .oc-flow-nums{ font-family:var(--mono); font-size:9px; white-space:nowrap; }
  .oc-flow-verdict{ text-align:center; padding:4px; font-family:var(--mono); font-size:10px; font-weight:700; border-bottom:1px solid var(--border); }
  .oc-flow-verdict.bullish{ color:var(--bid); background:rgba(63,191,127,0.06); }
  .oc-flow-verdict.bearish{ color:var(--ask); background:rgba(229,86,107,0.06); }
  .oc-accum-badge{
    font-size:7px; background:var(--amber); color:#1A1306; padding:0 3px; border-radius:2px; margin-left:3px; font-weight:700;
  }

  /* ===== OPTION FLOW STREAM (Unusual Whales style) ===== */
  .of-filters{ display:flex; align-items:center; gap:8px; padding:8px 12px; border-bottom:1px solid var(--border); flex-wrap:wrap; }
  .of-filters select{ background:var(--panel-elevated); border:1px solid var(--border); color:#fff; font-family:var(--mono); font-size:10px; padding:4px 7px; border-radius:4px; }
  .of-filters .of-filter-group{ display:flex; gap:3px; }
  .of-filters .of-filter-group button{ background:transparent; border:1px solid var(--border); color:var(--text-dim); font-size:9.5px; padding:4px 8px; border-radius:4px; cursor:pointer; font-family:var(--sans); }
  .of-filters .of-filter-group button.active{ border-color:var(--blue); color:var(--blue); background:rgba(77,143,229,0.08); }
  .of-count{ margin-left:auto; font-family:var(--mono); font-size:9px; color:var(--text-dim); }
  .of-table-header{ display:grid; grid-template-columns: 52px 46px 44px 32px 28px 38px 46px 58px 36px 44px; gap:4px; padding:6px 10px; font-size:7.5px; color:var(--text-dim); text-transform:uppercase; border-bottom:1px solid var(--border); }
  .of-rows{ max-height:380px; overflow-y:auto; }
  .of-row{ display:grid; grid-template-columns: 52px 46px 44px 32px 28px 38px 46px 58px 36px 44px; gap:4px; padding:4px 10px; font-family:var(--mono); font-size:9.5px; align-items:center; border-bottom:1px solid rgba(255,255,255,0.025); }
  .of-row.player-row{ background:rgba(232,163,61,0.08); outline:1px solid rgba(232,163,61,0.4); }
  .of-row .of-time{ color:var(--text-dim); }
  .of-row .of-sym{ font-weight:700; color:#fff; }
  .of-row .of-type-call{ color:var(--bid); } .of-row .of-type-put{ color:var(--ask); }
  .of-row .of-side-ask{ color:var(--bid); font-weight:700; } .of-row .of-side-bid{ color:var(--ask); font-weight:700; } .of-row .of-side-mid{ color:var(--text-dim); }
  .of-row .of-premium{ font-weight:700; }
  .of-player-tag{ font-size:7px; background:var(--amber); color:#1A1306; padding:0 3px; border-radius:2px; font-weight:700; }
  .of-empty{ padding:30px; text-align:center; color:var(--text-dim); font-size:10.5px; }

  /* ===== SCANNER WIDGET (Step 6) — persistent floating alert panel ===== */
  .scanner-widget{
    position:fixed; bottom:16px; right:16px; width:320px; max-height:340px; z-index:1200;
    background:var(--panel); border:1px solid var(--purple); border-radius:8px;
    box-shadow:0 8px 30px rgba(0,0,0,0.5); display:flex; flex-direction:column; overflow:hidden;
  }
  .scanner-widget.collapsed .scanner-body{ display:none; }
  .scanner-header{ display:flex; align-items:center; padding:8px 12px; background:var(--panel-elevated); border-bottom:1px solid var(--border); cursor:default; }
  .scanner-title{ font-family:var(--mono); font-weight:700; font-size:11px; color:var(--purple); }
  .scanner-toggle{ margin-left:auto; width:18px; height:18px; border-radius:4px; border:1px solid var(--border); background:transparent; color:var(--text-dim); cursor:pointer; font-size:11px; }
  .scanner-body{ max-height:290px; overflow-y:auto; padding:6px; display:flex; flex-direction:column; gap:6px; }
  .scanner-empty{ padding:16px; text-align:center; color:var(--text-dim); font-size:10px; }
  .scanner-alert{
    background:var(--panel-elevated); border:1px solid rgba(155,126,224,0.4); border-radius:6px;
    padding:8px 10px; cursor:pointer; font-size:10.5px; line-height:1.4; animation: scannerPulse 0.4s ease-out;
  }
  .scanner-alert:hover{ border-color:var(--purple); background:rgba(155,126,224,0.08); }
  .scanner-alert .sa-time{ font-family:var(--mono); font-size:8px; color:var(--text-dim); }
  @keyframes scannerPulse{ from{ opacity:0; transform:translateX(8px); } to{ opacity:1; transform:translateX(0); } }

  /* ===== CONFIRMATION MODAL (Buy All / Sell All — Step 7) ===== */
  .confirm-overlay{
    display:none; position:fixed; inset:0; background:rgba(0,0,0,0.6); z-index:2000;
    align-items:center; justify-content:center;
  }
  .confirm-overlay.open{ display:flex; }
  .confirm-modal{ background:var(--panel); border:1px solid var(--amber); border-radius:10px; width:340px; padding:18px; }
  .confirm-title{ font-family:var(--mono); font-weight:700; font-size:13px; color:var(--amber); margin-bottom:10px; }
  .confirm-body{ font-size:11.5px; line-height:1.6; color:var(--text); margin-bottom:16px; }
  .confirm-body b{ color:#fff; }
  .confirm-actions{ display:flex; gap:8px; }
  .confirm-actions button{ flex:1; padding:9px; border:none; border-radius:5px; font-weight:700; font-size:11px; cursor:pointer; font-family:var(--sans); }
  .confirm-cancel{ background:var(--panel-elevated); color:var(--text-dim); border:1px solid var(--border) !important; }
  .confirm-ok{ background:var(--amber); color:#1A1306; }

  /* ===== SANDBOX SECTION (Step 12 — Dev God Mode) ===== */
  .sandbox-wrap{ max-width:900px; margin:0 auto; display:flex; flex-direction:column; gap:16px; padding:8px; }
  .sandbox-card{ background:var(--panel); border:1px solid var(--ask); border-radius:8px; overflow:hidden; }
  .sandbox-card-header{ padding:12px 16px; background:var(--panel-elevated); border-bottom:1px solid var(--border); }
  .sandbox-card-header h3{ font-family:var(--mono); font-size:12px; color:var(--ask); text-transform:uppercase; letter-spacing:0.5px; }
  .sandbox-card-body{ padding:16px; }
  .sandbox-field-row{ display:flex; align-items:center; gap:12px; margin-bottom:12px; }
  .sandbox-field-row label{ font-size:11px; color:var(--text-dim); width:160px; flex-shrink:0; }
  .sandbox-field-row input{
    flex:1; background:var(--panel-elevated); border:1px solid var(--border); color:var(--amber);
    font-family:var(--mono); font-size:13px; font-weight:700; padding:8px 10px; border-radius:5px;
  }
  .sandbox-field-row input:focus{ outline:none; border-color:var(--amber); }
  .sandbox-field-row button{ background:var(--blue); color:#fff; border:none; padding:8px 14px; border-radius:5px; font-weight:700; font-size:11px; cursor:pointer; font-family:var(--sans); }
  .sandbox-current-val{ font-family:var(--mono); font-size:10px; color:var(--text-dim); margin-top:-6px; margin-bottom:12px; }
  .sandbox-danger-zone{ border-color:var(--ask); }
  .sandbox-danger-zone .sandbox-card-header{ background:rgba(229,86,107,0.1); }
  .sandbox-reset-btn{
    background:var(--ask); color:#1A0707; border:none; padding:12px 20px; border-radius:6px;
    font-weight:800; font-size:12px; cursor:pointer; font-family:var(--sans); width:100%;
  }
  .sandbox-reset-warning{ font-size:10.5px; color:var(--text-dim); margin-top:8px; line-height:1.5; }

  /* ===== HELP & DOCUMENTATION (Step 13) ===== */
  .help-tabs{ display:flex; flex-direction:column; gap:2px; padding:8px; border-bottom:1px solid var(--border); background:var(--panel-elevated); }
  .help-tabs button{ background:transparent; border:1px solid transparent; color:var(--text-dim); font-size:10.5px; padding:7px 10px; border-radius:5px; cursor:pointer; font-family:var(--sans); text-align:left; }
  .help-tabs button.active{ border-color:var(--blue); color:var(--blue); background:rgba(77,143,229,0.08); }
  .help-content{ max-height:480px; overflow-y:auto; padding:16px; font-size:11.5px; line-height:1.7; color:var(--text); }
  .help-content h4{ font-family:var(--mono); font-size:12.5px; color:var(--amber); margin:16px 0 8px; text-transform:uppercase; letter-spacing:0.3px; }
  .help-content h4:first-child{ margin-top:0; }
  .help-content p{ margin-bottom:10px; color:var(--text-dim); }
  .help-content b{ color:#fff; }
  .help-strategy-grid{ display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-top:8px; }
  .help-strategy-card{ background:var(--panel-elevated); border-radius:6px; padding:10px; border-left:2px solid var(--purple); }
  .help-strategy-card .hs-name{ font-family:var(--mono); font-size:10.5px; font-weight:700; color:#fff; margin-bottom:3px; }
  .help-strategy-card .hs-desc{ font-size:10px; color:var(--text-dim); line-height:1.5; }
  .help-strategy-card .hs-field{ font-size:9.5px; color:var(--text-dim); line-height:1.6; margin-top:4px; }
  .help-strategy-card .hs-field b{ color:var(--amber); font-weight:600; }
  .help-strategy-card{ grid-column: span 1; }
  .help-greek-row{ display:grid; grid-template-columns:60px 1fr; gap:10px; padding:8px 0; border-bottom:1px solid rgba(255,255,255,0.04); }
  .help-greek-row .hg-name{ font-family:var(--mono); font-weight:700; color:var(--amber); }
  .help-color-chip{ display:inline-block; width:8px; height:8px; border-radius:2px; margin-right:5px; }

  /* ===== RISK PROFILE / ANALYZE TAB (Step F) ===== */
  .rp-builder{ padding:10px 14px; border-bottom:1px solid var(--border); }
  .rp-builder-label{ font-size:9px; color:var(--text-dim); text-transform:uppercase; margin-bottom:6px; }
  .rp-leg-row{ display:grid; grid-template-columns: 1fr 60px 50px 24px; gap:6px; align-items:center; padding:4px 0; font-family:var(--mono); font-size:10.5px; }
  .rp-leg-row .rp-leg-side-toggle{ display:flex; gap:2px; }
  .rp-leg-row .rp-leg-side-toggle button{ flex:1; font-size:8.5px; padding:3px; border-radius:3px; border:1px solid var(--border); background:transparent; color:var(--text-dim); cursor:pointer; }
  .rp-leg-row .rp-leg-side-toggle button.active.buy{ border-color:var(--bid); color:var(--bid); background:rgba(63,191,127,0.1); }
  .rp-leg-row .rp-leg-side-toggle button.active.sell{ border-color:var(--ask); color:var(--ask); background:rgba(229,86,107,0.1); }
  .rp-leg-remove{ background:transparent; border:1px solid var(--border); color:var(--text-dim); width:20px; height:20px; border-radius:4px; cursor:pointer; font-size:10px; }
  .rp-builder-empty{ font-size:10px; color:var(--text-dim); padding:8px 0; }
  .rp-multiplier-row{ display:flex; align-items:center; gap:8px; margin-top:8px; padding-top:8px; border-top:1px solid var(--border); }
  .rp-multiplier-label{ font-size:10px; color:var(--text-dim); flex:1; }
  .rp-multiplier-row input{ width:60px; background:var(--panel-elevated); border:1px solid var(--border); color:var(--amber); font-family:var(--mono); font-size:12px; font-weight:700; padding:6px 8px; border-radius:5px; }
  .rp-analyze-row{ display:flex; gap:6px; margin-top:8px; }
  .rp-analyze-btn{ flex:1; background:var(--blue); color:#fff; border:none; padding:8px; border-radius:5px; font-weight:700; font-size:10.5px; cursor:pointer; }
  .rp-execute-btn{ flex:1; background:var(--amber); color:#1A1306; border:none; padding:8px; border-radius:5px; font-weight:700; font-size:10.5px; cursor:pointer; }
  .rp-clear-btn{ background:transparent; border:1px solid var(--border); color:var(--text-dim); padding:8px 12px; border-radius:5px; font-size:10.5px; cursor:pointer; }
  .rp-meta-row{ padding:8px 14px; border-bottom:1px solid var(--border); font-family:var(--mono); font-size:10px; color:var(--text-dim); display:flex; gap:14px; }
  .rp-canvas-wrap{ padding:10px; height:260px; }
  .rp-metrics-grid{ display:grid; grid-template-columns: 1fr 1fr 1fr; gap:8px; padding:10px 14px; border-top:1px solid var(--border); }
  .rp-metric{ background:var(--panel-elevated); border-radius:6px; padding:8px; text-align:center; }
  .rp-metric .rpm-lbl{ font-size:8px; color:var(--text-dim); text-transform:uppercase; }
  .rp-metric .rpm-val{ font-family:var(--mono); font-size:13px; font-weight:700; margin-top:2px; }
  .rp-legend{ display:flex; gap:14px; padding:6px 14px 10px; font-size:9px; color:var(--text-dim); }
  .rp-legend span{ display:flex; align-items:center; gap:4px; }
  .rp-legend-line{ width:14px; height:2px; display:inline-block; }
  .rp-empty-state{ padding:40px 20px; text-align:center; color:var(--text-dim); font-size:11px; line-height:1.6; }

  ::-webkit-scrollbar{ width:6px; height:6px; } ::-webkit-scrollbar-thumb{ background:var(--border); border-radius:3px; }
  /* === TRADING ACADEMY === */
  .acad-wrap{display:flex;flex-direction:column;height:100%;overflow:hidden;}
  .acad-header{padding:8px 12px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;background:var(--panel-elevated);}
  .acad-tabs{display:flex;gap:2px;padding:5px 6px;overflow-x:auto;border-bottom:1px solid var(--border);background:var(--panel-elevated);flex-shrink:0;}
  .acad-tab{background:none;border:1px solid transparent;border-radius:6px;padding:4px 7px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:1px;min-width:48px;font-size:15px;}
  .acad-tab:hover{background:rgba(255,255,255,.04);}
  .acad-tab.act{background:rgba(232,163,61,.12);border-color:rgba(232,163,61,.3);}
  .acad-tab.lck{opacity:.4;cursor:not-allowed;}
  .acad-tab-lbl{font-size:7px;color:var(--text-dim);white-space:nowrap;}
  .acad-tab.act .acad-tab-lbl{color:var(--amber);}
  .acad-content{flex:1;overflow-y:auto;padding:12px;}
  .acad-locked{display:flex;flex-direction:column;align-items:center;padding:28px 12px;gap:8px;}
  .acad-locked-title{font-size:13px;font-weight:700;color:var(--text-primary);}
  .acad-locked-sub{font-size:10px;color:var(--text-dim);text-align:center;max-width:220px;}
  .acad-prog{width:160px;height:5px;background:var(--border);border-radius:3px;overflow:hidden;}
  .acad-prog-fill{height:100%;background:var(--amber);border-radius:3px;}
  .acad-mod-hdr{display:flex;gap:10px;align-items:center;margin-bottom:12px;padding-bottom:10px;border-bottom:1px solid var(--border);}
  .acad-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
  .acad-card{background:var(--panel-elevated);border:1px solid var(--border);border-radius:8px;padding:12px 8px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:4px;transition:all .15s;}
  .acad-card:hover{border-color:var(--amber);background:rgba(232,163,61,.06);}
  .acad-card-title{font-size:10px;color:var(--text-primary);text-align:center;font-family:var(--sans);font-weight:600;}
  .acad-back{background:none;border:1px solid var(--border);border-radius:5px;padding:5px 10px;color:var(--text-dim);cursor:pointer;font-size:10px;margin-bottom:12px;font-family:var(--sans);}
  .acad-back:hover{color:var(--text-primary);border-color:var(--amber);}
  .acad-lesson-hdr{display:flex;gap:10px;align-items:center;margin-bottom:12px;padding-bottom:10px;border-bottom:1px solid var(--border);}
  .acad-lesson-title{font-size:13px;font-weight:700;color:var(--text-primary);}
  .acad-lesson-mod{font-size:9px;color:var(--text-dim);margin-top:2px;}
  .acad-lesson-body{font-size:11px;line-height:1.7;color:var(--text-primary);font-family:var(--sans);}
  .acad-lesson-body b{color:var(--amber);}
  .acad-tip{background:rgba(34,212,122,.08);border:1px solid rgba(34,212,122,.2);border-radius:6px;padding:9px 11px;font-size:10px;color:#22D47A;margin-top:12px;font-family:var(--sans);}

  /* === WATCHLIST === */
  .wl-wrap{ display:flex; flex-direction:column; height:100%; overflow-y:auto; }
  .wl-header{ display:grid; grid-template-columns:1fr 70px 70px 50px; padding:5px 10px; font-size:8px; color:var(--text-dim); text-transform:uppercase; border-bottom:1px solid var(--border); background:var(--panel-elevated); position:sticky; top:0; }
  .wl-row{ display:grid; grid-template-columns:1fr 70px 70px 50px; padding:7px 10px; border-bottom:0.5px solid var(--border); cursor:pointer; align-items:center; transition:background .1s; }
  .wl-row:hover{ background:rgba(255,255,255,.04); }
  .wl-sym{ display:flex; align-items:center; gap:8px; }
  .wl-sym-logo{ width:26px; height:26px; border-radius:6px; display:flex; align-items:center; justify-content:center; font-size:11px; font-weight:700; color:#fff; flex-shrink:0; }
  .wl-sym-name{ font-family:var(--mono); font-size:11px; font-weight:600; color:var(--text-primary); }
  .wl-sym-full{ font-size:8px; color:var(--text-dim); }
  .wl-price{ font-family:var(--mono); font-size:11px; font-weight:600; text-align:right; }
  .wl-chg{ font-family:var(--mono); font-size:10px; font-weight:600; text-align:right; }
  .wl-chg.pos{ color:#22D47A; }
  .wl-chg.neg{ color:#FF4B4B; }
  .wl-vol{ font-family:var(--mono); font-size:9px; color:var(--text-dim); text-align:right; }

  /* === NEWS FEED === */
  .news-wrap{ display:flex; flex-direction:column; gap:0; min-height:600px; overflow-y:auto; }
  #body-news{ min-height:600px; }
  #body-mmdesk{ min-height:calc(100vh - 120px); }
  #body-scanner{ min-height:600px; }
  #body-sentiment{ min-height:500px; }
  #body-watchlist{ min-height:500px; }
  #body-helpDocs{ min-height:500px; }
  .news-empty{ padding:20px; text-align:center; color:var(--text-dim); font-size:11px; }
  .news-item{ padding:10px 12px; border-bottom:1px solid var(--border); cursor:pointer; transition:background .1s; }
  .news-item:hover{ background:rgba(255,255,255,.03); }
  .news-item-header{ display:flex; align-items:center; gap:8px; margin-bottom:5px; }
  .news-sym{ font-family:var(--mono); font-size:10px; font-weight:700; color:var(--amber); }
  .news-impact{ font-size:9px; font-weight:700; }
  .news-time{ font-size:8.5px; color:var(--text-dim); margin-left:auto; }
  .news-text{ font-size:10.5px; color:var(--text-primary); line-height:1.5; font-family:var(--sans); }

  /* === SCANNER === */
  .scan-section{ border-bottom:1px solid var(--border); padding-bottom:6px; margin-bottom:2px; }
  .scan-title{ font-size:9px; font-weight:700; color:var(--text-dim); text-transform:uppercase; letter-spacing:.4px; padding:8px 10px 4px; }
  .scan-header{ display:grid; grid-template-columns:20px 1fr 70px 70px 60px; padding:3px 10px; font-size:7.5px; color:var(--text-dim); text-transform:uppercase; }
  .scan-row{ display:grid; grid-template-columns:20px 1fr 70px 70px 60px; padding:5px 10px; border-bottom:0.5px solid rgba(255,255,255,.04); cursor:pointer; align-items:center; font-family:var(--mono); font-size:10px; }
  .scan-row:hover{ background:rgba(255,255,255,.04); }
  .scan-row.scan-options{ grid-template-columns:1fr 1fr 1fr 1fr; }
  .scan-rank{ color:var(--text-dim); font-size:8px; }
  .scan-sym{ font-weight:700; color:var(--text-primary); }
  .scan-price{ color:var(--text-primary); text-align:right; }
  .scan-chg{ text-align:right; font-weight:600; }
  .scan-chg.pos{ color:#22D47A; }
  .scan-chg.neg{ color:#FF4B4B; }
  .scan-vol{ text-align:right; color:var(--text-dim); font-size:9px; }

  /* === DARK POOL === */
  .dp-header-row{ display:grid; grid-template-columns:65px 45px 60px 75px 75px 50px; padding:5px 8px; font-size:7.5px; color:var(--text-dim); text-transform:uppercase; border-bottom:1px solid var(--border); background:var(--panel-elevated); position:sticky; top:0; }
  .dp-row{ display:grid; grid-template-columns:65px 45px 60px 75px 75px 50px; padding:4px 8px; border-bottom:0.5px solid rgba(255,255,255,.04); cursor:pointer; align-items:center; font-family:var(--mono); font-size:9.5px; }

  /* ── SURVIVAL MODE ── */
  .survival-hud{ position:fixed; top:0; left:56px; right:0; height:28px; background:#0A0000; border-bottom:1px solid #2a0a0a; display:flex; align-items:center; padding:0 14px; gap:16px; z-index:800; font-family:var(--mono); font-size:9.5px; transition:top .3s; }

  .pdt-badge{ background:rgba(255,23,68,.15); border:1px solid var(--ask); color:var(--ask); font-size:8px; padding:1px 6px; border-radius:3px; font-weight:700; }

  /* ── DRAGGABLE RESIZABLE PANELS ── */
  .panel{ position:relative; }
  .panel-resize-handle{
    position:absolute; bottom:0; right:0; width:14px; height:14px;
    cursor:se-resize; z-index:10;
    background:linear-gradient(135deg, transparent 50%, var(--border) 50%);
    border-radius:0 0 6px 0;
  }
  .panel-resize-handle:hover{ background:linear-gradient(135deg, transparent 50%, var(--amber) 50%); }
  .panel.dragging-panel{ opacity:.6; outline:1.5px dashed var(--amber); cursor:grabbing; }
  .panel.drag-over-panel{ outline:1.5px dashed var(--blue); }
  .panel-header{ cursor:grab; }
  .panel-header:active{ cursor:grabbing; }

  .lb-header-row{ display:grid; grid-template-columns:24px 1fr 70px 60px 50px; padding:5px 12px; font-size:8px; color:var(--text-dim); text-transform:uppercase; letter-spacing:.5px; border-bottom:1px solid var(--border); font-family:var(--mono); }

<!-- Firebase SDKs -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getDatabase, ref, set, get, onValue, update, push } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyB1zScfL30PoCxXio0EN7oCk0YLaoBOhPo",
  authDomain: "stock-market-sim-e7d8e.firebaseapp.com",
  databaseURL: "https://stock-market-sim-e7d8e-default-rtdb.firebaseio.com",
  projectId: "stock-market-sim-e7d8e",
  storageBucket: "stock-market-sim-e7d8e.firebasestorage.app",
  messagingSenderId: "128643077004",
  appId: "1:128643077004:web:bb173d52481ba2a4463ca9",
  measurementId: "G-F5T39KLX28"
};

const fbApp = initializeApp(firebaseConfig);
const fbAuth = getAuth(fbApp);
const fbDb = getDatabase(fbApp);

// ========== GLOBALS EXPOSED TO THE GAME ==========
window._fbAuth = fbAuth;
window._fbDb = fbDb;
window._fbRef = ref;
window._fbSet = set;
window._fbGet = get;
window._fbOnValue = onValue;
window._fbUpdate = update;
window._fbPush = push;
window._fbGet  = get;
window._fbSignOut = signOut;
window._currentUser = null;
window._isAdmin = false;
window._playerName = '';

// ========== AUTH STATE ==========
onAuthStateChanged(fbAuth, async (user) => {
  if(user){
    window._currentUser = user;
    // check if admin
    const adminSnap = await get(ref(fbDb, `admins/${user.uid}`));
    window._isAdmin = adminSnap.exists();
    // load full player profile from Firebase
    const profileSnap = await get(ref(fbDb, `players/${user.uid}`));
    if(profileSnap.exists()){
      const profile = profileSnap.val();
      window._playerName = profile.name || user.email.split('@')[0];
      // Load balance from Firebase — source of truth
      if(typeof window.playerAccount !== 'undefined'){
        const bal = profile.balance !== undefined ? profile.balance : 1000;
        window.playerAccount.cashBalance = bal;
        // Load positions from Firebase if saved there, else start fresh
        if(profile.positions){
          window.playerAccount.stockPositions  = profile.positions.stocks  || {};
          window.playerAccount.optionPositions = profile.positions.options || {};
        } else {
          // Don't load from localStorage on login — always fresh from Firebase
          window.playerAccount.stockPositions  = {};
          window.playerAccount.optionPositions = {};
        }
        window.playerAccount.dayPLRealized = profile.dayPL || 0;
      }
    } else {
      // New player — wipe localStorage so old positions don't bleed in
      try{ localStorage.removeItem(STORAGE_KEY); }catch(e){}
      window._playerName = user.email.split('@')[0];
      const startBal = 1000;
      await set(ref(fbDb, `players/${user.uid}`), { name: window._playerName, balance: startBal, lastSeen: Date.now(), joinedAt: Date.now() });
      if(typeof window.playerAccount !== 'undefined'){
        window.playerAccount.cashBalance = startBal;
        window.playerAccount.stockPositions = {};
        window.playerAccount.optionPositions = {};
        window.playerAccount.dayPLRealized = 0;
      }
    }
    const _ov=document.getElementById('fbLoginOverlay'); if(_ov)_ov.style.display='none';
    // Init after layout is ready
    try{ survivalInit(); }catch(e){}
    // Ensure layout is rendered before data flows
    setTimeout(()=>{
      try{ sbActivate(_activeSbItem||'chart'); }catch(e){}
    }, 200);
    const _ub=document.getElementById('fbUserBar'); if(_ub)_ub.style.display='flex';
    const _un=document.getElementById('fbUserName'); if(_un)_un.textContent=(window._playerName||'')+(window._isAdmin?' 👑':'');
    // Hide Sandbox tab from non-admin players — they cannot adjust their own balance
    const sandboxTab = document.getElementById('tabSandbox');
    if(sandboxTab){
      if(window._isAdmin){
        sandboxTab.style.display = ''; // admin sees it
      } else {
        sandboxTab.style.display = 'none'; // players never see it
        // if somehow they're on sandbox section, redirect to trading
        if(typeof currentSection !== 'undefined' && currentSection === 'sandbox'){
          if(typeof switchSection === 'function') switchSection('trading');
        }
      }
    }
    if(window._isAdmin) showAdminPanel();
    // sync market prices FROM Firebase every 2s
    startMarketSync();
  } else {
    window._currentUser = null;
    window._isAdmin = false;
    const _ov2=document.getElementById('fbLoginOverlay'); if(_ov2)_ov2.style.display='flex';
    const _ub2=document.getElementById('fbUserBar'); if(_ub2)_ub2.style.display='none';
  }
});

// ========== MARKET SYNC ==========
// Host (admin) pushes prices TO Firebase every 3s
// All players read FROM Firebase every 3s
let _marketSyncInterval = null;
function startMarketSync(){
  if(_marketSyncInterval) clearInterval(_marketSyncInterval);

  // ALL players run the local engine — no dependency on admin being online
  // Firebase is used ONLY to sync player positions and leaderboard
  // The market runs independently in each browser (same seed = same prices)
  console.log('[Multiplayer] Local engine mode — market runs in every browser');

  // Optional: admin can push market state for cross-browser sync
  if(window._isAdmin && typeof onValue === 'function'){
    try{
      // Admin receives player trades and can see everyone's flow
      onValue(ref(fbDb, 'market/trades'), snap=>{
        // Just log — admin sees all trades
        if(snap.exists()) console.log('[Admin] Market trades updated');
      });
    }catch(e){}
  }

  _marketSyncInterval = setInterval(()=>{
    if(!window._currentUser) return;
    // Subscribe to other players' limit orders
  try{
    if(typeof onValue === 'function'){
      onValue(ref(fbDb,'market/limitOrders'), snap=>{
        if(!snap.exists()) return;
        const allOrders = snap.val()||{};
        // Merge other players' orders into a global visible book
        // (but not our own — we already have those in playerLimitOrders)
        window._otherPlayersLimitOrders = [];
        Object.values(allOrders).forEach(o=>{
          if(o.uid === playerAccount.uid) return; // skip own orders
          if(!o.sym || !o.price || !o.qty) return;
          if(Date.now() - o.ts > 3600000) return; // ignore orders older than 1h
          window._otherPlayersLimitOrders.push({
            sym:o.sym, side:o.side, price:+o.price, qty:+o.qty,
            status:'open', isOtherPlayer:true, playerName:o.playerName||'Trader',
            id:'fb_'+o.uid+'_'+o.id
          });
        });
      });
    }
  }catch(e){}

  // All players sync leaderboard regardless of role
    // All players sync their OWN balance to Firebase
    if(typeof window.playerAccount !== 'undefined'){
      const uid = window._currentUser.uid;
      update(ref(fbDb, `players/${uid}`), {
        balance: window.playerAccount.cashBalance,
        name: window._playerName,
        lastSeen: Date.now()
      }).catch(()=>{});
    }
  }, 3000);
}

// ========== ADMIN PANEL ==========
function showAdminPanel(){
  const panel = document.getElementById('fbAdminPanel');
  if(!panel) return;
  panel.style.display = 'block';
  // listen to all players in real time
  onValue(ref(fbDb, 'players'), snap=>{
    if(!snap.exists()) return;
    const players = snap.val();
    let html = '<table style="width:100%;border-collapse:collapse;font-family:monospace;font-size:11px">';
    html += '<tr style="color:#EF9F27;border-bottom:1px solid #333"><td style="padding:4px 8px">NOMBRE</td><td>BALANCE</td><td>ÚLTIMA CONEXIÓN</td><td>ACCIÓN</td></tr>';
    Object.entries(players).forEach(([uid, p])=>{
      const last = p.lastSeen ? new Date(p.lastSeen).toLocaleTimeString() : '—';
      html += `<tr style="border-bottom:1px solid #222">
        <td style="padding:4px 8px">${p.name||uid.slice(0,8)}</td>
        <td style="color:#22D47A">$${(p.balance||0).toLocaleString()}</td>
        <td style="color:#666">${last}</td>
        <td><button onclick="window._adminSetBalance('${uid}','${p.name||''}',${p.balance||0})" style="background:#EF9F27;color:#000;border:none;border-radius:3px;padding:2px 6px;cursor:pointer;font-size:10px">Editar $</button></td>
      </tr>`;
    });
    html += '</table>';
    document.getElementById('fbAdminPlayerList').innerHTML = html;
  });
}
window._adminSetBalance = function(uid, name, currentBal){
  const newBal = prompt(`Nuevo balance para ${name||uid.slice(0,8)}:`, currentBal);
  if(newBal === null) return;
  const parsed = parseFloat(newBal);
  if(isNaN(parsed)){ alert('Número inválido'); return; }
  set(ref(fbDb, `players/${uid}/balance`), parsed)
    .then(()=>alert(`Balance actualizado a $${parsed.toLocaleString()}`))
    .catch(e=>alert('Error: '+e.message));
};
window._adminAddPlayer = async function(){
  const email = prompt('Email del nuevo jugador:');
  if(!email) return;
  const pass = prompt('Contraseña temporal:');
  if(!pass) return;
  const bal = parseFloat(prompt('Balance inicial:', '25000'));
  if(isNaN(bal)) return;
  try{
    const cred = await createUserWithEmailAndPassword(fbAuth, email, pass);
    const uid = cred.user.uid;
    await set(ref(fbDb, `players/${uid}`), { name: email.split('@')[0], balance: bal, lastSeen: Date.now() });
    // sign back in as admin
    alert(`Jugador ${email} creado con $${bal.toLocaleString()}. Ahora el jugador puede entrar con esas credenciales.`);
  } catch(e){ alert('Error: '+e.message); }
};

// ========== LOGIN/REGISTER FORM HANDLERS ==========
window._showTab = function(tab){
  const _pl=document.getElementById('panelLogin'); if(_pl)_pl.style.display=tab==='login'?'flex':'none';
  const _pr=document.getElementById('panelRegister'); if(_pr)_pr.style.display=tab==='register'?'flex':'none';
  const _tl=document.getElementById('tabLogin'); if(_tl){_tl.style.background=tab==='login'?'#EF9F27':'transparent';_tl.style.color=tab==='login'?'#0A0C10':'#666';}
  const _tr=document.getElementById('tabRegister'); if(_tr){_tr.style.background=tab==='register'?'#22D47A':'transparent';_tr.style.color=tab==='register'?'#0A0C10':'#666';}
};

window._fbRegister = async function(){
  const name = document.getElementById('fbRegName').value.trim();
  const email = document.getElementById('fbRegEmail').value.trim();
  const pass = document.getElementById('fbRegPass').value;
  const err = document.getElementById('fbRegError');
  if(!name){ err.textContent = 'Escribe tu nombre de usuario'; return; }
  if(!email){ err.textContent = 'Escribe tu email'; return; }
  if(pass.length < 6){ err.textContent = 'La contraseña debe tener al menos 6 caracteres'; return; }
  err.textContent = 'Creando cuenta...';
  try{
    const cred = await createUserWithEmailAndPassword(fbAuth, email, pass);
    const uid = cred.user.uid;
    const STARTING_BALANCE = 1000;
    // save player profile with starting balance
    await set(ref(fbDb, `players/${uid}`), {
      name: name,
      balance: STARTING_BALANCE,
      lastSeen: Date.now(),
      joinedAt: Date.now()
    });
    // apply balance to local game state immediately
    if(typeof window.playerAccount !== 'undefined'){
      window.playerAccount.cashBalance = STARTING_BALANCE;
    }
    err.textContent = '';
    // onAuthStateChanged will handle the rest (hide overlay, show game)
  } catch(e){
    const msgs = {
      'auth/email-already-in-use': 'Ese email ya tiene una cuenta — inicia sesión',
      'auth/invalid-email': 'Email inválido',
      'auth/weak-password': 'Contraseña muy débil (mínimo 6 caracteres)',
    };
    err.textContent = msgs[e.code] || e.message;
  }
};

window._fbReset = async function(){
  const email = (document.getElementById('fbResetEmail')||{}).value||'';
  const msg = document.getElementById('fbResetMsg');
  if(!email){ if(msg) msg.textContent='Ingresa tu email.'; return; }
  try{
    const {sendPasswordResetEmail} = await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js');
    await sendPasswordResetEmail(fbAuth, email);
    if(msg){ msg.style.color='#22D47A'; msg.textContent='✅ Email enviado — revisa tu bandeja.'; }
  } catch(e){
    if(msg){ msg.style.color='var(--ask)'; msg.textContent='Error: '+e.message; }
  }
};
window._fbLogin = async function(){
  const email = document.getElementById('fbEmail').value.trim();
  const pass = document.getElementById('fbPass').value;
  const err = document.getElementById('fbError');
  try{
    await signInWithEmailAndPassword(fbAuth, email, pass);
    err.textContent = '';
  } catch(e){
    err.textContent = e.code === 'auth/invalid-credential' ? 'Email o contraseña incorrectos' : e.message;
  }
};
window._fbLogout = async function(){
  if(_marketSyncInterval) clearInterval(_marketSyncInterval);
  await signOut(fbAuth);
};

// ========== SET FIRST ADMIN ==========
// Run once to set yourself as admin — call window._setMeAsAdmin() from browser console
window._setMeAsAdmin = async function(){
  if(!window._currentUser){ alert('Inicia sesión primero'); return; }
  await set(ref(fbDb, `admins/${window._currentUser.uid}`), true);
  alert('Eres admin ahora. Recarga la página.');
};
</script>

<script>
var _activeSbItem = 'chart'; // global — needed before renderLayout

const data = JSON.parse(document.getElementById('universe-data').textContent);
const universe = data.MARKET_UNIVERSE;
const allStocks = [];
universe.forEach(sector=>{
  sector.stocks.forEach(s=> allStocks.push({...s, sectorKey:sector.sectorKey, sectorLabel:sector.sectorLabel, sectorVolatility:sector.sectorVolatility, indexSym:sector.index.sym, indexName:sector.index.name}));
});

/* ===================================================================
   LIVE MARKET ENGINE — ported and recalibrated from the prior SPX project.
   Every one of the 30 stocks gets its own magnet (a synthetic "daily OI"
   peak strike that pulls price toward it, harder the closer/later in the
   session), its own aggressive-flow tracker (fed by the option chain's
   bid/ask hit imbalance — buying calls/selling puts pulls price up and
   vice versa), and its own smoothed force so the tick-to-tick motion
   isn't jittery. This is the same causal model validated before, just
   now running for the whole universe simultaneously instead of one symbol.
   =================================================================== */
const ENGINE_TICK_MS = 700; // calmer cadence across 30 names at once than the single-symbol version used
const FORCE_WEIGHTS = { magnet: 0.18, flow: 0.28, noise: 0.05 }; // recalibrated down further since 30 names compound visually
const PRICE_SMOOTHING_ALPHA = 0.20;

/* ===================================================================
   TIMEFRAME-DRIVEN MICROSTRUCTURE REGIME (point 1, confirmed design) —
   the REAL price (one single number used everywhere: chain, account,
   P&L) now has different "speed modes" depending on which timeframe the
   PRINCIPAL chart (the first chart instance, always present) is set to.
   Short timeframes get a livelier Brownian micro-noise component and a
   faster smoothing response (price reacts quickly tick to tick); long
   timeframes get a calmer noise floor and slower smoothing (price
   drifts cleanly). This is the single source of truth other charts
   simply read and aggregate from — they never set their own speed.
   =================================================================== */
const TIMEFRAME_REGIME = {
  '1m':  { noiseMult: 2.6, smoothingAlpha: 0.42 },
  '5m':  { noiseMult: 1.6, smoothingAlpha: 0.26 },
  '15m': { noiseMult: 1.15, smoothingAlpha: 0.20 },
  '1h':  { noiseMult: 0.85, smoothingAlpha: 0.14 },
  '4h':  { noiseMult: 0.55, smoothingAlpha: 0.09 },
  'd':   { noiseMult: 0.35, smoothingAlpha: 0.05 },
};
function getPrincipalTimeframe(){
  // the principal chart is always chartInstances[0] — confirmed design: it alone drives real
  // market speed, any additional charts just visualize the same underlying price stream.
  return (chartInstances && chartInstances.length) ? chartInstances[0].timeframe : '5m';
}
function getActiveTimeframeRegime(){
  return TIMEFRAME_REGIME[getPrincipalTimeframe()] || TIMEFRAME_REGIME['5m'];
}
const PREMARKET_LENGTH_MS = 60 * 1000; // ~1 real minute of compressed pre-market before the regular session "opens"
const sessionStartMs = Date.now() + PREMARKET_LENGTH_MS; // regular session begins after pre-market elapses
const premarketStartMs = Date.now();
const SESSION_LENGTH_MS = 15 * 60 * 1000; // Step 9 spec: 15 real minutes = 1 full trading day
function sessionProgress(){ return Math.min(1, Math.max(0, (Date.now()-sessionStartMs)/SESSION_LENGTH_MS)); }
function isPreMarket(){ return Date.now() < sessionStartMs; }
function premarketProgress(){ return Math.min(1, (Date.now()-premarketStartMs)/PREMARKET_LENGTH_MS); }

/* ===================================================================
   GAME CALENDAR (Step 9) — 15 real minutes = 1 full trading day. Tracks
   week/day-of-week, skips weekends (Fri close -> Mon open, applying a
   lump Theta/Charm hit when that happens), and closes out 0DTE option
   positions (the short expirations: 15m/30m/1h) at every day's end.
   1d/1w positions instead track which calendar day they were OPENED on,
   so their real expiry can be computed and checked independently.
   =================================================================== */
const DAY_NAMES = ['Lunes','Martes','Miércoles','Jueves','Viernes'];
const gameCalendar = {
  weekNumber: 1, dayIndex: 0, // 0=Monday..4=Friday
  dayStartedAtMs: sessionStartMs, // when the CURRENT trading day began, for progress tracking
  totalDaysElapsed: 0, // absolute day counter since game start, never resets — used to compute 1w expiry
  hadWinningTradeToday: false, // requested feature: the day only advances once this becomes true
};
function currentDayProgress(){
  return Math.min(1, Math.max(0, (Date.now()-gameCalendar.dayStartedAtMs)/SESSION_LENGTH_MS));
}
function advanceCalendarDay(){
  const wasFriday = gameCalendar.dayIndex === 4;
  gameCalendar.totalDaysElapsed++;
  if(wasFriday){
    gameCalendar.dayIndex = 0;
    gameCalendar.weekNumber++;
    applyWeekendThetaCharm(); // the lump time-decay/delta-reset hit the spec calls for on the Fri->Mon jump
  } else {
    gameCalendar.dayIndex++;
  }
  gameCalendar.dayStartedAtMs = Date.now();
  gameCalendar.hadWinningTradeToday = false; // each new day requires its own winning trade to advance further
}
/* Weekend jump: 2 calendar days pass with no trading, so every open option position eats roughly
   2 extra days of theta in one lump sum, and IV/delta get re-marked against the new time-to-expiry
   (charm) instead of drifting tick by tick like a normal trading day would. */
function applyWeekendThetaCharm(){
  Object.values(playerAccount.optionPositions).forEach(pos=>{
    if(!pos.qty) return;
    const stock = allStocks.find(s=>s.sym===pos.sym);
    if(!stock) return;
    const row = optionMarketState[contractStateKey(pos.sym, pos.strike, pos.optType, pos.expiryKey)];
    if(!row || !row._greeks) return;
    const thetaHit = row._greeks.theta * 2; // ~2 days of decay applied at once
    row.bid = Math.max(0.01, +(row.bid + thetaHit).toFixed(2));
    row.ask = Math.max(row.bid+0.01, +(row.ask + thetaHit).toFixed(2));
  });
  flashToast('📅 Fin de semana: Theta/Charm aplicado a posiciones abiertas.');
}
/* Day close: per the spec, 15m/30m/1h are ALWAYS 0DTE and close out every day regardless of when
   they were opened; 1d/1w instead expire based on which calendar day they were opened on, tracked
   per-position via openedOnDay (added to positions when opened, see executeOptionOrder hook below). */
function isPositionExpiringToday(pos){
  const expiry = EXPIRATIONS.find(e=>e.key===pos.expiryKey);
  if(!expiry) return false;
  if(expiry.type === 'short') return true; // 15m/30m/1h: always 0DTE, always closes at day end
  if(pos.expiryKey === '1d') return true; // 1-day options always expire at the next day close
  if(pos.expiryKey === '1w'){
    const daysHeld = gameCalendar.totalDaysElapsed - (pos.openedOnDay ?? gameCalendar.totalDaysElapsed);
    return daysHeld >= 5; // 1 week = 5 trading days
  }
  return false;
}
function settleExpiringPositions(){
  Object.entries(playerAccount.optionPositions).forEach(([key,pos])=>{
    if(!pos.qty || !isPositionExpiringToday(pos)) return;
    const stock = allStocks.find(s=>s.sym===pos.sym);
    const spot = stock ? stock.price : pos.avgPrice;
    const intrinsic = pos.optType==='call' ? Math.max(0, spot-pos.strike) : Math.max(0, pos.strike-spot);
    const settlementValue = intrinsic * Math.abs(pos.qty) * OPTION_CONTRACT_MULTIPLIER;
    if(pos.qty > 0){
      playerAccount.cashBalance += settlementValue; // long position: receive intrinsic value (0 if OTM)
      playerAccount.dayPLRealized += settlementValue - (pos.avgPrice*pos.qty*OPTION_CONTRACT_MULTIPLIER);
    } else {
      const payout = settlementValue; // short position: pay out intrinsic value if it finished ITM against us
      playerAccount.cashBalance -= payout;
      playerAccount.dayPLRealized += (pos.avgPrice*Math.abs(pos.qty)*OPTION_CONTRACT_MULTIPLIER) - payout;
    }
    if(intrinsic > 0){
      flashToast(`Expiración: ${pos.sym} ${pos.strike}${pos.optType==='call'?'C':'P'} liquidado ITM por ${fmtMoney(settlementValue)}.`);
    } else {
      flashToast(`Expiración: ${pos.sym} ${pos.strike}${pos.optType==='call'?'C':'P'} expiró OTM ($0).`, true);
    }
    pos.qty = 0; pos.avgPrice = 0;
  });
}
/* Resets every contract's daily session volume to zero at day close, per the spec — OI is
   intentionally left untouched here (it persists across days until naturally closed out or
   decayed by time, which is a separate mechanic from the daily volume reset). */
function resetDailyVolumeAcrossChain(){
  Object.values(optionMarketState).forEach(row=>{ row.volume = 0; row.buyVolume = 0; row.sellVolume = 0; });
}
/* ===================================================================
   OPEN INTEREST PERSISTENCE BY EXPIRY CYCLE (roadmap point 4, confirmed
   design) — scalping-cycle contracts (15m/30m/1h, AND 1d since its real
   lifecycle is exactly one trading day) have their OI cleared/decayed
   aggressively at day close, since those are pure same-cycle entries
   and exits with no real reason to carry standing interest forward.
   1-week contracts keep their OI fully intact day after day — it only
   clears when that contract's week has formally expired (Friday close).
   =================================================================== */
function decayOptionInterestAtDayClose(){
  const todayIsFriday = gameCalendar.dayIndex === 4; // 1w contracts expire Friday close, per the existing calendar rule
  Object.values(optionMarketState).forEach(row=>{
    const expiry = EXPIRATIONS.find(e=>e.key===row.expiryKey);
    if(!expiry) return;
    if(expiry.type === 'short' || row.expiryKey === '1d'){
      // aggressive same-cycle cleanup: most of the standing interest from a scalping/1-day cycle
      // doesn't carry forward — only a small residual (some positions genuinely get held over)
      row.openInterest = Math.floor(row.openInterest * 0.08);
    } else if(row.expiryKey === '1w' && todayIsFriday){
      // robust all week — only clears once the week has actually formally expired
      row.openInterest = 0;
    }
    // any other major expiry on a non-Friday day: left fully untouched (robust through the week)
  });
}

/* ===================================================================
   SURVIVAL MODE ENGINE
   - Seat fee diaria ($500/día)
   - Data feed ($150/día)  
   - Commissions reales ($0.65/contrato opciones, $0.005/acción)
   - PDT Rule (< $25K → max 3 day trades/semana)
   - Drawdown limit (5% → suspensión 1h)
   - Risk Score (0-100, llega a 0 = eliminado)
   =================================================================== */

const SURVIVAL = {
  enabled: false, // disabled
  // Costos fijos
  SEAT_FEE_PER_DAY:   500,
  DATA_FEED_PER_DAY:  150,
  COMMISSION_STOCK:   0.005,   // por acción
  COMMISSION_OPTION:  0.65,    // por contrato
  // PDT
  PDT_THRESHOLD:      25000,
  PDT_MAX_DAY_TRADES: 3,
  // Drawdown
  MAX_DRAWDOWN_PCT:   5,       // % del capital máximo del día
  SUSPEND_MINUTES:    60,
  // Risk Score
  riskScore:          100,
  // Estado
  dayTradeCount:      0,       // day trades hoy
  weekDayTrades:      0,       // day trades esta semana
  totalCommissions:   0,
  peakBalance:        0,       // para calcular drawdown
  dayStartBalance:    0,
  suspendedUntil:     0,
  daysAlive:          0,
  dayFeesCharged:     false,   // solo cobrar fees 1 vez por día
  openedToday:        {},      // sym -> precio de apertura (para detectar day trades)
};

function survivalInit(){
  SURVIVAL.peakBalance    = playerAccount.cashBalance;
  SURVIVAL.dayStartBalance= playerAccount.cashBalance;
  SURVIVAL.riskScore      = 100;
  SURVIVAL.daysAlive      = 0;
  updateSurvivalHUD();
}

/* Cobrar fees al inicio de cada día de trading */
function survivalChargeDailyFees(){
  if(SURVIVAL.dayFeesCharged) return;
  SURVIVAL.dayFeesCharged = true;
  const totalFee = SURVIVAL.SEAT_FEE_PER_DAY + SURVIVAL.DATA_FEED_PER_DAY;
  playerAccount.cashBalance -= totalFee;
  playerAccount.dayPLRealized -= totalFee;
  SURVIVAL.totalCommissions += totalFee;
  showSurvivalAlert(`📋 Seat fee: -$${SURVIVAL.SEAT_FEE_PER_DAY} · Data feed: -$${SURVIVAL.DATA_FEED_PER_DAY}`, 'warn');
  checkSurvivalStatus();
  updateSurvivalHUD();
  schedulePersist();
}

/* Cobrar comisión por trade */
function survivalChargeCommission(type, qty, contracts){
  if(!SURVIVAL.enabled) return 0;
  let fee = 0;
  if(type === 'stock')  fee = qty * SURVIVAL.COMMISSION_STOCK;
  if(type === 'option') fee = (contracts||1) * SURVIVAL.COMMISSION_OPTION;
  fee = +fee.toFixed(2);
  if(fee > 0){
    playerAccount.cashBalance -= fee;
    playerAccount.dayPLRealized -= fee;
    SURVIVAL.totalCommissions += fee;
  }
  return fee;
}

/* Registrar un day trade — detecta si abriste y cerraste la misma posición hoy */
function survivalRegisterTrade(sym, side, qty){
  if(!SURVIVAL.enabled) return;
  SURVIVAL.dayTradeCount++;
  SURVIVAL.weekDayTrades++;
  // PDT check
  if(playerAccount.cashBalance < SURVIVAL.PDT_THRESHOLD){
    if(SURVIVAL.weekDayTrades > SURVIVAL.PDT_MAX_DAY_TRADES){
      showSurvivalAlert('🚫 PDT VIOLATION — Cuenta congelada 24h. Menos de $25K en cuenta.', 'danger');
      survivalSuspend('PDT Rule violada (< $25K, más de 3 day trades/semana)', 60 * 60 * 1000);
      survivalDamageRiskScore(20, 'PDT Violation');
    }
  }
  updateSurvivalHUD();
}

/* Calcular drawdown actual */
function survivalGetDrawdown(){
  const peak = Math.max(SURVIVAL.peakBalance, SURVIVAL.dayStartBalance);
  if(peak <= 0) return 0;
  return ((peak - playerAccount.cashBalance) / peak) * 100;
}

/* Verificar salud del jugador después de cada trade */
function checkSurvivalStatus(){
  if(!SURVIVAL.enabled) return;
  // Actualizar peak
  if(playerAccount.cashBalance > SURVIVAL.peakBalance)
    SURVIVAL.peakBalance = playerAccount.cashBalance;

  const drawdown = survivalGetDrawdown();
  
  // Drawdown limit
  if(drawdown >= SURVIVAL.MAX_DRAWDOWN_PCT && SURVIVAL.suspendedUntil < Date.now()){
    showSurvivalAlert(`⚠️ DRAWDOWN LÍMITE ${drawdown.toFixed(1)}% — Suspendido 1 hora`, 'danger');
    survivalSuspend(`Drawdown de ${drawdown.toFixed(1)}% alcanzado (límite: ${SURVIVAL.MAX_DRAWDOWN_PCT}%)`, SURVIVAL.SUSPEND_MINUTES * 60 * 1000);
    survivalDamageRiskScore(15, 'Drawdown limit');
  }

  // Margin call (balance < 20% del pico)
  const marginPct = (playerAccount.cashBalance / SURVIVAL.peakBalance) * 100;
  if(marginPct < 20 && playerAccount.cashBalance > 0){
    showSurvivalAlert('🔴 MARGIN CALL — Deposita fondos o serás liquidado', 'danger');
    survivalDamageRiskScore(10, 'Margin call');
  }

  // Eliminado (cash < $100 o riskScore <= 0)
  if(playerAccount.cashBalance < 100 || SURVIVAL.riskScore <= 0){
    survivalEliminate(playerAccount.cashBalance < 100 ? 'Cuenta en $0 — sin capital para operar' : 'Risk Score llegó a 0');
  }

  updateSurvivalHUD();
}

/* Reducir Risk Score */
function survivalDamageRiskScore(points, reason){
  SURVIVAL.riskScore = Math.max(0, SURVIVAL.riskScore - points);
  showSurvivalAlert(`📉 Risk Score -${points} (${reason}) → ${SURVIVAL.riskScore}`, 'warn');
  if(SURVIVAL.riskScore <= 0) survivalEliminate('Risk Score llegó a 0');
  updateSurvivalHUD();
}

/* Reward: trade positivo mejora Risk Score levemente */
function survivalRewardRiskScore(points){
  SURVIVAL.riskScore = Math.min(100, SURVIVAL.riskScore + points);
  updateSurvivalHUD();
}

/* Suspensión temporal */
function survivalSuspend(reason, durationMs){
  SURVIVAL.suspendedUntil = Date.now() + durationMs;
  const overlay = document.getElementById('suspendedOverlay');
  const reasonEl = document.getElementById('suspendedReason');
  if(overlay) overlay.classList.add('show');
  if(reasonEl) reasonEl.textContent = reason;
  // Timer countdown
  const timerEl = document.getElementById('suspendedTimer');
  const interval = setInterval(()=>{
    const remaining = Math.max(0, SURVIVAL.suspendedUntil - Date.now());
    const mins = Math.floor(remaining/60000);
    const secs = Math.floor((remaining%60000)/1000);
    if(timerEl) timerEl.textContent = `${mins}:${secs.toString().padStart(2,'0')}`;
    if(remaining <= 0){
      clearInterval(interval);
      if(overlay) overlay.classList.remove('show');
      showSurvivalAlert(t('surv.suspended','SUSPENDED')==='SUSPENDED'?'✅ Trading resumed':'✅ Suspensión terminada', 'ok');
    }
  }, 1000);
  // Bloquear trading mientras está suspendido
  liveEnginePaused = true;
  setTimeout(()=>{ liveEnginePaused = false; }, durationMs);
}

/* Eliminación */
function survivalEliminate(reason){
  liveEnginePaused = true;
  try{playSound('eliminate');}catch(e){}
  const overlay = document.getElementById('eliminatedOverlay');
  const reasonEl = document.getElementById('eliminatedReason');
  const statsEl  = document.getElementById('eliminatedStats');
  if(overlay) overlay.classList.add('show');
  if(reasonEl) reasonEl.textContent = reason;
  if(statsEl) statsEl.textContent = 
    `Días vivo: ${SURVIVAL.daysAlive} · Comisiones pagadas: $${SURVIVAL.totalCommissions.toFixed(0)} · Risk Score final: ${SURVIVAL.riskScore}`;
}

let _audioCtx = null;
function getAudioCtx(){
  if(!_audioCtx) _audioCtx = new (window.AudioContext||window.webkitAudioContext)();
  return _audioCtx;
}

function playTone(freq, type, duration, volume=0.15, fadeOut=true){
  try{
    const ctx = getAudioCtx();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.type = type || 'sine';
    osc.frequency.setValueAtTime(freq, ctx.currentTime);
    gain.gain.setValueAtTime(volume, ctx.currentTime);
    if(fadeOut) gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + duration);
    osc.start(ctx.currentTime);
    osc.stop(ctx.currentTime + duration);
  }catch(e){}
}

function playSound(type){
  switch(type){
    case 'buy':    // soft ascending ping
      playTone(523, 'sine', 0.12, 0.12);
      setTimeout(()=>playTone(659, 'sine', 0.10, 0.08), 60);
      break;
    case 'sell':   // descending
      playTone(494, 'sine', 0.12, 0.12);
      setTimeout(()=>playTone(392, 'sine', 0.10, 0.08), 60);
      break;
    case 'fill':   // short tick
      playTone(880, 'square', 0.06, 0.04);
      break;
    case 'alert':  // attention ping
      playTone(1047, 'sine', 0.20, 0.15);
      setTimeout(()=>playTone(1047, 'sine', 0.15, 0.10), 220);
      break;
    case 'sweep':  // rapid sweep sound
      playTone(220, 'sawtooth', 0.08, 0.08);
      setTimeout(()=>playTone(330, 'sawtooth', 0.07, 0.07), 40);
      setTimeout(()=>playTone(440, 'sawtooth', 0.06, 0.06), 80);
      break;
    case 'halt':   // warning buzz
      playTone(150, 'square', 0.40, 0.18);
      break;
    case 'blackswan': // low ominous drone
      playTone(80, 'sawtooth', 0.80, 0.20, false);
      setTimeout(()=>{ try{_audioCtx&&_audioCtx.close();_audioCtx=null;}catch(e){} }, 900);
      break;
    case 'eliminate': // game over
      [0,150,300,450].forEach((d,i)=>setTimeout(()=>playTone(200-i*30,'square',0.3,0.15),d));
      break;
  }
}
