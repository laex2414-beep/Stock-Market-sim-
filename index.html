  stock._fastFlow = {}; // strike -> {askVol, bidVol}, decayed each tick
  stock._regime = 'consolidation'; stock._regimeTicksLeft = 20 + Math.floor(Math.random()*30);

  /* Persistent fundamentals state (bugfix from the audit document) — sharesOutstanding and eps
     are seeded ONCE and never change, so Market Cap and P/E become true live derivatives of the
     real-time price instead of being re-rolled randomly on every render. dayLow/dayHigh are
     seeded tight around the current price and from here on ONLY ever widen via the strict
     if(price>dayHigh)/if(price<dayLow) ratchet in trackStockVolatility — they can never drift
     back toward the center or jump to a new random range. */
  stock._sharesOutstanding = stock.marketCap / stock.price;
  stock._eps = stock.price / ({ low:12, med:18, high:30, extreme:55 }[stock.volatility] + Math.random()*6);
  stock._dayLow = stock.price * (1 - 0.0008);
  stock._dayHigh = stock.price * (1 + 0.0008);
  // Bugfix: today's stock volume must be a real accumulating counter, not re-rolled every render —
  // same pattern as option volume. Starts at a small seed (pre-market trickle) and only grows.
  stock._todayVolume = Math.floor(({ low:1.2e6, med:3.5e6, high:8e6, extreme:14e6 }[stock.volatility]) * 0.02);
});

/* ===================================================================
   MARKET REGIME ENGINE — alternates each stock between sustained TREND
   phases (several minutes pushing one direction, not just zigzag noise)
   and CONSOLIDATION phases (tight sideways chop) before the next strong
   move, so the chart develops readable structure instead of pure
   randomness. This is a persistent bias layered ON TOP of the existing
   magnet/flow forces, not a replacement for them.
   =================================================================== */
function updateStockRegime(stock){
  stock._regimeTicksLeft--;
  if(stock._regimeTicksLeft > 0) return;
  const roll = Math.random();
  if(stock._regime === 'consolidation'){
    // consolidations resolve into a trend more often than not, like a real breakout
    stock._regime = roll > 0.5 ? 'trend_up' : 'trend_down';
    stock._regimeTicksLeft = 15 + Math.floor(Math.random()*35);
  } else {
    // trends eventually exhaust into consolidation, occasionally flipping straight into the opposite trend
    if(roll > 0.85){ stock._regime = stock._regime==='trend_up' ? 'trend_down' : 'trend_up'; stock._regimeTicksLeft = 10 + Math.floor(Math.random()*20); }
    else { stock._regime = 'consolidation'; stock._regimeTicksLeft = 20 + Math.floor(Math.random()*30); }
  }
}
function regimeForceBias(stock){
  if(stock._regime === 'trend_up') return 0.55;
  if(stock._regime === 'trend_down') return -0.55;
  return 0; // consolidation: no persistent directional bias, just tight noise
}

function recordStockFastFlow(stock, strike, qty, hitSide){
  if(!stock._fastFlow[strike]) stock._fastFlow[strike] = {askVol:0, bidVol:0};
  stock._fastFlow[strike][hitSide==='ask'?'askVol':'bidVol'] += qty;
}
function decayStockFastFlow(stock){
  Object.values(stock._fastFlow).forEach(f=>{ f.askVol*=0.93; f.bidVol*=0.93; });
}
function netFlowForceNear(stock, radius){
  let force = 0;
  Object.entries(stock._fastFlow).forEach(([kStr,f])=>{
    const k = parseFloat(kStr);
    const dist = Math.abs(k - stock.price);
    if(dist > radius) return;
    const totalVol = f.askVol + f.bidVol;
    if(totalVol < 3) return;
    const imbalance = (f.askVol - f.bidVol) / totalVol;
    const proximity = 1 - dist/radius;
    const directionSign = Math.sign(k - stock.price) || 1;
    force += imbalance * proximity * directionSign * Math.min(1, totalVol/40);
  });
  return force;
}
/* Real OI-based magnet (Step 8) — replaces the old fixed _dailyMagnetStrike pin. Scans the
   strikes that actually exist in this stock's MAJOR expirations (1d, 1w — where the spec says
   institutional OI concentrates) and picks whichever has the most combined call+put open
   interest near the current price. That strike becomes the live magnet, so it moves and changes
   as real flow accumulates somewhere instead of being decided once at the start of the session. */
function findOIMagnetStrike(stock){
  const majorExpiries = EXPIRATIONS.filter(e=>e.type==='major');
  const searchRadius = stock.price * 0.10; // only strikes within a plausible pinning distance count
  let bestStrike = null, bestOI = 0;
  majorExpiries.forEach(expiry=>{
    const strikes = getStrikesForChain(stock, expiry.key);
    strikes.forEach(strike=>{
      if(Math.abs(strike-stock.price) > searchRadius) return;
      const callRow = optionMarketState[contractStateKey(stock.sym, strike, 'call', expiry.key)];
      const putRow = optionMarketState[contractStateKey(stock.sym, strike, 'put', expiry.key)];
      const totalOI = (callRow?callRow.openInterest:0) + (putRow?putRow.openInterest:0);
      if(totalOI > bestOI){ bestOI = totalOI; bestStrike = strike; }
    });
  });
  return bestStrike != null ? { strike: bestStrike, oi: bestOI } : null;
}
function computeStockMagnetForce(stock){
  const magnet = findOIMagnetStrike(stock);
  if(!magnet){
    // before any OI exists yet for this stock's major chains (e.g. right at session start before
    // tickOptionChainForStock has run for it once), fall back to the original seeded pin so price
    // isn't left with zero magnet force in the meantime.
    const distance = stock._dailyMagnetStrike - stock.price;
    const absDist = Math.abs(distance);
    const radius = stock.price * 0.04;
    const closeness = Math.max(0, 1 - absDist/radius);
    const urgency = 0.3 + 0.7*sessionProgress();
    return closeness * urgency * (Math.sign(distance)||0);
  }
  stock._dailyMagnetStrike = magnet.strike; // keep this in sync so the UI/popups referencing it stay consistent
  const distance = magnet.strike - stock.price;
  const absDist = Math.abs(distance);
  const radius = stock.price * 0.04;
  const closeness = Math.max(0, 1 - absDist/radius);
  // pull strength scales with how much OI is actually defending that strike, not just proximity —
  // a thin strike barely pins anything, a strike with a real "wall" pins much harder
  const oiStrength = Math.min(1.4, magnet.oi / 1200);
  const urgency = 0.3 + 0.7*sessionProgress();
  return closeness * urgency * oiStrength * (Math.sign(distance)||0);
}
function trackStockVolatility(stock, delta){
  stock._priceDeltaWindow.push(Math.abs(delta));
  if(stock._priceDeltaWindow.length>10) stock._priceDeltaWindow.shift();
  const avg = stock._priceDeltaWindow.reduce((a,b)=>a+b,0)/stock._priceDeltaWindow.length;
  const relAvg = avg/Math.max(1,stock.price); // normalize by price so $200 and $20 stocks compare fairly
  stock._volState = relAvg>0.0025 ? 'high' : relAvg>0.0012 ? 'med' : 'low';
  // Day range ratchet (bugfix) — strictly one-directional: the low only ever falls, the high only
  // ever rises, never drifting back toward the center or re-rolling to a new random range.
  if(stock.price > stock._dayHigh) stock._dayHigh = stock.price;
  if(stock.price < stock._dayLow) stock._dayLow = stock.price;
}

/* generates a couple of synthetic option prints per stock per tick, near its current price —
   this is what feeds the aggressive-flow imbalance that pulls the underlying around, same as
   the prior project's MM-hedge causal chain, just simplified (no explicit MM inventory yet —
   that arrives with the full Market Maker step of the options plan). */
function tickStockEngine(stock){
  // pre-market: thinner synthetic flow, like real markets where most institutional/retail
  // participation hasn't shown up yet — fewer prints, smaller average size
  const pmActive = isPreMarket();
  if(pmActive && Math.random() > 0.35) { trackStockVolatility(stock, 0); return; } // most ticks during pre-market do nothing at all
  // 1-2 synthetic option prints near its price, biased by nothing yet (pure noise flow for now,
  // sector sentiment / news events can bias this later without changing this function's shape)
  const numPrints = Math.random()>0.6 ? 2 : 1;
  for(let i=0;i<numPrints;i++){
    const strikeStep = stock.price>200?5:stock.price>50?2.5:1;
    const strike = Math.round((stock.price + (Math.random()-0.5)*strikeStep*6)/strikeStep)*strikeStep;
    const hitSide = Math.random()>0.5 ? 'ask' : 'bid';
    const qty = (Math.random()>0.85 ? Math.floor(Math.random()*60+20) : Math.floor(Math.random()*8+1)) * (pmActive?0.3:1);
    recordStockFastFlow(stock, strike, qty, hitSide);
    stock._todayVolume += Math.floor(qty * 80); // proxy: each options print implies roughly this much underlying share activity
  }
  decayStockFastFlow(stock);

  // Dark pool prints — occasional large block trades in the stock itself (not options), reported
  // off-exchange the way real dark pool prints are: visible after the fact, no live book impact.
  if(!pmActive && Math.random() > 0.985){
    const dpQty = Math.floor(Math.random()*8000+2000);
    logOptionFlowEntry({ sym: stock.sym, strike: 0, optType: 'call', expiryKey: '1d', qty: dpQty, premium: stock.price, side: 'MID', isPlayer: false, printClass: 'DARK_POOL' });
  }

  const magnetForce = computeStockMagnetForce(stock);
  const flowForce = netFlowForceNear(stock, stock.price*0.06);
  const tfRegime = getActiveTimeframeRegime(); // point 1 (confirmed design): the principal chart's timeframe sets the REAL market's speed
  // Brownian-style micro noise: a small persistent random walk component layered on top of the
  // plain per-tick noise, so short timeframes feel like they're "breathing" continuously instead
  // of moving in stiff straight segments between the bigger directional forces.
  if(stock._brownianWalk == null) stock._brownianWalk = 0;
  stock._brownianWalk += (Math.random()-0.5) * 0.4;
  stock._brownianWalk *= 0.85; // mean-reverting so it never drifts away unbounded
  const noise = ((Math.random()-0.5) + stock._brownianWalk) * tfRegime.noiseMult;
  updateStockRegime(stock);
  const regimeBias = regimeForceBias(stock);
  const _extBias = stock._externalForceBias || 0;
  const targetForcePct = magnetForce*FORCE_WEIGHTS.magnet + flowForce*FORCE_WEIGHTS.flow + noise*FORCE_WEIGHTS.noise*0.01 + regimeBias*0.012 + _extBias;
  stock._smoothedForce += (targetForcePct - stock._smoothedForce) * tfRegime.smoothingAlpha;
  const deltaPct = stock._smoothedForce * (VOL_PARAMS[stock.volatility].spreadPct*40); // tie tick size to the same per-stock volatility tier used everywhere else
  const delta = stock.price * deltaPct;
  stock.price = Math.max(0.5, +(stock.price + delta).toFixed(2));
  trackStockVolatility(stock, delta);
  if(typeof recordPriceTick === 'function') recordPriceTick(stock.sym, stock.price);
}

let liveEngineInterval = null;
let liveEnginePaused = false;
function startLiveEngine(){
  if(liveEngineInterval) return;
  // Small delay so the chart renders from seed data before the first live tick
  // This prevents the "giant first candle" artifact where the first tick price
  // jumps from the seed end-price to the live price in one frame
  setTimeout(()=>{
    allStocks.forEach(s=>{ seedPriceTickHistory(s.sym); }); // warm cache before first tick
  }, 100);
  liveEngineInterval = setInterval(()=>{
    if(liveEnginePaused) return;
    if(!isPreMarket() && currentDayProgress() >= 1){ closeTradingDay(); }
    allStocks.forEach(stock=> tickStockEngine(stock));
    // options: always keep the on-screen stock's whole chain fully alive every tick (this is what
    // the player is watching), and lightly tick a couple of background names so the rest of the
    // universe doesn't feel frozen if the player switches to them later.
    const activeStock = allStocks.find(s=>s.sym===currentSym);
    if(activeStock) tickOptionChainForStock(activeStock);
    if(activeStock) maybeReplenishBook(activeStock); // order book replenishment (with internal delay)
    for(let i=0;i<5;i++){
      const randomStock = allStocks[Math.floor(Math.random()*allStocks.length)];
      if(randomStock !== activeStock) tickOptionChainForStock(randomStock);
    }
    renderAllData();
  }, ENGINE_TICK_MS);
}

  liveEnginePaused = !liveEnginePaused;
  return liveEnginePaused;
}


const VOL_PARAMS = {
  low:     { minSize: 3000, maxSize: 12000, spreadPct: 0.00015, levels: 12, label:'BAJA VOL' },
  med:     { minSize: 1200, maxSize: 5000,  spreadPct: 0.0004,  levels: 12, label:'MEDIA VOL' },
  high:    { minSize: 400,  maxSize: 2000,  spreadPct: 0.0009,  levels: 10, label:'ALTA VOL' },
  extreme: { minSize: 100,  maxSize: 800,   spreadPct: 0.002,   levels: 8,  label:'EXTREMA VOL' },
};

function fmtSize(n){ return n>=1000 ? (n/1000).toFixed(1)+'K' : n.toString(); }
function fmtCap(n){ return n>=1e9 ? '$'+(n/1e9).toFixed(1)+'B' : '$'+(n/1e6).toFixed(0)+'M'; }
/* Number-to-words (Step: "ponlo en letras") — once a quantity crosses 1,000,000 anywhere in the
   game (volume, account balance, premium, etc.), show the full comma-separated number PLUS its
   Spanish word form in parentheses, instead of (or in addition to) an abbreviation like "10.0M".
   Covers the magnitudes that actually show up in this game (thousands through billions). */
function numberToSpanishWords(n){
  n = Math.round(Math.abs(n));
  if(n < 1e6) return null; // below 1M, the existing K/M abbreviations already read fine — words only kick in at 1M+
  if(n >= 1e9){
    const billionsFull = n/1e9;
    return `${billionsFull.toFixed(billionsFull%1===0?0:2)} Mil Millones`;
  }
  const millionsFull = n/1e6;
  return `${millionsFull.toFixed(millionsFull%1===0?0:1)} ${millionsFull===1?'Millón':'Millones'}`;
}
function fmtVol(n){
  if(n>=1e6){
    const words = numberToSpanishWords(n);
    const withCommas = Math.round(n).toLocaleString('en-US');
    return words ? `${withCommas} (${words})` : `${withCommas}`;
  }
  if(n>=1e3) return (n/1e3).toFixed(0)+'K';
  return n.toString();
}
function fmtMoney(n){
  const sign=n<0?'-':''; const absN=Math.abs(n);
  if(absN>=1e6){
    const words = numberToSpanishWords(absN);
    const withCommas = Math.round(absN).toLocaleString('en-US');
    return words ? `${sign}$${withCommas} (${words})` : `${sign}$${withCommas}`;
  }
  if(absN>=1e3) return sign+'$'+(absN/1e3).toFixed(1)+'K';
  return sign+'$'+absN.toFixed(0);
}

function getSymPrice(sym){
  const stock = allStocks.find(s=>s.sym===sym);
  if(stock) return stock.price;
  const sector = universe.find(s=>s.index.sym===sym);
  if(sector){
    const members = allStocks.filter(s=>s.sectorKey===sector.sectorKey);
    const totalCap = members.reduce((a,s)=>a+s.marketCap,0);
    return members.reduce((a,s)=> a + (s.price/10)*(s.marketCap/totalCap), 0) * 10;
  }
  return 100;
}
function getSymVol(sym){
  const stock = allStocks.find(s=>s.sym===sym);
  if(stock) return stock.volatility;
  const sector = universe.find(s=>s.index.sym===sym);
  return sector ? sector.sectorVolatility : 'med';
}

/* ===================================================================
   PERSISTENT ORDER BOOK (real order book architecture) — replaces the
   old Math.random() genBookForStock. The book is now a PERSISTENT
   structure per symbol that survives between renders and is only
   mutated by: (a) player/bot market orders consuming levels, (b) MM
   passively replenishing levels after a delay, (c) price drift that
   makes the book center recalculate. This is the foundation for real
   price walking and the connected Time & Sales.
   =================================================================== */
const orderBooks = {}; // sym -> { asks:[{price,size}], bids:[{price,size}], lastMmReplenishAt, lastPriceCenter }

function initOrderBook(stock){
  if(orderBooks[stock.sym] && orderBooks[stock.sym].asks.length > 0) return;
  const params = VOL_PARAMS[stock.volatility];
  const pmActive = isPreMarket();
  const spreadMult = pmActive ? 3 : 1;
  const sizeMult = pmActive ? 0.25 : 1;
  const tick = Math.max(0.01, +(stock.price * params.spreadPct * spreadMult).toFixed(stock.price < 10 ? 3 : 2));
  const asks = [], bids = [];
  for(let i=1; i<=params.levels; i++){
    asks.push({ price: +(stock.price + i*tick).toFixed(2), size: Math.floor((params.minSize + Math.random()*(params.maxSize-params.minSize))*sizeMult) });
    bids.push({ price: +(stock.price - i*tick).toFixed(2), size: Math.floor((params.minSize + Math.random()*(params.maxSize-params.minSize))*sizeMult) });
  }
  asks.sort((a,b)=>a.price-b.price); // best ask first (lowest)
  bids.sort((a,b)=>b.price-a.price); // best bid first (highest)
  orderBooks[stock.sym] = { asks, bids, lastMmReplenishAt: 0, lastPriceCenter: stock.price };
}

/* MM passive replenishment — fires with a realistic delay after the book thins out.
   Confirmed design: MM takes a few real seconds to replenish, so the player can see
   the book scarce after large orders. */
const MM_REPLENISH_DELAY_MS = { low: 600, med: 400, high: 250, extreme: 150 };
const MM_MIN_LEVELS = 5; // always keep at least this many levels on each side

function maybeReplenishBook(stock){
  const ob = orderBooks[stock.sym];
  if(!ob) return;

  // ── MM reacts to player limit orders ─────────────────────────
  const playerOrders = (window.playerLimitOrders||[]).filter(o=>o.status==='open'&&o.sym===stock.sym);
  playerOrders.forEach(o=>{
    if(o.qty < 500) return; // small orders — MM ignores
    if(o.side==='buy'){
      // Large player bid → MM absorbs: matches the price with similar size
      const existing = ob.bids.find(b=>Math.abs(b.price-o.price)<0.02);
      if(existing){
        if(o.qty >= 5000){
          // Very large → MM fades: widens spread, moves away
          existing.price = +(existing.price - 0.02).toFixed(2);
          if(!o._mmFaded) { o._mmFaded = true; flashToast(`🏦 MM se aleja del bid de ${o.qty.toLocaleString()} @ $${o.price}`, false); }
        } else {
          // Medium → MM absorbs: adds size at same level
          existing.size = Math.min(existing.size + Math.floor(o.qty*0.5), 99999);
        }
      }
    } else {
      // Large player ask → MM absorbs or fades on ask side
      const existing = ob.asks.find(a=>Math.abs(a.price-o.price)<0.02);
      if(existing && o.qty >= 5000){
        existing.price = +(existing.price + 0.02).toFixed(2);
        if(!o._mmFaded) { o._mmFaded = true; flashToast(`🏦 MM se aleja del ask de ${o.qty.toLocaleString()} @ $${o.price}`, false); }
      }
    }
  });

  const needsReplenish = ob.asks.length < MM_MIN_LEVELS || ob.bids.length < MM_MIN_LEVELS;
  if(!needsReplenish) return;
  const delay = MM_REPLENISH_DELAY_MS[stock.volatility] || 400;
  if(Date.now() - ob.lastMmReplenishAt < delay) return;
  ob.lastMmReplenishAt = Date.now();
  const params = VOL_PARAMS[stock.volatility];
  const tick = Math.max(0.01, +(stock.price * params.spreadPct).toFixed(stock.price < 10 ? 3 : 2));
  // rebuild from current best price outward so there are no gaps
  const target = Math.max(params.levels, MM_MIN_LEVELS);
  const refAsk = ob.asks.length ? ob.asks[0].price : +(stock.price + tick).toFixed(2);
  const refBid = ob.bids.length ? ob.bids[0].price : +(stock.price - tick).toFixed(2);
  while(ob.asks.length < target){
    const next = +(refAsk + (target - ob.asks.length + 1)*tick).toFixed(2);
    ob.asks.push({ price: next, size: Math.floor(params.minSize*0.7 + Math.random()*(params.maxSize-params.minSize*0.7)) });
  }
  while(ob.bids.length < target){
    const next = +(refBid - (target - ob.bids.length + 1)*tick).toFixed(2);
    ob.bids.push({ price: next, size: Math.floor(params.minSize*0.7 + Math.random()*(params.maxSize-params.minSize*0.7)) });
  }
  ob.asks.sort((a,b)=>a.price-b.price);
  ob.bids.sort((a,b)=>b.price-a.price);
}

/* If price drifts far from book center, rebuild the book around the new price
   (this handles the flowForce hybrid contribution moving price slowly over time) */
function reanchorBookIfNeeded(stock){
  const ob = orderBooks[stock.sym];
  if(!ob) return;
  const bestAsk = ob.asks[0] ? ob.asks[0].price : stock.price;
  const bestBid = ob.bids[0] ? ob.bids[0].price : stock.price;
  const bookMid = (bestAsk + bestBid) / 2;
  if(Math.abs(bookMid - stock.price) > stock.price * 0.008){ // drifted > 0.8%
    orderBooks[stock.sym] = null; // force reinit around new price
    initOrderBook(stock);
  }
}

/* Adapter: converts persistent order book into the {rows, tick, params} format the
   rest of the UI already expects (renderL2, etc.) — so no UI code needs to change */
function genBookForStock(stock){
  initOrderBook(stock);
  maybeReplenishBook(stock);
  reanchorBookIfNeeded(stock);
  const ob = orderBooks[stock.sym];
  const params = VOL_PARAMS[stock.volatility];
  const tick = ob.asks[0] && ob.bids[0] ? +(ob.asks[0].price - ob.bids[0].price).toFixed(2) : 0.01;
  const rows = [];

  // ── Inject player limit orders into the book ──────────────────
  // Buy limits → show on bid side; Sell limits → show on ask side
  const playerBids = [];
  const playerAsks = [];
  // Own limit orders
  const allVisibleLimitOrders = [
    ...(window.playerLimitOrders||[]).filter(o=>o.status==='open'&&o.sym===stock.sym),
    ...(window._otherPlayersLimitOrders||[]).filter(o=>o.sym===stock.sym)
  ];
  allVisibleLimitOrders.forEach(o=>{
    const isMe = !o.isOtherPlayer;
    const entry = { 
      price:+o.price.toFixed(2), size:o.qty, 
      isPlayer:isMe, isOtherPlayer:o.isOtherPlayer,
      playerName:o.playerName||(isMe?window._playerName||'You':'Trader')
    };
    if(o.side==='buy')  playerBids.push(entry);
    else                playerAsks.push(entry);
  });

  // Merge player asks into ob.asks
  const allAsks = [...ob.asks, ...playerAsks].sort((a,b)=>a.price-b.price);
  const allBids = [...ob.bids, ...playerBids].sort((a,b)=>b.price-a.price);

  // Merge same-price levels
  const mergedAsks = [], mergedBids = [];
  allAsks.forEach(a=>{
    const last = mergedAsks[mergedAsks.length-1];
    if(last && last.price===a.price){ last.size+=a.size; if(a.isPlayer) last.isPlayer=true; }
    else mergedAsks.push({...a});
  });
  allBids.forEach(b=>{
    const last = mergedBids[mergedBids.length-1];
    if(last && last.price===b.price){ last.size+=b.size; if(b.isPlayer) last.isPlayer=true; }
    else mergedBids.push({...b});
  });

  const asksSorted = mergedAsks.slice().sort((a,b)=>b.price-a.price);
  for(const a of asksSorted) rows.push({side:'ask', price:a.price, size:a.size, isPlayer:a.isPlayer, isOtherPlayer:a.isOtherPlayer});
  rows.push({side:'spot', price: stock.price});
  for(const b of mergedBids) rows.push({side:'bid', price:b.price, size:b.size, isPlayer:b.isPlayer, isOtherPlayer:b.isOtherPlayer});
  return { rows, tick, params };
}
function genBookForIndex(sector){
  const members = allStocks.filter(s=>s.sectorKey===sector.sectorKey);
  const totalCap = members.reduce((a,s)=>a+s.marketCap,0);
  const indexPrice = members.reduce((a,s)=> a + (s.price/10)*(s.marketCap/totalCap), 0) * 10;
  const params = VOL_PARAMS[sector.sectorVolatility];
  const tick = +(indexPrice * params.spreadPct).toFixed(2) || 0.05;
  const depthMultiplier = members.length;
  const rows = [];
  for(let i=params.levels; i>=1; i--) rows.push({side:'ask', price: +(indexPrice + i*tick).toFixed(2), size: Math.floor((Math.random()*(params.maxSize-params.minSize)+params.minSize)*depthMultiplier*0.6)});
  rows.push({side:'spot', price: indexPrice});
  for(let i=1; i<=params.levels; i++) rows.push({side:'bid', price: +(indexPrice - i*tick).toFixed(2), size: Math.floor((Math.random()*(params.maxSize-params.minSize)+params.minSize)*depthMultiplier*0.6)});
  return { rows, tick, params, indexPrice, members };
}

const DAY_RANGE_PCT = { low: 0.006, med: 0.015, high: 0.035, extreme: 0.07 };
const YEAR_RANGE_PCT = { low: 0.18, med: 0.32, high: 0.55, extreme: 0.85 };
const AVG_VOL_BASE = { low: 1.2e6, med: 3.5e6, high: 8e6, extreme: 14e6 };
/* ===================================================================
   OPTION CHAIN ENGINE — Step 1 of the options plan.
   Simplified Black-Scholes-ish pricing (not exact, this is a game) so every column in the
   document (Greeks, IV, probabilities, intrinsic/extrinsic) has a real, internally-consistent
   number behind it instead of being random noise. Expirations and per-strike independent
   markets (Steps 2-3) come next; for now each strike/expiry combo gets one coherent quote.
   =================================================================== */
const EXPIRATIONS = [
  { key:'15m', label:'15 min',  type:'short', minutesToExpiry: 15 },
  { key:'30m', label:'30 min',  type:'short', minutesToExpiry: 30 },
  { key:'1h',  label:'1 hora',  type:'short', minutesToExpiry: 60 },
  { key:'1d',  label:'1 día',   type:'major', minutesToExpiry: 60*8 },
  { key:'1w',  label:'1 semana',type:'major', minutesToExpiry: 60*8*5 },
];
let currentExpirationKey = '1d';

function erf(x){
  // Abramowitz-Stegun approximation, good enough for game-grade Greeks
  const sign = x<0?-1:1; x=Math.abs(x);
  const a1=0.254829592,a2=-0.284496736,a3=1.421413741,a4=-1.453152027,a5=1.061405429,p=0.3275911;
  const t=1/(1+p*x);
  const y=1-(((((a5*t+a4)*t)+a3)*t+a2)*t+a1)*t*Math.exp(-x*x);
  return sign*y;
}
function normCDF(x){ return 0.5*(1+erf(x/Math.sqrt(2))); }
function normPDF(x){ return Math.exp(-x*x/2)/Math.sqrt(2*Math.PI); }

function blackScholesGreeks(spot, strike, tYears, ivPct, optType){
  const iv = Math.max(0.01, ivPct/100);
  const r = 0.04; // flat risk-free rate, simplified
  const sqrtT = Math.sqrt(Math.max(tYears, 0.0001));
  const d1 = (Math.log(spot/strike) + (r + iv*iv/2)*tYears) / (iv*sqrtT);
  const d2 = d1 - iv*sqrtT;
  const Nd1 = normCDF(d1), Nd2 = normCDF(d2);
  const nd1 = normPDF(d1);
  let price, delta;
  if(optType === 'call'){
    price = spot*Nd1 - strike*Math.exp(-r*tYears)*Nd2;
    delta = Nd1;
  } else {
    price = strike*Math.exp(-r*tYears)*normCDF(-d2) - spot*normCDF(-d1);
    delta = Nd1 - 1;
  }
  const gamma = nd1 / (spot*iv*sqrtT);
  const vega = spot*nd1*sqrtT/100; // per 1% IV move
  const theta = optType==='call'
    ? (-(spot*nd1*iv)/(2*sqrtT) - r*strike*Math.exp(-r*tYears)*Nd2) / 365
    : (-(spot*nd1*iv)/(2*sqrtT) + r*strike*Math.exp(-r*tYears)*normCDF(-d2)) / 365;
  const rho = (optType==='call' ? strike*tYears*Math.exp(-r*tYears)*Nd2 : -strike*tYears*Math.exp(-r*tYears)*normCDF(-d2)) / 100;
  const probITM = optType==='call' ? Nd2 : normCDF(-d2);
  const probTouch = Math.min(1, probITM * 1.6); // rough heuristic: touching is more likely than finishing ITM
  return { price: Math.max(0.01, price), delta, gamma, vega, theta, rho, probITM, probTouch };
}

/* ===================================================================
   RISK PROFILE ENGINE (Step F) — pure math, no DOM. Computes P&L for a
   single leg or a consolidated multi-leg spread at any hypothetical
   spot price, both at expiration (intrinsic value only) and "today"
   (T+0, full Black-Scholes with the actual time remaining). This same
   engine is reused for Max Profit/Loss, Break-Even search, and the two
   chart lines — one source of truth so they can never disagree.
   =================================================================== */

/* Single leg P&L at EXPIRATION for a hypothetical spot — pure intrinsic value, no time/IV left.
   leg = { side: 'buy'|'sell', optType: 'call'|'put', strike, qty, entryPrice } */
function legPnLAtExpiration(leg, hypotheticalSpot){
  const intrinsic = leg.optType === 'call'
    ? Math.max(0, hypotheticalSpot - leg.strike)
    : Math.max(0, leg.strike - hypotheticalSpot);
  const valueAtExpiry = intrinsic * leg.qty * OPTION_CONTRACT_MULTIPLIER;
  const initialCashFlow = leg.entryPrice * leg.qty * OPTION_CONTRACT_MULTIPLIER; // what was paid (buy) or collected (sell) at entry
  return leg.side === 'buy' ? (valueAtExpiry - initialCashFlow) : (initialCashFlow - valueAtExpiry);
}
/* Single leg P&L "today" (T+0) for a hypothetical spot — full Black-Scholes value using the
   ACTUAL time remaining and the leg's IV, so this line decays toward the expiration line as the
   real session clock advances, exactly per the spec's DTE Physics requirement. */
function legPnLAtT0(leg, hypotheticalSpot, tYearsRemaining){
  const theoVal = blackScholesGreeks(hypotheticalSpot, leg.strike, Math.max(0.00001, tYearsRemaining), leg.iv, leg.optType).price;
  const currentValue = theoVal * leg.qty * OPTION_CONTRACT_MULTIPLIER;
  const initialCashFlow = leg.entryPrice * leg.qty * OPTION_CONTRACT_MULTIPLIER;
  return leg.side === 'buy' ? (currentValue - initialCashFlow) : (initialCashFlow - currentValue);
}
/* Consolidates any number of legs into one combined P&L curve at a given spot — this is what
   makes multi-leg spreads (Bull Call Spread, Iron Condor, etc.) show their NET risk profile
   instead of each leg's curve drawn separately. */
function consolidatedPnL(legs, hypotheticalSpot, tYearsRemaining, mode){
  return legs.reduce((total, leg) => total + (
    mode === 'expiration' ? legPnLAtExpiration(leg, hypotheticalSpot) : legPnLAtT0(leg, hypotheticalSpot, tYearsRemaining)
  ), 0);
}
function computeRiskProfileCurve(legs, tYearsRemaining, spotCenter, spreadPct){
  const range = spotCenter * spreadPct;
  const points = 80;
  const expirationCurve = [], t0Curve = [];
  for(let i=0;i<=points;i++){
    const spot = spotCenter - range + (range*2)*(i/points);
    expirationCurve.push({ spot, pnl: consolidatedPnL(legs, spot, tYearsRemaining, 'expiration') });
    t0Curve.push({ spot, pnl: consolidatedPnL(legs, spot, tYearsRemaining, 't0') });
  }
  return { expirationCurve, t0Curve };
}
/* Max Profit / Max Loss (Step F, corrected) — samples the expiration curve including each leg's
   EXACT strike (where kinks in the payoff diagram occur, so the true max/min is never missed
   between two coarse sample points), then checks the curve's slope at the outer edges of a wide
   window to decide whether either side is truly unbounded — matching how real platforms classify
   risk (e.g. a naked short call has unbounded loss as spot rises; a covered spread does not). */
function computeMaxProfitLoss(legs, spotCenter, spreadPct){
  const wideRange = spotCenter * spreadPct * 4;
  const lowSpot = Math.max(0.5, spotCenter-wideRange), highSpot = spotCenter+wideRange;
  const midSamples = 100;
  const sampleSpots = [];
  for(let i=0;i<=midSamples;i++) sampleSpots.push(lowSpot + (highSpot-lowSpot)*(i/midSamples));
  legs.forEach(l=>{ if(l.strike>=lowSpot && l.strike<=highSpot) sampleSpots.push(l.strike); }); // exact kink points
  sampleSpots.sort((a,b)=>a-b);
  let maxPnL = -Infinity, minPnL = Infinity;
  sampleSpots.forEach(spot=>{
    const pnl = consolidatedPnL(legs, spot, 0.0001, 'expiration');
    maxPnL = Math.max(maxPnL, pnl); minPnL = Math.min(minPnL, pnl);
  });
  const topSlope = (consolidatedPnL(legs, highSpot, 0.0001, 'expiration') - consolidatedPnL(legs, highSpot*0.98, 0.0001, 'expiration')) / (highSpot*0.02);
  const bottomSlope = (consolidatedPnL(legs, lowSpot*1.02, 0.0001, 'expiration') - consolidatedPnL(legs, lowSpot, 0.0001, 'expiration')) / (lowSpot*0.02);
  const unboundedProfitUp = topSlope > 0.5;
  const unboundedLossUp = topSlope < -0.5;
  const unboundedLossDown = bottomSlope > 0.5;
  return {
    maxProfit: unboundedProfitUp ? Infinity : maxPnL,
    maxLoss: (unboundedLossUp || unboundedLossDown) ? -Infinity : minPnL,
  };
}
/* Break-Even search: scans the expiration curve for sign changes (PnL crossing $0) and refines
   each crossing with linear interpolation between the two bracketing sample points. */
function computeBreakEvens(legs, spotCenter, spreadPct){
  const range = spotCenter * spreadPct;
  const points = 200;
  const breakEvens = [];
  let prevSpot = spotCenter-range, prevPnL = consolidatedPnL(legs, prevSpot, 0.0001, 'expiration');
  for(let i=1;i<=points;i++){
    const spot = spotCenter - range + (range*2)*(i/points);
    const pnl = consolidatedPnL(legs, spot, 0.0001, 'expiration');
    if((prevPnL <= 0 && pnl > 0) || (prevPnL >= 0 && pnl < 0)){
      const t = Math.abs(prevPnL) / (Math.abs(prevPnL)+Math.abs(pnl) || 1);
      breakEvens.push(+(prevSpot + (spot-prevSpot)*t).toFixed(2));
    }
    prevSpot = spot; prevPnL = pnl;
  }
  return breakEvens;
}
/* ===================================================================
   PERSISTENT OPTION MARKET STATE — replaces the old "reroll everything
   on every render" approach (that's what made volume jump 1K->800->1K,
   it was being reinvented from scratch each frame). Every contract now
   has ONE row of state that only ever updates incrementally:
     - volume only accumulates (real session volume, resets only when
       a new expiration "opens" — exactly like a real options session)
     - openInterest rises on new opens, falls only when BOTH sides close
       (organic OI, same model the options spec asks for)
     - bid/ask drift smoothly tick to tick instead of being re-rolled
     - each contract keeps its own recent-trades tape (synthetic, with
       trader names for big prints — same flavor as the original
       SPX project's tape)
   =================================================================== */
const optionMarketState = {}; // contractKey -> persistent row

/* ===================================================================
   OPTION FLOW STREAM (Step 4) — a global, cross-symbol log of every
   real option print the engine generates (system flow) plus every
   order the player executes, in the Unusual-Whales-style row shape the
   spec calls for. This is populated from the SAME tickOptionContract
   prints that already drive volume/OI/tape — no separate random feed.
   =================================================================== */
const OPTION_FLOW_LOG_CAP = 500;
let optionFlowLog = []; // newest first
let optionFlowFilters = { minPremium: 0, type: 'all', side: 'all' };

/* ===================================================================
   LIVE SCANNER (Step 6) — surfaces alerts for option flow whose total
   premium crosses a large threshold, with click-to-navigate so clicking
   an alert jumps the whole app straight to that ticker.
   =================================================================== */
const SCANNER_PREMIUM_THRESHOLD = 100000; // $100K, per the spec's lower tier
const SCANNER_ALERT_CAP = 30;
let scannerAlerts = []; // newest first
let scannerCollapsed = false;
/* Random Decay Engine (Step D) — once the scanner is at capacity, a NEW alert arriving doesn't
   just bump out the oldest one (strict FIFO). Instead it removes a RANDOM existing alert,
   independent of arrival order, so the feed feels like a real trading floor tape where some
   prints lose relevance and attention unpredictably rather than purely by age. */
function pushScannerAlert(entry){
  scannerAlerts.unshift({ ...entry, alertId: Date.now()+Math.random() });
  if(scannerAlerts.length > SCANNER_ALERT_CAP){
    const removeIdx = 1 + Math.floor(Math.random() * (scannerAlerts.length-1)); // never evict the brand-new one at index 0
    scannerAlerts.splice(removeIdx, 1);
  }
  renderScannerWidget();
}
function renderScannerWidget(){
  const body = document.getElementById('scannerBody');
  if(!body) return;
  const titleEl = document.getElementById('scannerTitleText');
  if(titleEl) titleEl.textContent = t('scanner.title');
  if(!scannerAlerts.length){
    body.innerHTML = `<div class="scanner-empty">${t('scanner.empty')}</div>`;
    return;
  }
  body.innerHTML = scannerAlerts.map(a=>{
    const classLabel = a.printClass==='STRAT_SWEEP' ? 'STRAT SWEEP' : a.printClass==='BLOCK' ? 'BLOCK' : 'SWEEP';
    const timeStr = fmtFlowTime(a.time);
    return `<div class="scanner-alert" data-sym="${a.sym}" data-alert-id="${a.alertId}">
      🚨 ALERTA: ${classLabel} Masivo en <b>${a.sym}</b> — Strike ${a.strike}${a.optType==='call'?'C':'P'} — Exp: ${a.dte}d — ${fmtMoney(a.totalPremium)} Premium.
      <div class="sa-time">${timeStr}</div>
    </div>`;
  }).join('');
  body.querySelectorAll('.scanner-alert').forEach(el=>{
    el.addEventListener('click', ()=>{
      currentMode = 'stock'; currentSym = el.dataset.sym;
      if(currentSection !== 'trading') switchSection('trading');
      rebuildSymSelect(); renderAllData(); schedulePersist();
    });
  });
}

function approxDTE(expiryKey){
  const expiry = EXPIRATIONS.find(e=>e.key===expiryKey);
  return Math.max(0, +(expiry.minutesToExpiry/(60*24)).toFixed(2));
}
function logOptionFlowEntry({ sym, strike, optType, expiryKey, qty, premium, side, isPlayer, printClass }){
  const isStockPrint = printClass === 'DARK_POOL' && strike === 0;
  const totalPremium = isStockPrint ? premium * qty : premium * qty * OPTION_CONTRACT_MULTIPLIER;
  const finalClass = printClass || (isPlayer ? (qty>=BIG_PRINT_THRESHOLD ? 'BLOCK' : 'NORMAL') : 'NORMAL');
  const entry = {
    time: Date.now(), sym, strike, optType, dte: approxDTE(expiryKey),
    qty, premium, totalPremium, side, isPlayer: !!isPlayer, isStockPrint, printClass: finalClass,
  };
  optionFlowLog.unshift(entry);
  if(optionFlowLog.length > OPTION_FLOW_LOG_CAP) optionFlowLog.length = OPTION_FLOW_LOG_CAP;

  // Scanner trigger (Step 6) — directional option aggression (sweep/block/strat) over the
  // threshold gets surfaced as a live alert; dark pool prints are excluded since those are
  // off-tape by nature, not directional aggression on the visible book.
  if(!isStockPrint && totalPremium >= SCANNER_PREMIUM_THRESHOLD && ['SWEEP','BLOCK','STRAT_SWEEP'].includes(finalClass)){
    pushScannerAlert(entry);
  }
}
const optionStrikesCache = {}; // `${sym}-${expiryKey}` -> array of strike numbers, fixed once generated

function contractStateKey(sym, strike, optType, expiryKey){ return `${sym}-${strike}${optType==='call'?'C':'P'}-${expiryKey}`; }

function getOrInitContractState(stock, strike, optType, expiryKey){
  const key = contractStateKey(stock.sym, strike, optType, expiryKey);
  if(optionMarketState[key]) return optionMarketState[key];
  const expiry = EXPIRATIONS.find(e=>e.key===expiryKey);
  const tYears = expiry.minutesToExpiry / (60*24*365);
  const baseIV = { low: 18, med: 28, high: 45, extreme: 75 }[stock.volatility];
  const isMajor = expiry.type === 'major';
  const distance = Math.abs(strike - stock.price);
  // Gaussian concentration around ATM — real options markets cluster activity tightly near the
  // money and fall off exponentially (not linearly) as strikes get further out. sigma scales with
  // the stock's price level so the "width" of the bell feels proportional across cheap/expensive names.
  const sigma = stock.price * 0.035;
  const distanceFactor = Math.max(0.04, Math.exp(-(distance*distance)/(2*sigma*sigma)));
  const ivSkewAdj = (optType==='put' && strike < stock.price) ? baseIV*0.06 : 0;
  const iv = baseIV + ivSkewAdj;
  const greeks = blackScholesGreeks(stock.price, strike, tYears, iv, optType);
  const mid = greeks.price;
  const spreadPct = isMajor ? 0.02 : 0.05;
  // seed OI as if the session/expiration already had some standing interest when it "opened",
  // concentrated more on major (1d/1w) expirations and near-the-money strikes — per the spec
  const oiSeedBase = isMajor ? 600 : 60;
  const initialOI = Math.floor(oiSeedBase * distanceFactor * (0.6+Math.random()*0.8));
  const row = {
    key, sym: stock.sym, strike, optType, expiryKey,
    bid: +(mid*(1-spreadPct)).toFixed(2), ask: +(mid*(1+spreadPct)).toFixed(2),
    lastPrice: +mid.toFixed(2), prevClose: +mid.toFixed(2),
    volume: 0, // real session volume — starts at zero "at the open" and only ever accumulates
    openInterest: initialOI, initialOI, // initialOI kept fixed so "new money" (volume > initial OI) can be detected later
    iv, tape: [], // {time, price, qty, side, trader|null}
  };
  optionMarketState[key] = row;
  return row;
}

function getStrikesForChain(stock, expiryKey){
  const cacheKey = `${stock.sym}-${expiryKey}`;
  if(optionStrikesCache[cacheKey]) return optionStrikesCache[cacheKey];
  /* Wide-coverage universe (bugfix) — instead of 21 strikes centered ONLY on the stock's seed
     price (which goes stale once the live price drifts far enough away, exactly the bug seen
     in the screenshot: NRAI's chain stuck at 162-175 while the real price had fallen to 114),
     this now spans from near $1 all the way up to several multiples of the seed price, using
     a tiered step size like a real exchange (tighter steps at low prices, wider at high prices)
     so the strike COUNT stays reasonable for the engine to keep ticking every one of them live. */
  function stepFor(p){ return p>200 ? 5 : p>50 ? 2.5 : p>10 ? 1 : 0.5; }
  const seedPrice = stock.price;
  const lowBound = 1;
  const highBound = Math.max(seedPrice * 4, 50); // generous multiple of the seed price, covers a big crash OR rally
  const strikes = [];
  let p = lowBound;
  while(p <= highBound){
    strikes.push(+p.toFixed(2));
    p += stepFor(p);
  }
  optionStrikesCache[cacheKey] = strikes;
  return strikes;
}
/* Custom Strike View (Step C) — selects a symmetric subset of the wide strike universe centered
   on whichever strike is currently nearest the live spot price. 'all' returns everything. */
let strikeRangeSetting = 12; // 8 | 12 | 20 | 'all'
function getVisibleStrikes(stock, expiryKey){
  const allStrikes = getStrikesForChain(stock, expiryKey);
  if(strikeRangeSetting === 'all') return allStrikes;
  const nearestIdx = allStrikes.reduce((bestIdx,s,i)=>
    Math.abs(s-stock.price) < Math.abs(allStrikes[bestIdx]-stock.price) ? i : bestIdx, 0);
  const half = Math.floor(strikeRangeSetting/2);
  const start = Math.max(0, nearestIdx-half);
  const end = Math.min(allStrikes.length, start+strikeRangeSetting);
  // re-anchor start if we hit the end of the universe, so we still return the full requested count when possible
  const adjustedStart = Math.max(0, end-strikeRangeSetting);
  return allStrikes.slice(adjustedStart, end);
}

const BIG_PRINT_THRESHOLD = 80;

/* ===================================================================
   PRINT CLASSIFICATION (Step 5) — one shared function so the Option
   Flow Stream and every contract's own Time & Sales tape agree on what
   counts as a SWEEP, BLOCK TRADE, DARK POOL, or STRAT SWEEP, with one
   consistent color set across the whole app.
   =================================================================== */
const PRINT_CLASS_COLORS = {
  SWEEP: '#9B59E0', BLOCK: '#3D8FE5', DARK_POOL: '#6B7280', STRAT_SWEEP: '#E0399B', SPLIT: '#E5872E', NORMAL: null,
};
const recentSymbolPrints = {}; // sym -> [{time, strike, optType}] very short window, used to detect multi-leg strat sweeps
function classifyOptionPrint({ sym, strike, optType, qty, inBurst, isStockTrade }){
  if(isStockTrade) return 'DARK_POOL'; // per the spec, dark pool tagging is exclusive to stock (not option) prints
  // strat sweep: a DIFFERENT strike/type on the SAME underlying printed within the last ~1.5s —
  // reads as a coordinated multi-leg structure (e.g. a call bought alongside a put sold)
  const recent = recentSymbolPrints[sym] || [];
  const now = Date.now();
  const hasRelatedLeg = recent.some(p => now-p.time < 1500 && (p.strike!==strike || p.optType!==optType));
  recentSymbolPrints[sym] = [...recent.filter(p=>now-p.time<1500), { time: now, strike, optType }].slice(-6);
  if(hasRelatedLeg && qty >= 10) return 'STRAT_SWEEP';
  if(inBurst) return 'SWEEP'; // consuming several consecutive prints/levels in one direction
  if(qty >= BIG_PRINT_THRESHOLD) return 'BLOCK';
  return 'NORMAL';
}


/* Reprices bid/ask gently toward fresh theoretical value each tick (small drift, not a reroll)
   and occasionally generates a synthetic transaction that moves volume/OI/lastPrice for real. */
function tickOptionContract(stock, strike, optType, expiryKey){
  const row = getOrInitContractState(stock, strike, optType, expiryKey);
  const expiry = EXPIRATIONS.find(e=>e.key===expiryKey);
  const tYears = Math.max(0.00001, expiry.minutesToExpiry / (60*24*365));
  const greeks = blackScholesGreeks(stock.price, strike, tYears, row.iv, optType);
  const theoretical = greeks.price;
  row._greeks = greeks;

  // Gaussian activity weight — same bell-curve shape used to seed OI, applied here so volume
  // accumulating over time ALSO concentrates near the money instead of spreading evenly across
  // every strike regardless of distance, which is what real options activity looks like.
  const sigma = stock.price * 0.035;
  const distFromSpot = Math.abs(strike - stock.price);
  const gaussWeight = Math.max(0.04, Math.exp(-(distFromSpot*distFromSpot)/(2*sigma*sigma)));

  // synthetic transaction chance — frequent SMALL prints instead of rare big jumps. Real "size"
  // shows up as several consecutive prints in a short burst (decided below), not one giant qty.
  if(Math.random() > (1 - 0.70*gaussWeight)){
    const isShortDated = expiry.type === 'short'; // 15m/30m/1h — accumulation patterns concentrate here per the spec
    const inBurst = row._burstTicksLeft > 0;
    const burstStartChance = isShortDated ? 0.85 : 0.93; // short-dated strikes accumulate more readily
    if(!inBurst && Math.random() > burstStartChance){
      row._burstTicksLeft = isShortDated ? (6 + Math.floor(Math.random()*8)) : (3 + Math.floor(Math.random()*4));
      row._accumulating = isShortDated; // tag this burst as a visible "accumulation" pattern for the UI
    }
    const hitSide = row._burstSide || (Math.random()>0.5 ? 'ask' : 'bid');
    if(inBurst) row._burstSide = hitSide; // keep the whole burst on one side, like a real sweep
    const qty = inBurst ? Math.floor(Math.random()*12+4) : Math.floor(Math.random()*6+1); // small either way, burst is just denser+sustained
    if(row._burstTicksLeft > 0) row._burstTicksLeft--;
    else { row._burstSide = null; row._accumulating = false; }

    const price = hitSide==='ask' ? row.ask : row.bid;
    row.lastPrice = price;
    row.volume += qty; // ACCUMULATES — never reset except when a fresh expiration opens
    if(row.buyVolume==null) row.buyVolume = 0;
    if(row.sellVolume==null) row.sellVolume = 0;
    if(hitSide==='ask'){ row.buyVolume += qty; row._lastAskHitAt = Date.now(); } else row.sellVolume += qty; // money-direction tracking: hitting ask = aggressive buy, hitting bid = aggressive sell

    // organic open interest: most prints are players/institutions opening new exposure (OI up),
    // a smaller share are existing holders closing out (OI down, capped so it can't go negative)
    const isClosingTrade = Math.random() < 0.35 && row.openInterest > 0;
    if(isClosingTrade){
      row.openInterest = Math.max(0, row.openInterest - Math.floor(qty*0.6));
    } else {
      row.openInterest += Math.floor(qty*0.8);
    }

    const isBigPrint = qty >= BIG_PRINT_THRESHOLD || inBurst;
    const printClass = classifyOptionPrint({ sym: stock.sym, strike, optType, qty, inBurst });
    row.tape.push({ time: Date.now(), price, qty, side: hitSide==='ask'?'buy':'sell', trader: isBigPrint && Math.random()>0.6 ? randomTraderName() : null, printClass });
    if(row.tape.length > 40) row.tape.shift();
    logOptionFlowEntry({ sym: stock.sym, strike, optType, expiryKey, qty, premium: price, side: hitSide.toUpperCase(), isPlayer: false, printClass });

    // ----- supply & demand pressure on quotes: feed the MM inventory model -----
    recordMmInventoryChange(row, hitSide, qty);
  }

  // bid/ask drift toward theoretical fair value AND toward whatever the MM's inventory skew implies
  // (heavy one-sided buying pushes the quote up beyond fair value until the MM's hedge catches up,
  // exactly like a real market maker who's short gamma marking up their offer)
  const spreadPct = expiry.type==='major' ? 0.02 : 0.05;
  const inventorySkewPct = computeMmInventorySkew(row); // -1..1, positive = MM is net short (player has been buying), pushes mid up
  const skewAdjustedMid = theoretical * (1 + inventorySkewPct * 0.15);
  const currentMid = (row.bid+row.ask)/2;
  const newMid = currentMid + (skewAdjustedMid-currentMid)*0.3;
  row.bid = +(newMid*(1-spreadPct)).toFixed(2);
  row.ask = +(newMid*(1+spreadPct)).toFixed(2);
  recordOptionTick(row.key, row); // Step 10: feeds the contract's own real candle history
}

/* ===================================================================
   MARKET MAKER INVENTORY + HEDGING — adapted from the prior SPX project,
   advanced ahead of schedule (originally planned for Step 6) because the
   quote-pressure mechanism the player asked for needs it to feel real:
   the MM is the counterparty to every contract trade. Heavy one-sided
   buying leaves the MM net short that contract, which (a) pushes the
   quote itself, and (b) once it crosses a threshold, forces the MM to
   buy/sell the underlying stock to hedge — which is what actually moves
   the stock's price as a consequence of options flow.
   =================================================================== */
function triggerDynamicMmResponse(s,p){}

const MM_HEDGE_THRESHOLD = 150; // net contracts of unhedged exposure before the MM hedges in the underlying
function recordMmInventoryChange(row, hitSide, qty){
  if(row._mmNetQty == null) row._mmNetQty = 0;
  if(row._mmHedgedUpTo == null) row._mmHedgedUpTo = 0;
  // a player/synthetic BUY (hits ask) means the MM sold -> MM goes more short; a SELL means MM bought -> more long
  row._mmNetQty += hitSide==='ask' ? -qty : qty;
  const unhedgedExposure = Math.abs(row._mmNetQty) - Math.abs(row._mmHedgedUpTo);
  if(unhedgedExposure >= MM_HEDGE_THRESHOLD){
    const hedgeSide = row._mmNetQty < 0 ? 'buy' : 'sell'; // MM net short the contract -> delta-hedges by buying/selling the underlying
    const deltaApprox = row._greeks ? Math.abs(row._greeks.delta) : 0.5;
    const hedgeShares = Math.max(1, Math.round(unhedgedExposure * deltaApprox * OPTION_CONTRACT_MULTIPLIER * 0.02));
    applyMmHedgeToStock(row.sym, hedgeSide, hedgeShares);
    row._mmHedgedUpTo = row._mmNetQty;
  }
}
function computeMmInventorySkew(row){
  if(row._mmNetQty == null) return 0;
  return Math.max(-1, Math.min(1, -row._mmNetQty / (MM_HEDGE_THRESHOLD*2))); // net short MM (negative netQty) => positive skew, pushes price up
}
/* the MM's hedge is a real, visible nudge to the underlying — small per hedge, but it's the
   mechanism the player asked for: heavy call buying on a strike eventually shows up as upward
   pressure on the stock itself, because the MM had to go buy shares to stay delta-neutral. */
function applyMmHedgeToStock(sym, hedgeSide, hedgeShares){
  const stock = allStocks.find(s=>s.sym===sym);
  if(!stock) return;
  const pctMove = (hedgeShares / 5000) * (hedgeSide==='buy' ? 1 : -1); // shares scaled into a price-impact percentage, deliberately small per hedge
  stock.price = Math.max(0.5, +(stock.price * (1+pctMove*0.01)).toFixed(2));
  if(!stock._mmHedgeTape) stock._mmHedgeTape = [];
  stock._mmHedgeTape.push({ time: Date.now(), side: hedgeSide, shares: hedgeShares });
  if(stock._mmHedgeTape.length > 20) stock._mmHedgeTape.shift();
}

/* Builds the visible rows for the chain UI from the persistent state — this NEVER rerolls
   bid/ask/volume/OI, it just reads whatever optionMarketState already holds (ticking it forward
   one notch first so the displayed numbers are current). */
function genOptionChainForStock(stock, expiryKey){
  const strikes = getVisibleStrikes(stock, expiryKey);
  const rows = [];
  strikes.forEach(strike=>{
    ['call','put'].forEach(optType=>{
      const row = getOrInitContractState(stock, strike, optType, expiryKey);
      const expiry = EXPIRATIONS.find(e=>e.key===expiryKey);
      const tYears = Math.max(0.00001, expiry.minutesToExpiry / (60*24*365));
      const greeks = row._greeks || blackScholesGreeks(stock.price, strike, tYears, row.iv, optType);
      const intrinsic = optType==='call' ? Math.max(0, stock.price-strike) : Math.max(0, strike-stock.price);
      const mid = (row.bid+row.ask)/2;
      const extrinsic = Math.max(0, mid - intrinsic);
      rows.push({
        strike, optType, expiryKey,
        bid: row.bid, ask: row.ask, last: row.lastPrice, mark: +mid.toFixed(2),
        change: +(row.lastPrice - row.prevClose).toFixed(2),
        volume: row.volume, openInterest: row.openInterest,
        iv: row.iv, delta:greeks.delta, gamma:greeks.gamma, theta:greeks.theta, vega:greeks.vega, rho:greeks.rho,
        intrinsic: +intrinsic.toFixed(2), extrinsic: +extrinsic.toFixed(2),
        probITM: greeks.probITM, probOTM: 1-greeks.probITM, probTouch: greeks.probTouch,
        spread: +(row.ask-row.bid).toFixed(2), tickSize: stock.price>3 ? 0.05 : 0.01,
        accumulating: !!row._accumulating, burstSide: row._burstSide,
        buyVolume: row.buyVolume||0, sellVolume: row.sellVolume||0,
        lastSide: row.tape.length ? row.tape[row.tape.length-1].side : null,
        lastAskHitAt: row._lastAskHitAt || 0,
        isNewMoney: row.volume > row.initialOI,
      });
    });
  });
  return rows;
}

/* called every engine tick, alongside the underlying stock engine, for every strike currently
   in that stock's chain across all 5 expirations — this is what makes the whole chain feel alive
   in the background, not just whatever the player happens to be looking at. */
function tickOptionChainForStock(stock){
  EXPIRATIONS.forEach(expiry=>{
    const allStrikes = getStrikesForChain(stock, expiry.key);
    // only tick strikes within a generous radius of the CURRENT live price — this radius tracks
    // price as it moves over time (unlike the fixed seed-price universe), so the chain always
    // stays centered on real activity without paying the cost of ticking the entire wide universe
    // (which exists purely so strikes are always THERE if price drifts, not so all of them tick).
    const tickRadius = stock.price * 0.45;
    const strikes = allStrikes.filter(s => Math.abs(s-stock.price) <= tickRadius);
    strikes.forEach(strike=>{
      tickOptionContract(stock, strike, 'call', expiry.key);
      tickOptionContract(stock, strike, 'put', expiry.key);
    });
  });
}

const QUARTERS = ['Q1','Q2','Q3','Q4'];
const PRICE_REACTION_MULT = { low: 0.3, med: 0.6, high: 1.1, extreme: 2.0 };
const financialsCache = {};
function genFinancialsForStock(stock){
  if(financialsCache[stock.sym]) return financialsCache[stock.sym];
  const salesMultiple = 2 + Math.random()*6;
  const annualRevenue = stock.marketCap / salesMultiple;
  const baseQuarterlyRevenue = annualRevenue / 4;
  const sharesOutstanding = stock.marketCap / stock.price;
  let quarters = [];
  let runningRevenue = baseQuarterlyRevenue * (0.85 + Math.random()*0.3);
  for(let q=0; q<4; q++){
    runningRevenue *= (1 + (Math.random()-0.45)*0.08);
    const revenue = runningRevenue;
    const grossMarginPct = stock.sectorKey==='ai' ? 0.55+Math.random()*0.2 : stock.sectorKey==='biotech' ? 0.6+Math.random()*0.25 : 0.25+Math.random()*0.3;
    const costOfRevenue = revenue * (1-grossMarginPct);
    const grossProfit = revenue - costOfRevenue;
    const operatingExpenses = revenue * (0.15 + Math.random()*0.25);
    const operatingIncome = grossProfit - operatingExpenses;
    const taxRate = 0.18 + Math.random()*0.08;
    const netIncome = operatingIncome > 0 ? operatingIncome * (1-taxRate) : operatingIncome * 1.1;
    const epsExpected = netIncome / sharesOutstanding * (0.92+Math.random()*0.16);
    const epsActual = netIncome / sharesOutstanding;
    const surprisePct = epsExpected !== 0 ? (epsActual - epsExpected) / Math.abs(epsExpected) : 0;
    const totalAssets = stock.marketCap * (0.6 + Math.random()*0.8);
    const cash = totalAssets * (0.08 + Math.random()*0.18);
    const totalLiabilities = totalAssets * (0.3 + Math.random()*0.35);
    const totalEquity = totalAssets - totalLiabilities;
    const operatingCF = netIncome * (0.9 + Math.random()*0.6);
    const investingCF = -revenue * (0.05 + Math.random()*0.15);
    const financingCF = (Math.random()-0.5) * revenue * 0.1;
    const freeCashFlow = operatingCF + investingCF;
    quarters.push({
      quarter: QUARTERS[q],
      income: { revenue, costOfRevenue, grossProfit, operatingExpenses, operatingIncome, netIncome, epsActual, epsExpected, surprisePct },
      balance: { totalAssets, cash, totalLiabilities, totalEquity },
      cashflow: { operatingCF, investingCF, financingCF, freeCashFlow },
    });
  }
  financialsCache[stock.sym] = quarters;
  return quarters;
}

/* ===================================================================
   CHART ENGINE — multiple independent chart instances, each with its
   own symbol/timeframe and a seeded candle history.
   =================================================================== */
/* ===================================================================
   REAL TIMEFRAME AGGREGATION — replaces the old "one generic 60-candle
   array shared by every timeframe button" approach (1m and 5m looked
   identical because they were). We now keep a tick-level price history
   per symbol and bucket it into real 1m/5m/1H candles on demand, same
   pattern already validated in the prior SPX project.
   =================================================================== */
const priceTickHistory = {}; // sym -> [{t: ms, p: price, v: synthetic volume for that tick}]
const TIMEFRAME_SECONDS = { '1m': 60, '5m': 300, '15m': 900, '1h': 3600, '4h': 14400, 'd': 86400 };
function seedPriceTickHistory(sym){
  if(priceTickHistory[sym]) return priceTickHistory[sym];
  const basePrice = getSymPrice(sym);
  const vol = getSymVol(sym);
  const stepPct = { low:0.0015, med:0.004, high:0.009, extreme:0.018 }[vol];
  const volBase = { low:80, med:250, high:700, extreme:1500 }[vol];
  const now = Date.now();
  const hist = [];
  // Start from a price close to basePrice (±2%) so the seed doesn't create a huge gap
  let p = basePrice * (0.98 + Math.random()*0.04);
  // Coarse history: 23h at 30s steps
  for(let i=2760; i>=1; i--){
    p = Math.max(0.01, p * (1 + (Math.random()-0.49)*stepPct*0.4));
    hist.push({ t: now - (3600 + i*30)*1000, p: +p.toFixed(2), v: Math.floor(volBase*0.6*(0.3+Math.random())) });
  }
  // Fine history: last 1h at 1s steps
  // Smoothly interpolate p → basePrice over the last 120 ticks to avoid a spike at t=now
  const priceAtFineStart = p;
  for(let i=3600; i>=0; i--){
    const blend = Math.max(0, (3600-i)/120); // last 120s smoothly approach basePrice
    const target = blend>=1 ? basePrice : priceAtFineStart + (basePrice-priceAtFineStart)*blend;
    p = Math.max(0.01, p * (1 + (Math.random()-0.49)*stepPct*(blend>=1?0.05:0.15)));
    // Clamp toward target in final 120s
    if(blend>0) p = p + (target - p) * Math.min(1, blend*0.3);
    hist.push({ t: now - i*1000, p: +p.toFixed(2), v: Math.floor(volBase*(0.3+Math.random())) });
  }
  // Final tick exactly at basePrice
  hist[hist.length-1].p = basePrice;
  priceTickHistory[sym] = hist;
  return hist;
}
function recordPriceTick(sym, price, vol){
  const hist = seedPriceTickHistory(sym);
  hist.push({ t: Date.now(), p: price, v: vol||Math.floor(50+Math.random()*150) });
  if(hist.length > 4000) hist.shift(); // cap memory; 4000 ticks covers well over an hour at our tick rate
}
/* buckets ANY tick history array into real candles for the requested timeframe — generic so both
   stock price history and option contract premium history (Step 10) can share this logic instead
   of duplicating the aggregation. */
function bucketTicksIntoCandles(hist, timeframeKey){
  const bucketMs = TIMEFRAME_SECONDS[timeframeKey] * 1000;
  const buckets = [];
  let cur = null, curBucketStart = null;
  hist.forEach(tick=>{
    const bucketStart = Math.floor(tick.t/bucketMs)*bucketMs;
    if(!cur || bucketStart !== curBucketStart){
      if(cur) buckets.push(cur);
      curBucketStart = bucketStart;
      cur = { o:tick.p, h:tick.p, l:tick.p, c:tick.p, v:tick.v };
    } else {
      cur.c = tick.p; cur.h = Math.max(cur.h, tick.p); cur.l = Math.min(cur.l, tick.p); cur.v += tick.v;
    }
  });
  if(cur) buckets.push(cur);
  return buckets.slice(-60); // keep the most recent 60 bars on screen regardless of timeframe
}
function buildCandlesForTimeframe(sym, timeframeKey){
  return bucketTicksIntoCandles(seedPriceTickHistory(sym), timeframeKey);
}

/* Option contract premium history (Step 10) — same tick-history + bucketing pattern as stocks,
   keyed by contract instead of symbol, so clicking a strike shows that contract's OWN real
   candlestick history instead of the simple line-chart placeholder used before. */
const optionPriceTickHistory = {}; // contractKey -> [{t, p, v}]
function seedOptionTickHistory(contractKey, row){
  if(optionPriceTickHistory[contractKey]) return optionPriceTickHistory[contractKey];
  const now = Date.now();
  const hist = [];
  // Seed 3 hours of 5-second ticks — enough for 1m, 5m, 15m, 1H candles
  let p = Math.max(0.01, row.lastPrice * (0.75 + Math.random()*0.1));
  const totalTicks = 2160; // 3h * 60min * 12 ticks/min (every 5s)
  for(let i=totalTicks; i>=0; i--){
    const drift = (Math.random()-0.47) * 0.025;
    p = Math.max(0.01, +(p * (1 + drift)).toFixed(3));
    hist.push({ t: now - i*5000, p, v: Math.floor(1+Math.random()*15) });
  }
  // Last tick = current price
  hist[hist.length-1].p = +row.lastPrice.toFixed(2);
  optionPriceTickHistory[contractKey] = hist;
  return hist;
}
function recordOptionTick(contractKey, row){
  const hist = seedOptionTickHistory(contractKey, row);
  hist.push({ t: Date.now(), p: row.lastPrice, v: Math.floor(2+Math.random()*10) });
  if(hist.length > 2000) hist.shift();
}
function buildOptionCandlesForTimeframe(contractKey, row, timeframeKey){
  return bucketTicksIntoCandles(seedOptionTickHistory(contractKey, row), timeframeKey);
}

const chartDimsById = {};
const chartIndicators = { ema9: true, ema21: true, vwap: true, rsi: false, macd: false, gex: false };

function calcEMA(closes, period){
  const k = 2/(period+1); let ema = closes[0];
  return closes.map(p=>{ ema = p*k + ema*(1-k); return ema; });
}
function calcVWAP(candles){
  let cumTP=0, cumV=0;
  return candles.map(c=>{ const tp=(c.h+c.l+c.c)/3; cumTP+=tp*(c.v||1); cumV+=(c.v||1); return cumTP/cumV; });
}
function calcRSI(closes, period=14){
  if(closes.length < period+1) return closes.map(()=>50);
  let gains=0, losses=0;
  for(let i=1;i<=period;i++){ const d=closes[i]-closes[i-1]; if(d>0)gains+=d; else losses-=d; }
  let avgG=gains/period, avgL=losses/period;
  const rsi=[50];
  for(let i=period+1;i<closes.length;i++){
    const d=closes[i]-closes[i-1];
    avgG=(avgG*(period-1)+(d>0?d:0))/period;
    avgL=(avgL*(period-1)+(d<0?-d:0))/period;
    rsi.push(avgL===0?100:100-100/(1+avgG/avgL));
  }
  while(rsi.length<closes.length) rsi.unshift(50);
  return rsi;
}
function calcMACD(closes){
  const ema12=calcEMA(closes,12), ema26=calcEMA(closes,26);
  const macdLine=closes.map((_,i)=>ema12[i]-ema26[i]);
  const signal=calcEMA(macdLine,9);
  const hist=macdLine.map((v,i)=>v-signal[i]);
  return {macdLine, signal, hist};
} // chartId -> {w,h,priceH,rMin,range,cw,gutterW} used by the synced cursor

/* ===================================================================
   DRAWING TOOLS (roadmap point 2, confirmed design: persistent per
   symbol via localStorage) — trend lines (2-click) and horizontal
   support/resistance lines (1-click), stored as PRICE coordinates (Y)
   and FRACTIONAL candle-index coordinates (X, 0..1 across the visible
   candle range) so they stay meaningful across timeframe changes,
   panel reopens, and page reloads.
   =================================================================== */
const CHART_DRAWINGS_KEY = 'marketsim_chart_drawings_v1';
let chartDrawings = {}; // sym -> [{ type:'trendline'|'hline', p1:{xFrac,price}, p2:{xFrac,price}|null, color }]
function loadChartDrawings(){
  try{
    const raw = localStorage.getItem(CHART_DRAWINGS_KEY);
    chartDrawings = raw ? JSON.parse(raw) : {};
  }catch(e){ chartDrawings = {}; }
}
function saveChartDrawings(){
  try{ localStorage.setItem(CHART_DRAWINGS_KEY, JSON.stringify(chartDrawings)); }catch(e){}
}
function getDrawingsForSym(sym){
  if(!chartDrawings[sym]) chartDrawings[sym] = [];
  return chartDrawings[sym];
}
/* Converts a mouse event's pixel position (relative to the chart SVG) into {xFrac, price} using
   the SAME dims renderChartSVG already published to chartDimsById — one shared source of truth
   so drawings always land exactly where the candles visually are, at any zoom/timeframe. */
function pixelToChartCoord(chartId, pxX, pxY){
  const dims = chartDimsById[chartId];
  if(!dims) return null;
  const xFrac = Math.max(0, Math.min(1, pxX / dims.plotW));
  const price = dims.rMin + (1 - pxY/dims.priceH) * dims.range;
  return { xFrac, price };
}
function chartCoordToPixel(chartId, xFrac, price){
  const dims = chartDimsById[chartId];
  if(!dims) return null;
  const pxX = xFrac * dims.plotW;
  const pxY = dims.priceH - ((price - dims.rMin)/dims.range) * dims.priceH;
  return { pxX, pxY };
}
let activeDrawingMode = {}; // chartId -> 'trendline'|'hline'|null — which tool (if any) is armed for that chart
let pendingTrendlinePoint = {}; // chartId -> first click's {xFrac,price} while waiting for the second click

function renderChartSVG(svgEl, candles, vol, chartId, sym){
  const w = 560, h = 240;
  const gutterW = 54; // reserved right-side price axis
  const plotW = w - gutterW;
  const volH = h*0.2, priceH = h - volH - 6; // reserve bottom ~20% for the volume panel
  svgEl.setAttribute('viewBox', `0 0 ${w} ${h}`);
  const prices = candles.flatMap(c=>[c.h,c.l]);
  const minP = Math.min(...prices), maxP = Math.max(...prices);
  const pad = (maxP-minP)*0.08 || 1;
  const rMin = minP-pad, rMax = maxP+pad, range = rMax-rMin;
  const cw = plotW/candles.length;
  const maxVol = Math.max(1, ...candles.map(c=>c.v||0));
  if(chartId != null) chartDimsById[chartId] = { w, h, plotW, priceH, rMin, range, cw, gutterW, candles };
  let svg = '';
  // light horizontal grid with right-side price labels
  for(let i=0;i<=4;i++){
    const y = priceH - (i/4)*priceH;
    const priceAtY = rMin + (i/4)*range;
    svg += `<line x1="0" y1="${y}" x2="${plotW}" y2="${y}" stroke="${getComputedStyle(document.documentElement).getPropertyValue('--border')}" stroke-width="1" opacity="0.5"/>`;
    svg += `<text x="${plotW+6}" y="${y+3}" font-size="9" font-family="monospace" fill="var(--text-dim)">${priceAtY.toFixed(2)}</text>`;
  }
  candles.forEach((c,i)=>{
    const x = i*cw + cw/2;
    const yO = priceH-((c.o-rMin)/range)*priceH, yC = priceH-((c.c-rMin)/range)*priceH;
    const yH = priceH-((c.h-rMin)/range)*priceH, yL = priceH-((c.l-rMin)/range)*priceH;
    const up = c.c>=c.o;
    const color = up ? 'var(--bid)' : 'var(--ask)';
    svg += `<line x1="${x}" y1="${yH}" x2="${x}" y2="${yL}" stroke="${color}" stroke-width="1"/>`;
    svg += `<rect x="${x-cw*0.32}" y="${Math.min(yO,yC)}" width="${cw*0.64}" height="${Math.max(1.5,Math.abs(yC-yO))}" rx="1" fill="${color}"/>`;
    // volume bar, anchored to the bottom of the canvas, scaled to this candle's share of the max
    const barH = Math.max(1, ((c.v||0)/maxVol) * volH);
    svg += `<rect x="${x-cw*0.32}" y="${h-barH}" width="${cw*0.64}" height="${barH}" fill="${color}" opacity="0.45"/>`;
  });
  // current price line + badge in the gutter, always at the live close
  const lastClose = candles[candles.length-1].c;
  const spotY = priceH - ((lastClose-rMin)/range)*priceH;
  if(isFinite(spotY)){
    svg += `<line x1="0" y1="${spotY}" x2="${plotW}" y2="${spotY}" stroke="var(--amber)" stroke-width="1" stroke-dasharray="2,3" opacity="0.7"/>`;
    svg += `<rect x="${plotW}" y="${spotY-8}" width="${gutterW-2}" height="16" rx="3" fill="var(--amber)"/>`;
    svg += `<text x="${plotW+5}" y="${spotY+4}" font-size="9.5" font-weight="700" font-family="monospace" fill="#0A0C10">${lastClose.toFixed(2)}</text>`;
  }
  // Drawing tools (roadmap point 2) — render any saved trend lines / horizontal S&R lines for
  // this symbol on top of the candles, converting their stored {xFrac,price} back into pixels
  // using THIS render's exact dims, so they always sit correctly regardless of zoom/timeframe.
  if(sym){
    getDrawingsForSym(sym).forEach(d=>{
      const p1px = { x: d.p1.xFrac*plotW, y: priceH-((d.p1.price-rMin)/range)*priceH };
      if(d.type==='hline'){
        svg += `<line x1="0" y1="${p1px.y}" x2="${plotW}" y2="${p1px.y}" stroke="${d.color}" stroke-width="1.3" stroke-dasharray="5,3"/>`;
        svg += `<text x="4" y="${p1px.y-3}" font-size="8" font-family="monospace" fill="${d.color}">${d.p1.price.toFixed(2)}</text>`;
      } else if(d.type==='trendline' && d.p2){
        const p2px = { x: d.p2.xFrac*plotW, y: priceH-((d.p2.price-rMin)/range)*priceH };
        svg += `<line x1="${p1px.x}" y1="${p1px.y}" x2="${p2px.x}" y2="${p2px.y}" stroke="${d.color}" stroke-width="1.6"/>`;
      }
    });
  }
  // ── INDICATOR OVERLAYS ──────────────────────────────
  const closes = candles.map(c=>c.c);
  function priceToY(p){ return priceH-((p-rMin)/range)*priceH; }
  function iToX(i){ return i*cw+cw/2; }
  function buildPath(vals, offsetStart=0){
    return vals.slice(offsetStart).map((v,i)=>{
      const x=iToX(i+offsetStart), y=priceToY(v);
      return (i===0?'M':'L')+x.toFixed(1)+' '+y.toFixed(1);
    }).join(' ');
  }
  if(chartIndicators.ema9 && closes.length>9){
    const ema=calcEMA(closes,9);
    svg+=`<path d="${buildPath(ema,9)}" fill="none" stroke="#FFD600" stroke-width="1" opacity=".7"/>`;
    svg+=`<text x="${plotW-2}" y="${priceToY(ema[ema.length-1])-2}" font-size="7.5" fill="#FFD600" text-anchor="end" font-family="monospace">EMA9</text>`;
  }
  if(chartIndicators.ema21 && closes.length>21){
    const ema=calcEMA(closes,21);
    svg+=`<path d="${buildPath(ema,21)}" fill="none" stroke="#448AFF" stroke-width="1" opacity=".7"/>`;
    svg+=`<text x="${plotW-2}" y="${priceToY(ema[ema.length-1])-2}" font-size="7.5" fill="#448AFF" text-anchor="end" font-family="monospace">EMA21</text>`;
  }
  if(chartIndicators.vwap && candles.length>1){
    const vwap=calcVWAP(candles);
    svg+=`<path d="${buildPath(vwap,1)}" fill="none" stroke="#E040FB" stroke-width="1.2" stroke-dasharray="4,2" opacity=".8"/>`;
    svg+=`<text x="${plotW-2}" y="${priceToY(vwap[vwap.length-1])-2}" font-size="7.5" fill="#E040FB" text-anchor="end" font-family="monospace">VWAP</text>`;
  }
  svgEl.innerHTML = svg;

  // ── RSI sub-panel ─────────────────────────────────────
  const rsiContainerId = svgEl.id.replace('chartSvg','rsiPanel');
  const rsiEl = document.getElementById(rsiContainerId);
  if(rsiEl && chartIndicators.rsi && closes.length>14){
    const rsiVals=calcRSI(closes);
    const rsiW=560, rsiH=50, rsiGutter=54;
    const rsiPlotW=rsiW-rsiGutter;
    const rsiCw=rsiPlotW/rsiVals.length;
    let rsvg=`<svg viewBox="0 0 ${rsiW} ${rsiH}" width="100%" style="display:block">`;
    rsvg+=`<rect width="${rsiPlotW}" height="${rsiH}" fill="transparent"/>`;
    // OB/OS lines
    rsvg+=`<line x1="0" y1="${rsiH*0.3}" x2="${rsiPlotW}" y2="${rsiH*0.3}" stroke="var(--ask)" stroke-width=".5" opacity=".4" stroke-dasharray="3,2"/>`;
    rsvg+=`<line x1="0" y1="${rsiH*0.7}" x2="${rsiPlotW}" y2="${rsiH*0.7}" stroke="var(--bid)" stroke-width=".5" opacity=".4" stroke-dasharray="3,2"/>`;
    // RSI line
    const rPath=rsiVals.map((v,i)=>{const x=i*rsiCw+rsiCw/2;const y=rsiH-(v/100)*rsiH;return(i===0?'M':'L')+x.toFixed(1)+' '+y.toFixed(1);}).join(' ');
    const lastRSI=rsiVals[rsiVals.length-1];
    const rColor=lastRSI>70?'var(--ask)':lastRSI<30?'var(--bid)':'var(--amber)';
    rsvg+=`<path d="${rPath}" fill="none" stroke="${rColor}" stroke-width="1.2"/>`;
    rsvg+=`<text x="${rsiPlotW+4}" y="${rsiH*0.5+3}" font-size="8" fill="${rColor}" font-family="monospace">${lastRSI.toFixed(0)}</text>`;
    rsvg+=`<text x="4" y="10" font-size="7.5" fill="var(--text-dim)" font-family="monospace">RSI(14)</text>`;
    rsvg+=`</svg>`;
    rsiEl.innerHTML=rsvg;
    rsiEl.style.display='block';
  } else if(rsiEl){ rsiEl.style.display='none'; }

  // ── MACD sub-panel ────────────────────────────────────
  const macdContainerId = svgEl.id.replace('chartSvg','macdPanel');
  const macdEl = document.getElementById(macdContainerId);
  if(macdEl && chartIndicators.macd && closes.length>26){
    const {macdLine,signal,hist}=calcMACD(closes);
    const mW=560, mH=50, mGutter=54, mPlotW=mW-mGutter;
    const mCw=mPlotW/macdLine.length;
    const mMax=Math.max(...hist.map(Math.abs))||1;
    let msvg=`<svg viewBox="0 0 ${mW} ${mH}" width="100%" style="display:block">`;
    msvg+=`<line x1="0" y1="${mH/2}" x2="${mPlotW}" y2="${mH/2}" stroke="var(--border)" stroke-width=".5"/>`;
    hist.forEach((v,i)=>{
      const x=i*mCw; const barH=Math.abs(v/mMax)*(mH*0.45);
      const y=v>=0?mH/2-barH:mH/2;
      msvg+=`<rect x="${x}" y="${y}" width="${Math.max(1,mCw-1)}" height="${barH}" fill="${v>=0?'var(--bid)':'var(--ask)'}" opacity=".5"/>`;
    });
    const mPath=macdLine.map((v,i)=>{const x=i*mCw+mCw/2;const y=mH/2-(v/mMax)*(mH*0.45);return(i===0?'M':'L')+x.toFixed(1)+' '+y.toFixed(1);}).join(' ');
    msvg+=`<path d="${mPath}" fill="none" stroke="#448AFF" stroke-width="1"/>`;
    const sPath=signal.map((v,i)=>{const x=i*mCw+mCw/2;const y=mH/2-(v/mMax)*(mH*0.45);return(i===0?'M':'L')+x.toFixed(1)+' '+y.toFixed(1);}).join(' ');
    msvg+=`<path d="${sPath}" fill="none" stroke="#FFD600" stroke-width="1" stroke-dasharray="3,2"/>`;
    msvg+=`<text x="4" y="10" font-size="7.5" fill="var(--text-dim)" font-family="monospace">MACD(12,26,9)</text>`;
    msvg+=`</svg>`;
    macdEl.innerHTML=msvg;
    macdEl.style.display='block';
  } else if(macdEl){ macdEl.style.display='none'; }
}

/* ===================================================================
   SYNCED CROSSHAIR CURSOR — moving the mouse over ANY open chart draws
   the same vertical/horizontal crosshair + price readout on every other
   open chart too, at the matching x-position (by candle index), so
   comparing multiple symbols side by side actually lines up.
   =================================================================== */
function setupChartCursor(canvasWrap, cursorSvg, chartId){
  canvasWrap.addEventListener('mousemove', (e)=>{
    const dims = chartDimsById[chartId];
    if(!dims) return;
    const rect = canvasWrap.getBoundingClientRect();
    const scaleX = dims.w / rect.width;
    const xPx = (e.clientX - rect.left) * scaleX;
    const candleIdx = Math.max(0, Math.min(dims.candles.length-1, Math.floor(xPx/dims.cw)));
    broadcastCursor(candleIdx);
  });
  canvasWrap.addEventListener('mouseleave', ()=> broadcastCursor(null));
}

function renderGEXPanel(chartId, sym){
  const panel = document.getElementById('gexPanel-'+chartId);
  const barsEl = document.getElementById('gexBars-'+chartId);
  const netEl  = document.getElementById('gexNetVal-'+chartId);
  if(!panel||!barsEl) return;
  if(!chartIndicators.gex){ panel.style.display='none'; return; }
  panel.style.display='block';
  const stock = allStocks.find(s=>s.sym===sym);
  if(!stock){ barsEl.innerHTML=''; return; }
  const chain = genOptionChainForStock(stock, currentExpirationKey);
  // Calcular GEX por strike: Δ² × OI × 100 × sign(dealer position)
  const strikeMap = {};
  chain.forEach(row=>{
    if(!strikeMap[row.strike]) strikeMap[row.strike]=0;
    const state = optionMarketState[contractStateKey(stock.sym,row.strike,row.optType,currentExpirationKey)];
    const oi = state ? state.openInterest||row.openInterest : row.openInterest;
    const gamma = row.gamma || 0.02;
    const dealerPos = row.optType==='call' ? -1 : 1; // dealer sold call = short gamma = neg GEX
    const buyVol = state?(state.buyVolume||0):0;
    const sellVol= state?(state.sellVolume||0):0;
    const netFlow = buyVol - sellVol;
    const gex = gamma * oi * 100 * dealerPos * (1 + netFlow*0.001);
    strikeMap[row.strike] += gex;
  });
  const strikes = Object.keys(strikeMap).map(Number).sort((a,b)=>a-b);
  const values  = strikes.map(k=>strikeMap[k]);
  const maxAbs  = Math.max(1, ...values.map(Math.abs));
  const netGEX  = values.reduce((a,b)=>a+b,0);
  if(netEl){ netEl.textContent='Net GEX: '+(netGEX>=0?'+':'')+Math.round(netGEX/1000)+'K'; netEl.style.color=netGEX>=0?'var(--bid)':'var(--ask)'; }
  const atm = strikes.reduce((a,b)=>Math.abs(b-stock.price)<Math.abs(a-stock.price)?b:a, strikes[0]);
  barsEl.innerHTML = strikes.map((strike,i)=>{
    const val = values[i];
    const h = Math.max(2, Math.abs(val/maxAbs)*70);
    const isPos = val>=0;
    const isAtm = strike===atm;
    return `<div class="gex-bar-wrap" title="${strike}: ${Math.round(val)}">
      ${isPos?`<div class="gex-bar positive${isAtm?' gex-atm':''}" style="height:${h}px"></div>`:
               `<div style="height:${70-h}px"></div><div class="gex-bar negative${isAtm?' gex-atm':''}" style="height:${h}px"></div>`}
      <div class="gex-strike-label">${strike}</div>
    </div>`;
  }).join('');
}

function broadcastCursor(candleIdx){
  chartInstances.forEach(ci=>{
    const cursorSvg = document.getElementById(`chartCursor-${ci.id}`);
    const dims = chartDimsById[ci.id];
    if(!cursorSvg || !dims) return;
    if(candleIdx == null || candleIdx >= dims.candles.length){ cursorSvg.innerHTML=''; return; }
    const candle = dims.candles[candleIdx];
    const x = candleIdx*dims.cw + dims.cw/2;
    const y = dims.priceH - ((candle.c-dims.rMin)/dims.range)*dims.priceH;
    cursorSvg.setAttribute('viewBox', `0 0 ${dims.w} ${dims.h}`);
    // OHLCV tooltip box
    const bullish = candle.c >= candle.o;
    const tipColor = bullish ? '#22D47A' : '#FF4B4B';
    const ohlcText = `O:${candle.o.toFixed(2)} H:${candle.h.toFixed(2)} L:${candle.l.toFixed(2)} C:${candle.c.toFixed(2)}`;
    const volText = candle.v ? `V:${candle.v>=1000?(candle.v/1000).toFixed(0)+'K':candle.v}` : '';
    const tipW = ohlcText.length * 5.5 + 16;
    const tipX = Math.min(x, dims.plotW - tipW - 4);
    cursorSvg.innerHTML = `
      <line x1="${x}" y1="0" x2="${x}" y2="${dims.h}" stroke="rgba(255,255,255,.25)" stroke-width="1" stroke-dasharray="3,3"/>
      <line x1="0" y1="${y}" x2="${dims.plotW}" y2="${y}" stroke="rgba(255,255,255,.25)" stroke-width="1" stroke-dasharray="3,3"/>
      <rect x="${tipX}" y="2" width="${tipW}" height="16" rx="3" fill="${tipColor}" opacity="0.9"/>
      <text x="${tipX+6}" y="13" font-size="8.5" font-weight="600" font-family="monospace" fill="#000">${ohlcText} ${volText}</text>
      <rect x="${dims.plotW}" y="${y-8}" width="${dims.gutterW-2}" height="16" rx="3" fill="${tipColor}"/>
      <text x="${dims.plotW+5}" y="${y+4}" font-size="9.5" font-weight="700" font-family="monospace" fill="#000">${candle.c.toFixed(2)}</text>
    `;
  });
}

/* ===================================================================
   CHART ZOOM — candleLimit por chartId, scroll con rueda del mouse
   =================================================================== */
const chartZoomState = {}; // chartId -> { candleLimit: null|number }
function getZoomLimit(chartId){
  return (chartZoomState[chartId] && chartZoomState[chartId].candleLimit) || null;
}
function chartZoomIn(chartId){
  const cur = getZoomLimit(chartId) || 80;
  chartZoomState[chartId] = { candleLimit: Math.max(10, Math.round(cur * 0.6)) };
  renderAllData();
}
function chartZoomOut(chartId){
  const cur = getZoomLimit(chartId) || 80;
  chartZoomState[chartId] = { candleLimit: Math.min(300, Math.round(cur * 1.5)) };
  renderAllData();
}
function chartZoomReset(chartId){
  chartZoomState[chartId] = { candleLimit: null };
  renderAllData();
}
// Mouse wheel zoom
function setupChartZoom(canvasWrap, chartId){
  canvasWrap.addEventListener('wheel', (e)=>{
    e.preventDefault();
    const cur = getZoomLimit(chartId) || 80;
    const delta = e.deltaY > 0 ? 1.18 : 0.82;
    const next = Math.round(cur * delta);
    chartZoomState[chartId] = { candleLimit: Math.max(10, Math.min(300, next)) };
    renderAllData();
  }, { passive: false });
}

   Real position tracking comes online once the options trading system
