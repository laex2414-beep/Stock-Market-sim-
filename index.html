/* ===================================================================
   PLAYER ACCOUNT — real order execution engine, ported and adapted from
   the previous SPX project where this logic was already debugged and
   tested (partial closes, long/short flips, exact-zero closes).
   =================================================================== */

// ↓↓↓ DEV: change this to set the player's starting cash for this playtest ↓↓↓
const STARTING_CASH = 1000;
// ↑↑↑ -------------------------------------------------------------- ↑↑↑

const playerAccount = {
  cashBalance: STARTING_CASH,
  dayPLRealized: 0,
  stockPositions: {},   // sym -> {qty, avgPrice}
  optionPositions: {},  // contractKey -> {qty, avgPrice, strike, optType, expiryKey, sym}
};
const OPTION_CONTRACT_MULTIPLIER = 100;

function optionContractKey(sym, strike, optType, expiryKey){ return `${sym}-${strike}${optType==='call'?'C':'P'}-${expiryKey}`; }

function getOrCreateStockPosition(sym){
  if(!playerAccount.stockPositions[sym]) playerAccount.stockPositions[sym] = { qty:0, avgPrice:0 };
  return playerAccount.stockPositions[sym];
}
function getOrCreateOptionPosition(key){
  if(!playerAccount.optionPositions[key]) playerAccount.optionPositions[key] = { qty:0, avgPrice:0 };
  return playerAccount.optionPositions[key];
}

/* Shared "open/reduce/flip/close" position math — validated against these cases in the prior
   project: partial cover of a short (avgPrice of remaining shares must NOT change), exact
   close-to-zero (must realize P&L, not skip it), and full flip long<->short. */
function applyPositionDelta(pos, signedQty, price, pnlMultiplier){
  const newQty = pos.qty + signedQty;
  const wasNonZero = pos.qty !== 0;
  const isReducingOrFlipping = wasNonZero && Math.sign(signedQty) !== Math.sign(pos.qty);
  let realizedPL = 0;
  if(isReducingOrFlipping){
    const closingQty = Math.min(Math.abs(signedQty), Math.abs(pos.qty));
    const pnlPerUnit = pos.qty > 0 ? (price - pos.avgPrice) : (pos.avgPrice - price);
    realizedPL = pnlPerUnit * closingQty * pnlMultiplier;
    // Calendar gate (requested feature): the trading day only advances once the player has at
    // least one winning closed trade — a losing or break-even close doesn't unlock the day.
    if(realizedPL > 0) gameCalendar.hadWinningTradeToday = true;
  }
  if(newQty === 0){
    pos.qty = 0; pos.avgPrice = 0;
  } else if(pos.qty === 0){
    pos.qty = newQty; pos.avgPrice = price; // opening fresh
  } else if(!isReducingOrFlipping){
    const totalCostBefore = pos.avgPrice * Math.abs(pos.qty);
    const addedCost = price * Math.abs(signedQty);
    pos.qty = newQty;
    pos.avgPrice = (totalCostBefore + addedCost) / Math.abs(newQty); // adding same direction: weighted avg
  } else if(Math.sign(newQty) === Math.sign(pos.qty)){
    pos.qty = newQty; // partial reduction: remaining units keep their original avgPrice, unchanged
  } else {
    pos.qty = newQty; pos.avgPrice = price; // flipped sides entirely
  }
  return realizedPL;
}

function executeShareOrder(sym, side, qty, price){
  const pos = getOrCreateStockPosition(sym);
  const signedQty = side==='buy' ? qty : -qty;
  const realizedPL = applyPositionDelta(pos, signedQty, price, 1);
  playerAccount.cashBalance += realizedPL;
  playerAccount.dayPLRealized += realizedPL;
  // opening/adding exposure costs cash (buy) or frees cash (short sell), beyond the P&L already applied above
  const wasOpeningOrAdding = realizedPL === 0;
  if(wasOpeningOrAdding) playerAccount.cashBalance += (side==='buy' ? -1 : 1) * qty * price;
  const stock = allStocks.find(s=>s.sym===sym);
  if(stock) stock._todayVolume += qty;
  // Notify MM if active for this symbol
  try{
    if(typeof MM_MODE !== 'undefined' && MM_MODE.active && MM_MODE.sym === sym){
      const mmFill = { sym, side, qty, price: avgFill||stock.price, isPlayerOrder:true, ts:Date.now() };
      MM_MODE.incomingQueue = MM_MODE.incomingQueue || [];
      MM_MODE.incomingQueue.push(mmFill);
      MM_MODE.pnl.spreadEarned += side==='buy'
        ? (stock.price*1.001 - (avgFill||stock.price)) * qty   // MM sold at ask, filled below
        : ((avgFill||stock.price) - stock.price*0.999) * qty;  // MM bought at bid, filled above
      MM_MODE.stats.fillCount = (MM_MODE.stats.fillCount||0) + 1;
      // Add to MM tape
      if(typeof addStockTapeEntry==='function') addStockTapeEntry(sym, side, avgFill||stock.price, qty, 'PLAYER');
    }
  }catch(e){}
  // Survival: cobrar comisión + registrar trade + verificar estado
  if(typeof SURVIVAL !== 'undefined' && SURVIVAL.enabled){
    survivalChargeCommission('stock', qty);
    survivalRegisterTrade(sym, side, qty);
    checkSurvivalStatus();
  }
  // Broadcast to Firebase leaderboard
  try{
    const _db=window._fbDb; const _ref=window._fbRef; const _set=window._fbSet; const _push=window._fbPush;
    if(_db&&_ref&&playerAccount.uid){
      if(_push) _push(_ref(_db,'market/trades'),{uid:playerAccount.uid,name:window._playerName||'Trader',sym,side,qty,price,pnl:+(playerAccount.dayPnL||0).toFixed(2),ts:Date.now()});
      if(_set) _set(_ref(_db,'leaderboard/'+playerAccount.uid),{name:window._playerName||'Trader',pnl:+(playerAccount.dayPnL||0).toFixed(2),trades:playerAccount.tradeCount||0,cash:+(playerAccount.cashBalance||0).toFixed(2),ts:Date.now()});
      // Persist positions to Firebase
      if(_set) _set(_ref(_db,'players/'+playerAccount.uid+'/positions'),{
        stocks:  window.playerAccount.stockPositions  || {},
        options: window.playerAccount.optionPositions || {}
      });
      if(_set) _set(_ref(_db,'players/'+playerAccount.uid+'/balance'), window.playerAccount.cashBalance||0);
    }
  }catch(e){}
  return pos;
}

function executeOptionOrder(sym, strike, optType, expiryKey, side, action, qty, price){
  const key = optionContractKey(sym, strike, optType, expiryKey);
  const pos = getOrCreateOptionPosition(key);
  let signedQty;
  if(action === 'open'){
    signedQty = side==='buy' ? qty : -qty;
  } else { // 'close': always reduces toward zero, capped at current size, regardless of side label
    if(pos.qty === 0) return null;
    const closingDirection = pos.qty > 0 ? -1 : 1;
    signedQty = closingDirection * Math.min(qty, Math.abs(pos.qty));
  }
  // ── CASH FLOW LOGIC ──────────────────────────────────────────────
  // Opening a LONG (buy): pay premium upfront
  // Opening a SHORT (sell): receive premium BUT must post margin (20% of notional)
  // Closing a position: receive/pay based on realized P&L
  const premium = qty * price * OPTION_CONTRACT_MULTIPLIER;
  const notional = qty * strike * OPTION_CONTRACT_MULTIPLIER;
  const MARGIN_REQ = 0.20; // 20% margin requirement for short options

  if(action === 'open'){
    if(side === 'buy'){
      // Pay premium — check cash first
      if(premium > playerAccount.cashBalance){
        flashInsufficientCashAlert(premium);
        return null;
      }
      playerAccount.cashBalance -= premium;
      playerAccount.dayPLRealized -= premium;
    } else {
      // SHORT option — must have margin collateral
      const marginRequired = notional * MARGIN_REQ;
      const totalRequired = marginRequired; // premium received offsets some, but still need margin
      if(totalRequired > playerAccount.cashBalance){
        flashToast(`⚠ Colateral insuficiente. Short de opciones requiere $${fmtMoney(marginRequired)} (20% del notional $${fmtMoney(notional)})`, true);
        return null;
      }
      // Block margin from cash, receive premium
      playerAccount.cashBalance -= marginRequired; // lock collateral
      playerAccount.cashBalance += premium;         // receive premium
      playerAccount.dayPLRealized += premium;
      // Store margin so we can release it on close
      pos._marginBlocked = (pos._marginBlocked||0) + marginRequired;
    }
  }

  const realizedPL = applyPositionDelta(pos, signedQty, price, OPTION_CONTRACT_MULTIPLIER);
  if(action === 'close'){
    // Release margin if closing a short
    if(pos._marginBlocked && pos._marginBlocked > 0){
      const releaseRatio = Math.min(1, qty / Math.max(1, Math.abs(pos.qty) + qty));
      const marginToRelease = pos._marginBlocked * releaseRatio;
      playerAccount.cashBalance += marginToRelease;
      pos._marginBlocked = Math.max(0, pos._marginBlocked - marginToRelease);
    }
    playerAccount.cashBalance += realizedPL;
    playerAccount.dayPLRealized += realizedPL;
  }
  pos.strike = strike; pos.optType = optType; pos.expiryKey = expiryKey; pos.sym = sym;
  // Survival: cobrar comisión de opciones
  if(typeof SURVIVAL !== 'undefined' && SURVIVAL.enabled){
    survivalChargeCommission('option', null, qty);
    survivalRegisterTrade(sym+'_opt', side, qty);
    checkSurvivalStatus();
  }
  if(action === 'open' && pos.openedOnDay == null) pos.openedOnDay = gameCalendar.totalDaysElapsed;

  // Bugfix: player executions must feed the SAME live volume the Option Chain/Option Stats read,
  // not just update the player's own account. A buy hits the ask (aggressive buy-side volume), a
  // sell hits the bid (aggressive sell-side volume) — same accounting the synthetic flow uses.
  const stock = allStocks.find(s=>s.sym===sym);
  if(stock){
    const marketRow = getOrInitContractState(stock, strike, optType, expiryKey);
    marketRow.volume += qty;
    if(marketRow.buyVolume==null) marketRow.buyVolume = 0;
    if(marketRow.sellVolume==null) marketRow.sellVolume = 0;
    if(side==='buy') marketRow.buyVolume += qty; else marketRow.sellVolume += qty;
    marketRow.lastPrice = price;
    marketRow._lastAskHitAt = side==='buy' ? Date.now() : marketRow._lastAskHitAt; // feeds the Step A heat indicator too

    // Connects the player's own orders to the SAME per-contract MM hedging mechanism the
    // synthetic flow already uses (confirmed design: reuse the existing single mechanism, don't
    // build a second parallel one — that's what caused the earlier aggregate-delta bug). A large
    // player order can now genuinely push the underlying's price, same as organic flow would.
    recordMmInventoryChange(marketRow, side==='buy'?'ask':'bid', qty);

    // Bugfix: Open Interest must reflect what the player's order ACTUALLY did, not the system's
    // random 65/35 open/close guess. action==='open' always increases OI by the real opened size;
    // action==='close' always decreases it by the REAL closed size (Math.abs(signedQty), which is
    // already capped at however much position actually existed — never more than that), and OI
    // can never go negative regardless of how it got there.
    if(action === 'open'){
      marketRow.openInterest += qty;
    } else {
      marketRow.openInterest = Math.max(0, marketRow.openInterest - Math.abs(signedQty));
    }

    // Bugfix: player executions must also print their own row in this contract's Time & Sales,
    // exactly like the synthetic flow does — otherwise a 10K-contract player trade silently boosts
    // volume/OI but never shows up as a visible tape line.
    marketRow.tape.push({
      time: Date.now(), price, qty, side: side==='buy'?'buy':'sell',
      trader: 'PLAYER', printClass: selectedRouting!=='normal' ? routingPrintClass(selectedRouting) : (qty>=BIG_PRINT_THRESHOLD?'BLOCK':'NORMAL'),
    });
    if(marketRow.tape.length > 40) marketRow.tape.shift();
  }
  return pos;
}

function computeStockUnrealizedPL(){
  let upl = 0;
  Object.entries(playerAccount.stockPositions).forEach(([sym,pos])=>{
    if(pos.qty===0) return;
    const stock = allStocks.find(s=>s.sym===sym);
    if(!stock) return;
    upl += pos.qty>0 ? (stock.price-pos.avgPrice)*pos.qty : (pos.avgPrice-stock.price)*Math.abs(pos.qty);
  });
  return upl;
}
function computeOptionUnrealizedPL(){
  let upl = 0;
  Object.values(playerAccount.optionPositions).forEach(pos=>{
    if(!pos.qty) return;
    const stock = allStocks.find(s=>s.sym===pos.sym);
    if(!stock) return;
    const chain = genOptionChainForStock(stock, pos.expiryKey);
    const row = chain.find(r=>r.strike===pos.strike && r.optType===pos.optType);
    if(!row) return;
    const markPrice = pos.qty>0 ? row.bid : row.ask; // mark long at bid, short at ask (conservative)
    upl += (pos.qty>0 ? (markPrice-pos.avgPrice) : (pos.avgPrice-markPrice)) * Math.abs(pos.qty) * OPTION_CONTRACT_MULTIPLIER;
  });
  return upl;
}
function computeAccountPL(){
  return computeStockUnrealizedPL() + computeOptionUnrealizedPL();
}

function serializeGameState(){
  return {
    version: 1,
    savedAt: Date.now(),

      cashBalance: playerAccount.cashBalance,
      dayPLRealized: playerAccount.dayPLRealized,

    calendar: (typeof gameCalendar !== 'undefined') ? gameCalendar : null,

}
function persistGameState(){
  if(persistenceSuspended) return;
  try{

  }catch(e){
    console.warn('No se pudo guardar el estado del juego:', e);
  }
}
function schedulePersist(){
  if(saveDebounceTimer) clearTimeout(saveDebounceTimer);
  saveDebounceTimer = setTimeout(()=>{
    persistGameState(); // localStorage backup
    // sync to Firebase — but ONLY sync the balance if admin
    // regular players: Firebase balance is the source of truth, not localStorage
    // this prevents players from inflating their own balance via console tricks
    if(window._currentUser && typeof playerAccount !== 'undefined'){
      try{

          updateData.balance = playerAccount.cashBalance; // admin can change balance freely

        window._fbUpdate(window._fbRef(window._fbDb, `players/${window._currentUser.uid}`), updateData);

    }
  }, SAVE_DEBOUNCE_MS);
}
function loadGameState(){
  let raw;
  try{ raw = localStorage.getItem(STORAGE_KEY); }catch(e){ return null; }
  if(!raw) return null;
  try{ return JSON.parse(raw); }catch(e){ console.warn('Save corrupto, ignorando:', e); return null; }
}
function sanitizePositions(positions, maxQty=10000000){
  // Remove corrupt positions (insane qty, negative avgPrice, etc.)
  const clean = {};
  Object.entries(positions||{}).forEach(([sym,pos])=>{
    if(!pos) return;
    const qty = pos.qty||0;
    const avg = pos.avgPrice||0;
    if(Math.abs(qty) > maxQty){ console.warn('Corrupt position removed:',sym,qty); return; }
    if(avg < 0 || avg > 1000000){ console.warn('Corrupt avgPrice removed:',sym,avg); return; }
    if(qty !== 0) clean[sym] = pos;
  });
  return clean;
}

function applyLoadedState(saved){
  if(!saved) return false;
  if(saved.playerAccount){
    const bal = saved.playerAccount.cashBalance ?? playerAccount.cashBalance;
    // Sanity check balance — if it's absurd, wipe it
    if(bal > 0 && bal < 1e12){
      playerAccount.cashBalance = bal;
    } else {
      console.warn('Corrupt balance in localStorage, resetting:', bal);
      playerAccount.cashBalance = STARTING_CASH;
      try{ localStorage.removeItem(STORAGE_KEY); }catch(e){}
      return false; // don't load corrupt state
    }
    playerAccount.dayPLRealized = saved.playerAccount.dayPLRealized ?? 0;
    // Sanitize positions — remove any with absurd quantities
    playerAccount.stockPositions  = sanitizePositions(saved.playerAccount.stockPositions,  500000);
    playerAccount.optionPositions = sanitizePositions(saved.playerAccount.optionPositions, 100000);
  }
  if(saved.ui){
    if(saved.ui.currentSection) currentSection = saved.ui.currentSection;
    if(saved.ui.currentMode) currentMode = saved.ui.currentMode;
    if(saved.ui.currentSym) currentSym = saved.ui.currentSym;
    if(saved.ui.panelVisibility) panelVisibility = saved.ui.panelVisibility;
    if(saved.ui.panelOrder) panelOrder = saved.ui.panelOrder;
  }
  if(saved.language && TRANSLATIONS[saved.language]) currentLanguage = saved.language;
  if(saved.calendar){
    gameCalendar.weekNumber = saved.calendar.weekNumber ?? 1;
    gameCalendar.dayIndex = saved.calendar.dayIndex ?? 0;
    gameCalendar.totalDaysElapsed = saved.calendar.totalDaysElapsed ?? 0;
    gameCalendar.dayStartedAtMs = Date.now(); // always restart the in-progress day's clock fresh on load
  }
  return true;
}
/* Hard Reset (the dev sandbox button arriving in Step 12 wires up to this) — the ONLY thing
   allowed to wipe localStorage, per the spec. */
function hardResetGameState(){
  persistenceSuspended = true;
  try{ localStorage.removeItem(STORAGE_KEY); }catch(e){}
  playerAccount.cashBalance = STARTING_CASH;
  playerAccount.dayPLRealized = 0;
  playerAccount.stockPositions = {};

  gameCalendar.weekNumber = 1; gameCalendar.dayIndex = 0; gameCalendar.totalDaysElapsed = 0;
  gameCalendar.dayStartedAtMs = Date.now();
  gameCalendar.hadWinningTradeToday = false;
  persistenceSuspended = false;
}

/* Free drag & drop: pick up any panel by its header handle, drop it into any column at any
   position — the rest of that column's panels shift to make room. Order is persisted in
   panelOrder so it survives show/hide cycles and re-renders within this session. */
let draggedPanelId = null;
function setupPanelDragAndDrop(layoutGrid){
  layoutGrid.querySelectorAll('.panel[draggable="true"]').forEach(panel=>{
    panel.addEventListener('dragstart', (e)=>{
      draggedPanelId = panel.dataset.panelId;
      panel.classList.add('dragging');
      e.dataTransfer.effectAllowed = 'move';
    });
    panel.addEventListener('dragend', ()=>{
      panel.classList.remove('dragging');
      layoutGrid.querySelectorAll('.col').forEach(c=>c.classList.remove('drag-over'));
    });
  });
  layoutGrid.querySelectorAll('.col').forEach(col=>{
    col.addEventListener('dragover', (e)=>{
      e.preventDefault();
      col.classList.add('drag-over');
      const afterEl = getDragAfterElement(col, e.clientY);
      const dragging = layoutGrid.querySelector('.panel.dragging');
      if(!dragging) return;
      if(afterEl == null) col.appendChild(dragging);
      else col.insertBefore(dragging, afterEl);
    });
    col.addEventListener('dragleave', ()=> col.classList.remove('drag-over'));
    col.addEventListener('drop', (e)=>{
      e.preventDefault();
      col.classList.remove('drag-over');
      persistOrderFromDOM(layoutGrid);
    });
  });
}

/* Resize de paneles — drag desde el handle inferior derecho */
function setupPanelResize(panel){
  const handle = panel.querySelector('.panel-resize-handle');
  if(!handle) return;
  let startX, startY, startW, startH;
  handle.addEventListener('mousedown', e=>{
    e.preventDefault(); e.stopPropagation();
    startX=e.clientX; startY=e.clientY;
    startW=panel.offsetWidth; startH=panel.offsetHeight;
    const onMove = ev=>{
      const dw = ev.clientX - startX;
      const dh = ev.clientY - startY;
      panel.style.width  = Math.max(200, startW+dw)+'px';
      panel.style.height = Math.max(100, startH+dh)+'px';
      panel.querySelector('.panel-body').style.height = Math.max(60, startH+dh-40)+'px';
    };
    const onUp = ()=>{ document.removeEventListener('mousemove',onMove); document.removeEventListener('mouseup',onUp); };
    document.addEventListener('mousemove',onMove);
    document.addEventListener('mouseup',onUp);
  });
}
function getDragAfterElement(col, y){
  const panels = [...col.querySelectorAll('.panel:not(.dragging)')];
  return panels.reduce((closest, child)=>{
    const box = child.getBoundingClientRect();
    const offset = y - box.top - box.height/2;
    if(offset < 0 && offset > closest.offset) return { offset, element: child };
    return closest;
  }, { offset: -Infinity }).element;
}
function persistOrderFromDOM(layoutGrid){
  const order = currentOrder();
  layoutGrid.querySelectorAll('.col').forEach((col, idx)=>{
    order[idx] = [...col.querySelectorAll('.panel')].map(p=>p.dataset.panelId);
  });
  schedulePersist();
}

function renderL2(book){
  const l2Rows = document.getElementById('l2Rows');
  if(!l2Rows) return;

  // BID izquierda (mejor bid primero = precio más alto), ASK derecha (mejor ask primero = precio más bajo)
  const bidRows = book.rows.filter(r=>r.side==='bid'); // ya viene ordenado mejor-bid-first
  const askRows = book.rows.filter(r=>r.side==='ask').slice().reverse(); // mejor ask primero
  const spotRow = book.rows.find(r=>r.side==='spot');
  const maxSize = Math.max(...book.rows.filter(r=>r.size).map(r=>r.size), 1);
  const totalBid = bidRows.reduce((a,r)=>a+r.size,0);
  const totalAsk = askRows.reduce((a,r)=>a+r.size,0);
  const totalAll = totalBid+totalAsk||1;
  const bidPct = Math.round(totalBid/totalAll*100);
  const askPct = 100-bidPct;
  const wallAsk = askRows.reduce((a,r)=>r.size>a.size?r:a, askRows[0]||{size:0,price:0});
  const wallBid = bidRows.reduce((a,r)=>r.size>a.size?r:a, bidRows[0]||{size:0,price:0});
  const EXCHS = ['ARCA','NSDQ','PHLX','BATS','MSLS','EDGX','CBOE','NYSE'];
  if(!l2Rows._ec) l2Rows._ec = {};
  function rX(k){ if(!l2Rows._ec[k]) l2Rows._ec[k]=EXCHS[Math.floor(Math.random()*EXCHS.length)]; return l2Rows._ec[k]; }
  const activeStock = allStocks.find(s=>s.sym===currentSym);
  const chgPct = activeStock ? ((activeStock.price/activeStock._openPrice-1)*100).toFixed(2) : '0.00';
  const chgPos = parseFloat(chgPct) >= 0;
  const spot = spotRow ? spotRow.price : (activeStock ? activeStock.price : 0);
  const maxLevels = Math.max(bidRows.length, askRows.length);

  /* Colores por POSICIÓN (distancia al precio), no por tamaño:
     nivel 0-2 (los 3 más cercanos al precio) → rojo  #FF4B4B  (hot zone)
     nivel 3-5 (siguientes 3)                 → amarillo #EF9F27 (warm zone)
     nivel 6-8 (siguientes 3)                 → celeste  #38BDF8 (cool zone)
     nivel 9+  (el resto)                     → sin color, texto normal */
  function levelColor(idx){
    if(idx < 3) return '#FF4B4B';
    if(idx < 6) return '#EF9F27';
    if(idx < 9) return '#38BDF8';
    return null; // sin color
  }
  function levelBg(idx, side){
    if(idx < 3) return side==='bid' ? 'rgba(255,75,75,.09)' : 'rgba(255,75,75,.09)';
    if(idx < 6) return 'rgba(239,159,39,.07)';
    if(idx < 9) return 'rgba(56,189,248,.06)';
    return 'transparent';

  let html = `

      <span style="color:var(--text-dim);font-size:8px">presión</span>
      <span style="color:#FF4B4B">ASK ${fmtSize(totalAsk)} (${askPct}%)</span>
    </div>
    <div class="l2v2-walls">
      <span style="color:#EF9F27">★ PARED BID&nbsp;${wallBid.price?wallBid.price.toFixed(2):'—'}</span>
      <span style="color:#EF9F27">PARED ASK&nbsp;${wallAsk.price?wallAsk.price.toFixed(2):'—'} ★</span>
    </div>
    <div class="l2v2-col-hdr">
      <span style="color:#22D47A">EXCH</span>
      <span style="color:#22D47A">SIZE</span>
      <span class="l2v2-bid-px-hdr">BID</span>
      <span class="l2v2-price-hdr">PRECIO</span>
      <span class="l2v2-ask-px-hdr">ASK</span>
      <span style="color:#FF4B4B">SIZE</span>
      <span style="color:#FF4B4B">EXCH</span>
    </div>`;

  for(let i=0;i<maxLevels;i++){
    const b = bidRows[i];  // BID → izquierda
    const a = askRows[i];  // ASK → derecha
    const col = levelColor(i);
    const bg  = (b||a) ? levelBg(i, 'bid') : 'transparent';
    const bW  = b && b.size===maxSize;
    const aW  = a && a.size===maxSize;
    const colStyle = col ? `color:${col}` : 'color:var(--text-dim)';
    const wallStyle = `color:#EF9F27;font-weight:700`;

    html += `<div class="l2v2-row" style="background:${bg}">
      <span class="l2v2-exch" style="${bW?wallStyle:colStyle}">${b?rX('b'+i):''}</span>
      <span class="l2v2-sz"   style="${bW?wallStyle:colStyle};font-weight:${b&&b.size/maxSize>=0.6?'700':'400'}">${b?fmtSize(b.size):''}</span>

}

/* ===================================================================
   STOCK TAPE — persistent Time & Sales for stocks, connected to real
   order executions (player and MM synthetic flow). Each entry records
   the actual fill price, size, side, and whether it swept a level.
   =================================================================== */
const stockTape = {}; // sym -> [{time, price, size, side, printClass}]
const STOCK_TAPE_MAX = 60;
const STOCK_TAPE_TTL_MS = 18000; // prints expire after 18 real seconds — player prints scroll off naturally, tape never freezes

function recordStockTapeEntry(sym, price, size, side, printClass, isPlayer){
  if(!stockTape[sym]) stockTape[sym] = [];
  stockTape[sym].unshift({ time: Date.now(), price, size, side, printClass, isPlayer: !!isPlayer });
  if(stockTape[sym].length > STOCK_TAPE_MAX) stockTape[sym].length = STOCK_TAPE_MAX;
}
function pruneExpiredTapeEntries(sym){
  if(!stockTape[sym]) return;
  const cutoff = Date.now() - STOCK_TAPE_TTL_MS;
  stockTape[sym] = stockTape[sym].filter(p => p.time > cutoff || p.isPlayer && Date.now()-p.time < STOCK_TAPE_TTL_MS*1.5);
  // player prints stay slightly longer (1.5×) so you can see your own fills, but still scroll off
}

/* Market order execution against the real persistent book — walks levels (Price Walking)
   and prints a real entry in the stock tape. Returns the average fill price. */
function executeMarketOrderAgainstBook(stock, side, qty){
  initOrderBook(stock);
  const ob = orderBooks[stock.sym];
  const levels = side === 'buy' ? ob.asks : ob.bids; // buy hits asks, sell hits bids
  let remaining = qty;
  let totalCost = 0;
  let fills = 0;
  let lastFillPrice = stock.price;
  let sweptLevels = 0;

  while(remaining > 0 && levels.length > 0){
    const level = levels[0];
    const fillQty = Math.min(remaining, level.size);
    totalCost += fillQty * level.price;
    fills += fillQty;
    lastFillPrice = level.price;
    level.size -= fillQty;
    remaining -= fillQty;
    if(level.size <= 0){
      levels.shift(); // consumed this level completely
      sweptLevels++;
    }
  }

  const avgFill = fills > 0 ? totalCost / fills : stock.price;
  const printClass = sweptLevels > 1 ? 'SWEEP' : sweptLevels === 1 ? 'BLOCK' : 'FILL';
  recordStockTapeEntry(stock.sym, avgFill, qty - remaining, side, printClass, true); // isPlayer=true so the tape highlights it

  // HALT automático si la acción sube/baja 100-500% en un solo movimiento
  const dayChangePct = ((lastFillPrice - stock._openPrice) / stock._openPrice) * 100;
  const absPct = Math.abs(dayChangePct);
  const haltThreshold = stock.volatility==='extreme'?200:stock.volatility==='high'?150:100;
  if(absPct >= haltThreshold && !haltedStocks[stock.sym]){
    const haltMins = 5 + Math.floor(Math.random()*10);
    haltedStocks[stock.sym] = { until: Date.now()+haltMins*60000, sym:stock.sym };
    startHaltCountdown(stock.sym);
    showSurvivalAlert('⛔ HALT AUTOMÁTICO — '+stock.sym+' movió '+absPct.toFixed(0)+'% — '+haltMins+' min', 'danger');
    flashToast('⛔ TRADING HALT: '+stock.sym+' — '+haltMins+' min', true);
    setTimeout(()=>{ delete haltedStocks[stock.sym]; showSurvivalAlert('✅ '+stock.sym+' RESUMED', 'ok'); }, haltMins*60000);
    return avgFill;
  }

  // HYBRID price update (confirmed design): fill price drives 85%, flowForce minor 15%
  if(fills > 0){
    const flowContrib = stock._smoothedForce * stock.price * 0.002;
    stock.price = Math.max(0.5, +(lastFillPrice * 0.85 + (lastFillPrice + flowContrib) * 0.15).toFixed(2));
    if(stock.price > stock._dayHigh) stock._dayHigh = stock.price;
    if(stock.price < stock._dayLow) stock._dayLow = stock.price;
  }
  return avgFill;
}

/* Circuit breaker UI + MM rebalance — shows visible banner, freezes Active Trader,
   and triggers the MM to aggressively replenish the book and inject synthetic flow
   to stabilize the market while the breaker is active. */
let _cbBannerTimeout = null;
let _cbActiveUntil = 0;
function showCircuitBreakerBanner(sym, pct, limit){
  let banner = document.getElementById('cbBanner');
  if(!banner){
    banner = document.createElement('div');
    banner.id = 'cbBanner';
    banner.style.cssText = 'position:fixed;top:44px;left:50%;transform:translateX(-50%);z-index:9999;background:#EF9F27;color:#0A0C10;font-family:var(--mono);font-size:12px;font-weight:700;padding:8px 20px;border-radius:6px;letter-spacing:.5px;pointer-events:none;box-shadow:0 4px 20px rgba(0,0,0,.5)';
    document.body.appendChild(banner);
  }
  banner.textContent = `⚡ CIRCUIT BREAKER — ${sym} ±${limit}% (actual ${pct.toFixed(1)}%) — MM rebalanceando mercado…`;
  banner.style.display = 'block';
  const atSection = document.getElementById('body-activeTrader');
  if(atSection) atSection.style.pointerEvents = 'none';
  _cbActiveUntil = Date.now() + 8000;
  // MM rebalance: aggressively replenish the book and add synthetic stabilizing flow
  mmCircuitBreakerRebalance(sym, pct, limit);
  if(_cbBannerTimeout) clearTimeout(_cbBannerTimeout);
  _cbBannerTimeout = setTimeout(()=>{
    banner.style.display = 'none';
    if(atSection) atSection.style.pointerEvents = '';
    _cbActiveUntil = 0;
  }, 8000);
}

function mmCircuitBreakerRebalance(sym, pct, limit){
  const stock = allStocks.find(s=>s.sym===sym);
  if(!stock) return;
  // Force-replenish the book immediately (bypass the delay timer)
  if(orderBooks[sym]){
    orderBooks[sym].lastMmReplenishAt = 0; // reset delay so it replenishes NOW
  }
  initOrderBook(stock); // rebuild if empty
  maybeReplenishBook(stock);
  // Inject a burst of stabilizing synthetic prints in the tape — counter-direction to the move
  // (if price went up hard, MM sells to absorb; if down hard, MM buys to absorb)
  const isUpMove = pct > 0;
  const stabilizeSide = isUpMove ? 'sell' : 'buy'; // MM counters the direction
  const burstCount = 5;
  for(let i=0;i<burstCount;i++){
    setTimeout(()=>{
      const sz = Math.floor(800 + Math.random()*1200);
      recordStockTapeEntry(sym, stock.price, sz, stabilizeSide, 'BLOCK', false);
      // also physically move price slightly back toward open (mean-reversion pressure)
      const revertForce = (stock._openPrice - stock.price) * 0.015;
      stock.price = Math.max(0.5, +(stock.price + revertForce).toFixed(2));
    }, i * 1200); // staggered 1.2s apart so you see the MM prints roll in one by one
  }
}

function fillStockOrder(side, price, forceQty){
  if(currentMode !== 'stock'){ flashToast('Selecciona una acción (no un índice) para tradear.', true); return; }
  const stock = allStocks.find(s=>s.sym===currentSym);
  if(!stock){ flashToast('Acción no encontrada.', true); return; }
  const qtyInput = document.getElementById('atQty');
  const qty = forceQty || (qtyInput ? parseInt(qtyInput.value)||1 : 1);
  if(side==='buy'){
    const ob = orderBooks[stock.sym]; initOrderBook(stock);
    const bestAsk = ob && ob.asks[0] ? ob.asks[0].price : price;
    const cost = qty * bestAsk;
    if(cost > playerAccount.cashBalance){ flashInsufficientCashAlert(cost); return; }
    // Anti-cheat
    if(!antiCheatCheckTrade(currentSym, 'buy', qty, bestAsk)) return;
  }
  if(side==='sell'){
    // Prevent short selling — player can only sell what they own
    const pos = getOrCreateStockPosition(currentSym);
    const ownedQty = Math.max(0, pos ? pos.qty : 0); // no negatives
    const maxSell = Math.min(qty, ownedQty);
    if(maxSell <= 0){
      flashToast(`⚠ No tienes ${currentSym} para vender.`, true);
      return;
    }
    // If trying to sell more than owned, cap it
    if(maxSell < qty){
      flashToast(`⚠ Solo tienes ${ownedQty} acciones — vendiendo ${ownedQty}`, false);
    }
    // Use maxSell instead of qty
    const avgFillSell = executeMarketOrderAgainstBook(stock, side, maxSell);
    try{ playSound('sell'); }catch(e){}
    flashToast(`${t('toast.sellFill','Sell')} ${maxSell.toLocaleString()}x ${currentSym} @ ${avgFillSell.toFixed(2)}`);
    try{ survivalChargeCommission('stock', maxSell); survivalRegisterTrade(currentSym,'sell',maxSell); checkSurvivalStatus(); }catch(e){}
    try{ const _db=window._fbDb; const _ref=window._fbRef; const _set=window._fbSet; const _push=window._fbPush;
      if(_db&&_ref&&playerAccount.uid){
        if(_push) _push(_ref(_db,'market/trades'),{uid:playerAccount.uid,name:window._playerName||'Trader',sym:currentSym,side:'sell',qty:maxSell,price:avgFillSell,pnl:+(playerAccount.dayPnL||0).toFixed(2),ts:Date.now()});
        if(_set) _set(_ref(_db,'leaderboard/'+playerAccount.uid),{name:window._playerName||'Trader',pnl:+(playerAccount.dayPnL||0).toFixed(2),trades:playerAccount.tradeCount||0,cash:+(playerAccount.cashBalance||0).toFixed(2),ts:Date.now()});
      }
    }catch(e){}
    renderAllData(); schedulePersist(); return;
  }
  // execute against real book (price walking + tape entry)
  const avgFill = executeMarketOrderAgainstBook(stock, side, qty);
  executeShareOrder(currentSym, side, qty, avgFill);
  try{ playSound(side==='buy'?'buy':'sell'); }catch(e){}
  flashToast(`${side==='buy'?'Compra':'Venta'} ${qty.toLocaleString()}x ${currentSym} @ ${avgFill.toFixed(2)}${qty>500?' [BLOCK]':''}`);
  renderAllData();
  schedulePersist();
}

/* ===================================================================
   ANTI-CHEAT SYSTEM
   Detecta y neutraliza ventajas injustas automáticamente:
   1. Balance manipulation — verificar que balance = cash + posiciones
   2. Position size limits — máximo 30% del portafolio en una posición
   3. Rate limiting — máx 10 trades por minuto
   4. Price manipulation — si alguien mueve el precio >5% en 30s, halt
   5. Wash trading — detecta compra/venta del mismo símbolo en <5s
   =================================================================== */
const ANTI_CHEAT = {
  TRADE_RATE_WINDOW_MS: 60000,
  MAX_TRADES_PER_MIN: 20,
  MAX_POSITION_PCT: 0.80,    // 80% del portafolio en una sola posición
  WASH_TRADE_WINDOW_MS: 5000, // 5 segundos
  tradeTimes: [],            // timestamps de trades recientes
  lastTradeSyms: {},         // sym -> timestamp último trade
};

function antiCheatCheckTrade(sym, side, qty, price){
  const now = Date.now();

  // 1. Rate limit
  ANTI_CHEAT.tradeTimes = ANTI_CHEAT.tradeTimes.filter(t=> now-t < ANTI_CHEAT.TRADE_RATE_WINDOW_MS);
  if(ANTI_CHEAT.tradeTimes.length >= ANTI_CHEAT.MAX_TRADES_PER_MIN){
    flashToast('⚠ Rate limit — demasiados trades por minuto', true);
    return false;
  }

  // 2. Wash trade detection
  const lastTrade = ANTI_CHEAT.lastTradeSyms[sym];
  if(lastTrade && (now - lastTrade.ts) < ANTI_CHEAT.WASH_TRADE_WINDOW_MS && lastTrade.side !== side){
    flashToast('⚠ Wash trade detectado — espera 5s antes de revertir '+sym, true);
    return false;
  }

  // 3. Position size limit
  const totalEquity = playerAccount.cashBalance + computeAccountPL();
  const positionValue = qty * price;
  if(totalEquity > 0 && positionValue / totalEquity > ANTI_CHEAT.MAX_POSITION_PCT){
    flashToast(`⚠ Límite de posición — máx ${(ANTI_CHEAT.MAX_POSITION_PCT*100).toFixed(0)}% del portafolio en un trade`, true);
    return false;
  }

  // Record this trade
  ANTI_CHEAT.tradeTimes.push(now);
  ANTI_CHEAT.lastTradeSyms[sym] = { ts: now, side };
  return true;
}

/* ===================================================================
   LIMIT ORDER ENGINE
   playerLimitOrders = [ { id, sym, side, price, qty, created, status } ]
   status: 'open' | 'filled' | 'cancelled'
   Checked every tick against best bid/ask.
   =================================================================== */
let playerLimitOrders = [];
let _limitOrderId = 1;

function placeLimitOrder(side, limitPrice, qty){
  if(currentMode !== 'stock'){ flashToast('Solo acciones soportan limit orders.', true); return; }
  const stock = allStocks.find(s=>s.sym===currentSym);
  if(!stock){ return; }
  const ob = orderBooks[stock.sym]; initOrderBook(stock);
  const bestAsk = ob && ob.asks[0] ? ob.asks[0].price : stock.price;
  const bestBid = ob && ob.bids[0] ? ob.bids[0].price : stock.price;
  // basic sanity: buy limit must be below ask, sell limit must be above bid
  if(side==='buy' && limitPrice >= bestAsk){
    // fills immediately as market order
    fillStockOrder('buy', bestAsk, qty);
    flashToast(`Limit BUY convertido a market @ ${bestAsk.toFixed(2)}`);
    return;
  }
  if(side==='sell' && limitPrice <= bestBid){
    fillStockOrder('sell', bestBid, qty);
    flashToast(`Limit SELL convertido a market @ ${bestBid.toFixed(2)}`);
    return;
  }
  const order = { id: _limitOrderId++, sym: currentSym, side, price: limitPrice, qty, created: Date.now(), status:'open', playerId: playerAccount.uid||'local', playerName: window._playerName||'Trader' };
  playerLimitOrders.push(order);
  flashToast(`Limit ${side.toUpperCase()} ${qty.toLocaleString()}x ${currentSym} @ ${limitPrice.toFixed(2)} colocada`);
  // Publish to Firebase so other players see it in their L2
  try{
    const _db=window._fbDb; const _ref=window._fbRef; const _set=window._fbSet;
    if(_db&&_ref&&_set&&playerAccount.uid){
      _set(_ref(_db,'market/limitOrders/'+playerAccount.uid+'_'+order.id), {
        sym:currentSym, side, price:limitPrice, qty, playerName:window._playerName||'Trader',
        uid:playerAccount.uid, id:order.id, ts:Date.now()
      });
    }
  }catch(e){}
  renderOpenLimitOrders();
}

function cancelLimitOrder(id){
  const o = playerLimitOrders.find(x=>x.id===id);
  if(o){
    o.status='cancelled';
    // Remove from Firebase
    try{
      const _db=window._fbDb; const _ref=window._fbRef;
      if(_db&&_ref&&playerAccount.uid){
        const {remove}=window._fbRemove?{remove:window._fbRemove}:{};
        if(remove) remove(_ref(_db,'market/limitOrders/'+playerAccount.uid+'_'+id));
        else { const {remove:rem}={}; } // no-op if not available
      }
    }catch(e){}
  }
  playerLimitOrders = playerLimitOrders.filter(x=>x.status==='open');
  renderOpenLimitOrders();
}

function checkLimitOrderFills(){
  const open = playerLimitOrders.filter(o=>o.status==='open');
  if(!open.length) return;
  open.forEach(o=>{
    const stock = allStocks.find(s=>s.sym===o.sym);
    if(!stock) return;
    const ob = orderBooks[stock.sym];
    if(!ob) return;
    const bestAsk = ob.asks[0] ? ob.asks[0].price : stock.price;
    const bestBid = ob.bids[0] ? ob.bids[0].price : stock.price;
    let filled = false;
    if(o.side==='buy'  && bestAsk <= o.price) filled=true;
    if(o.side==='sell' && bestBid >= o.price) filled=true;
    if(filled){
      o.status='filled';
      const fillPx = o.side==='buy' ? bestAsk : bestBid;
      executeShareOrder(o.sym, o.side, o.qty, fillPx);
      addStockTapeEntry(o.sym, o.side, fillPx, o.qty, 'LIMIT');
      try{playSound('fill');}catch(e){}
      flashToast(`✅ Limit ${o.side.toUpperCase()} ${o.qty}x ${o.sym} @ ${fillPx.toFixed(2)} ejecutada!`);
    }
  });
  playerLimitOrders = playerLimitOrders.filter(o=>o.status==='open');
  if(open.some(o=>o.status==='filled')) renderOpenLimitOrders();
}

function renderOpenLimitOrders(){
  const el = document.getElementById('openLimitsContainer');
  if(!el) return;
  const open = playerLimitOrders.filter(o=>o.status==='open');
  if(!open.length){
    el.innerHTML='<div style="font-size:9px;color:var(--text-dim);padding:4px 0">Sin órdenes límite activas</div>';
    return;
  }
  el.innerHTML = open.map(o=>`

      <span class="ol-side ${o.side}">${o.side.toUpperCase()}</span>
      <span>${o.sym}</span>
      <span style="color:var(--amber)">${o.price.toFixed(2)}</span>
      <span style="color:var(--text-dim)">×${o.qty}</span>
      <button class="ol-cancel" onclick="cancelLimitOrder(${o.id})" title="Cancelar">✕</button>
    </div>`).join('');
}

/* ===================================================================
   STOP ORDER ENGINE
   Types: 'stop' (stop market) | 'trail' (trailing stop, pct-based)
   =================================================================== */
let playerStopOrders = [];
let _stopOrderId = 1;

function placeStopOrder(side, stopPrice, qty, trailPct=0){
  if(currentMode!=='stock'){flashToast('Solo acciones soportan stop orders.',true);return;}
  const stock=allStocks.find(s=>s.sym===currentSym);
  if(!stock) return;
  const type = trailPct>0 ? 'trail' : 'stop';
  const order = { id:_stopOrderId++, sym:currentSym, side, stopPrice:+stopPrice, qty, type,
    trailPct, highWater:stock.price, status:'open', created:Date.now() };
  playerStopOrders.push(order);
  const label = type==='trail' ? `Trailing Stop ${trailPct}%` : `Stop Market @ ${stopPrice}`;
  flashToast(`${label} — ${side.toUpperCase()} ${qty}x ${currentSym} colocado`);
  renderOpenStopOrders();
}

function cancelStopOrder(id){
  playerStopOrders = playerStopOrders.filter(o=>o.id!==id);
  renderOpenStopOrders();
}

function checkStopOrderFills(){
  const open = playerStopOrders.filter(o=>o.status==='open');
  if(!open.length) return;
  open.forEach(o=>{
    const stock=allStocks.find(s=>s.sym===o.sym);
    if(!stock) return;
    const ob=orderBooks[stock.sym]; if(!ob) return;
    const bestAsk=ob.asks[0]?ob.asks[0].price:stock.price;
    const bestBid=ob.bids[0]?ob.bids[0].price:stock.price;
    // trailing: update high water and recalc stopPrice
    if(o.type==='trail'){
      if(o.side==='sell' && stock.price > o.highWater){
        o.highWater = stock.price;
        o.stopPrice = +(stock.price*(1-o.trailPct/100)).toFixed(2);
      }
      if(o.side==='buy' && stock.price < o.highWater){
        o.highWater = stock.price;
        o.stopPrice = +(stock.price*(1+o.trailPct/100)).toFixed(2);
      }
    }
    let triggered=false;
    if(o.side==='sell' && bestBid<=o.stopPrice) triggered=true;
    if(o.side==='buy'  && bestAsk>=o.stopPrice) triggered=true;
    if(triggered){
      o.status='filled';
      const fillPx=o.side==='sell'?bestBid:bestAsk;
      executeShareOrder(o.sym, o.side, o.qty, fillPx);
      addStockTapeEntry(o.sym, o.side, fillPx, o.qty, o.type==='trail'?'TRAIL':'STOP');
      flashToast(`🛑 Stop ${o.side.toUpperCase()} ${o.qty}x ${o.sym} @ ${fillPx.toFixed(2)} ejecutado!`, true);
    }
  });
  playerStopOrders = playerStopOrders.filter(o=>o.status==='open');
  renderOpenStopOrders();
}

function renderOpenStopOrders(){
  const el=document.getElementById('openStopsContainer');
  if(!el) return;
  const open=playerStopOrders.filter(o=>o.status==='open' && o.sym===currentSym);
  if(!open.length){
    el.innerHTML='<div style="font-size:9px;color:var(--text-dim);padding:3px 0">Sin stop orders</div>';
    return;
  }
  el.innerHTML=open.map(o=>`

      <span>${o.sym}</span>
      <span style="color:var(--ask)">${o.stopPrice.toFixed(2)}</span>

      <span style="color:var(--text-dim);font-size:8px">${o.side.toUpperCase()}</span>
      <button class="ol-cancel" onclick="cancelStopOrder(${o.id})">✕</button>
    </div>`).join('');
}

/* ===================================================================
   CONFIRMATION MODAL + BUY ALL / SELL ALL (Step 7) — the spec's two
   "institutional speed button" extremes: BUY ALL spends the entire cash
   balance on this contract, SELL ALL is the panic-liquidation button for
   whatever position the player currently holds in it. Both confirm
   first, per the chosen design, showing exactly what will happen.
   =================================================================== */
function showConfirmModal(title, bodyHtml, onConfirm){
  const overlay = document.getElementById('confirmOverlay');
  document.getElementById('confirmTitle').textContent = title;
  document.getElementById('confirmBody').innerHTML = bodyHtml;
  overlay.classList.add('open');
  const okBtn = document.getElementById('confirmOkBtn');
  const cancelBtn = document.getElementById('confirmCancelBtn');
  const cleanup = ()=>{ overlay.classList.remove('open'); okBtn.onclick=null; cancelBtn.onclick=null; };
  okBtn.onclick = ()=>{ cleanup(); onConfirm(); };
  cancelBtn.onclick = cleanup;
}
function confirmBuyAll(){
  if(currentMode !== 'stock'){ flashToast('Selecciona una acción (no un índice) para tradear opciones.', true); return; }
  const stock = allStocks.find(s=>s.sym===currentSym);
  const row = getOrInitContractState(stock, aotSelectedStrike, aotSelectedType, currentExpirationKey);
  const costPerContract = row.ask * OPTION_CONTRACT_MULTIPLIER;
  const maxQty = Math.floor(playerAccount.cashBalance / costPerContract);
  if(maxQty <= 0){ flashToast('Cash insuficiente para comprar ni 1 contrato.', true); return; }
  const totalCost = maxQty * costPerContract;
  showConfirmModal(
    '⚠ Confirmar BUY ALL',
    `Vas a comprar <b>${maxQty}</b> contratos de <b>${stock.sym} ${aotSelectedStrike}${aotSelectedType==='call'?'C':'P'}</b> @ ${row.ask.toFixed(2)}.<br><br>
     Costo total: <b>${fmtMoney(totalCost)}</b><br>
     Cash restante: <b>${fmtMoney(playerAccount.cashBalance-totalCost)}</b>`,
    ()=> fillOptionOrder(stock, aotSelectedStrike, aotSelectedType, 'buy', maxQty, 'ask')
  );
}
/* SHORT ALL margin model (Step B): each short contract requires posting 20% of its notional
   value (strike × 100) as margin collateral — a simplified but real constraint, distinct from
   BUY ALL which just spends cash outright on premium. */
const SHORT_MARGIN_PCT = 0.20;
function confirmShortAll(){
  if(currentMode !== 'stock'){ flashToast('Selecciona una acción (no un índice) para tradear opciones.', true); return; }
  const stock = allStocks.find(s=>s.sym===currentSym);
  const row = getOrInitContractState(stock, aotSelectedStrike, aotSelectedType, currentExpirationKey);
  const notionalPerContract = aotSelectedStrike * OPTION_CONTRACT_MULTIPLIER;
  const marginPerContract = notionalPerContract * SHORT_MARGIN_PCT;
  const maxQty = Math.floor(playerAccount.cashBalance / marginPerContract);
  if(maxQty <= 0){ flashToast('Cash insuficiente para abrir ni 1 contrato en corto (margen requerido).', true); return; }
  const creditReceived = maxQty * row.bid * OPTION_CONTRACT_MULTIPLIER;
  const marginHeld = maxQty * marginPerContract;
  showConfirmModal(
    '⚠ Confirmar SHORT ALL',
    `Vas a abrir <b>${maxQty}</b> contratos en CORTO de <b>${stock.sym} ${aotSelectedStrike}${aotSelectedType==='call'?'C':'P'}</b> @ ${row.bid.toFixed(2)}.<br><br>
     Margen requerido (20% nocional): <b>${fmtMoney(marginHeld)}</b><br>
     Premium cobrado (crédito): <b>${fmtMoney(creditReceived)}</b><br><br>
     <span style="color:var(--ask);">Riesgo: pérdida potencial ilimitada si el contrato se mueve fuertemente en tu contra.</span>`,
    ()=> fillOptionOrder(stock, aotSelectedStrike, aotSelectedType, 'sell', maxQty, 'bid', 'open')
  );
}
function confirmSellAll(){
  if(currentMode !== 'stock'){ flashToast('Selecciona una acción (no un índice) para tradear opciones.', true); return; }
  const stock = allStocks.find(s=>s.sym===currentSym);
  const posKey = optionContractKey(stock.sym, aotSelectedStrike, aotSelectedType, currentExpirationKey);
  const pos = playerAccount.optionPositions[posKey];
  if(!pos || !pos.qty){ flashToast('No tienes posición abierta en este contrato.', true); return; }
  const row = getOrInitContractState(stock, aotSelectedStrike, aotSelectedType, currentExpirationKey);
  const closeSide = pos.qty>0 ? 'sell' : 'buy';
  const closePrice = pos.qty>0 ? row.bid : row.ask;
  const qtyToClose = Math.abs(pos.qty);
  showConfirmModal(
    '🚨 Confirmar SELL ALL (Liquidación)',
    `Vas a cerrar TODA tu posición: <b>${pos.qty}</b> contratos de <b>${stock.sym} ${aotSelectedStrike}${aotSelectedType==='call'?'C':'P'}</b> @ ${closePrice.toFixed(2)}.<br><br>
     Esto liquida la posición de inmediato al mejor precio disponible.`,
    ()=> {
      executeOptionOrder(stock.sym, aotSelectedStrike, aotSelectedType, currentExpirationKey, closeSide, 'close', qtyToClose, closePrice);
      logOptionFlowEntry({ sym: stock.sym, strike: aotSelectedStrike, optType: aotSelectedType, expiryKey: currentExpirationKey, qty: qtyToClose, premium: closePrice, side: closeSide==='sell'?'BID':'ASK', isPlayer: true });
      flashToast(`Liquidado: ${qtyToClose}x ${stock.sym} ${aotSelectedStrike}${aotSelectedType==='call'?'C':'P'} @ ${closePrice.toFixed(2)}`);
      renderAllData(); schedulePersist();
    }
  );
}

function flashToast(msg, isError){
  const n = document.createElement('div');
  n.style.position='fixed'; n.style.bottom='16px'; n.style.left='50%'; n.style.transform='translateX(-50%)';
  n.style.zIndex='2000'; n.style.background = isError ? '#2A1015' : 'var(--panel-elevated)';
  n.style.color = isError ? 'var(--ask)' : 'var(--bid)'; n.style.fontWeight='600';
  n.style.padding='8px 16px'; n.style.borderRadius='6px'; n.style.fontFamily='var(--mono)'; n.style.fontSize='11px';
  n.style.border = '1px solid ' + (isError ? 'var(--ask)' : 'var(--bid)');
  n.textContent = msg;
  document.body.appendChild(n);
  setTimeout(()=> n.remove(), 2000);
}
function renderAccountPanel(){

    const stock = allStocks.find(s=>s.sym===pos.sym);
    const chain = stock ? genOptionChainForStock(stock, pos.expiryKey) : [];
    const row = chain.find(r=>r.strike===pos.strike && r.optType===pos.optType);
    const mark = row ? (pos.qty>0?row.bid:row.ask) : pos.avgPrice;
    const pl = (pos.qty>0 ? (mark-pos.avgPrice) : (pos.avgPrice-mark)) * Math.abs(pos.qty) * OPTION_CONTRACT_MULTIPLIER;
    const isShort = pos.qty < 0;

  acctPositions.innerHTML = `<div style="font-size:9px; color:var(--text-dim); text-transform:uppercase; margin-bottom:6px;">Posiciones Abiertas</div>` +
    (stockRows + optionRows || `<div style="font-size:10.5px; color:var(--text-dim); padding:10px 0;">Sin posiciones abiertas todavía. Usa el Active Trader o el Option Chain para tradear.</div>`);
}

/* Sector Sentiment — global gauge. Until the options flow engine (Step 1+) exists, this is
   proxied from the aggregate price-change bias across the whole stock universe; once option
   order flow is real, this should be re-derived from put/call aggressive-buy imbalance instead,
   the same causal pattern used everywhere else in this build. */
function computeGlobalSentiment(){
  // re-roll each stock's daily change deterministically-ish per render so this feels alive
  let sumChg = 0;
  allStocks.forEach(s=>{
    if(s._sentimentChg == null) s._sentimentChg = (Math.random()*4-1.5);
    sumChg += s._sentimentChg;
  });
  const avgChg = sumChg / allStocks.length;
  // map avg % change to a -100..+100 sentiment score, clamped
  const score = Math.max(-100, Math.min(100, avgChg * 40));
  return { score, avgChg };
}
/* ===================================================================
   OPTION CHAIN RENDER — header drag-to-reorder (Excel-style), call/put
   side-by-side rows around a sticky strike column.
   =================================================================== */
/* Subtle heat indicator for the Volume column (Step A) — replaces the prohibited bright yellow
   border. Background opacity fades smoothly over ~4 seconds from a recent aggressive ask-hit,
   using a CSS transition so it visibly "flashes and settles" rather than snapping on/off. No
   badge, no border, no simplistic call-out — just a quiet glow that rewards someone actually
   watching the tape, exactly as the spec asks. */
function heatBgStyleFor(row){
  const lastHit = row.lastAskHitAt || 0;
  if(!lastHit) return '';
  const ageMs = Date.now() - lastHit;
  const HEAT_WINDOW_MS = 4000;
  if(ageMs > HEAT_WINDOW_MS) return '';
  const intensity = Math.max(0, 1 - ageMs/HEAT_WINDOW_MS) * 0.32; // caps at a subtle 32% opacity, never garish
  return `background:rgba(63,191,127,${intensity.toFixed(3)}); transition:background-color 1.2s ease-out;`;
}
function renderOptionChain(stock){
  const ocTable = document.getElementById('ocTable');
  if(!ocTable) return;
  if(!stock){
    ocTable.innerHTML = `<div style="padding:30px; text-align:center; color:var(--text-dim); font-size:11px;">Selecciona una acción (no un índice) para ver su Option Chain.</div>`;
    return;
  }
  const rows = genOptionChainForStock(stock, currentExpirationKey);
  const strikes = [...new Set(rows.map(r=>r.strike))].sort((a,b)=>a-b);
  const visibleCols = optionColumnOrder.filter(k=>optionColumnVisible[k]);
  const colsByKey = {}; OPTION_COLUMNS.forEach(c=> colsByKey[c.key]=c);
  const nearestStrike = strikes.reduce((a,b)=> Math.abs(b-stock.price)<Math.abs(a-stock.price)?b:a);

  // Histogram of accumulated OI per strike (call+put combined) — visual support for Step 8's
  // "wall of historical liquidity" feature, scaled against the busiest strike currently in view.
  const oiByStrike = {};
  strikes.forEach(s=>{
    const c = rows.find(r=>r.strike===s && r.optType==='call');
    const p = rows.find(r=>r.strike===s && r.optType==='put');
    oiByStrike[s] = (c?c.openInterest:0) + (p?p.openInterest:0);
  });
  const maxStrikeOI = Math.max(1, ...Object.values(oiByStrike));

  // Money-flow gauge — instead of a bare volume ranking, this shows WHICH side of the tape is
  // actually winning right now: aggregate aggressive-buy vs aggressive-sell volume, split by
  // calls vs puts, so the player can read direction at a glance instead of guessing from raw counts.
  const flowContainer = document.getElementById('ocFlowBar');
  if(flowContainer){
    const callBuy = rows.filter(r=>r.optType==='call').reduce((a,r)=>a+r.buyVolume,0);
    const callSell = rows.filter(r=>r.optType==='call').reduce((a,r)=>a+r.sellVolume,0);
    const putBuy = rows.filter(r=>r.optType==='put').reduce((a,r)=>a+r.buyVolume,0);
    const putSell = rows.filter(r=>r.optType==='put').reduce((a,r)=>a+r.sellVolume,0);
    const callTotal = Math.max(1, callBuy+callSell), putTotal = Math.max(1, putBuy+putSell);
    const callBuyPct = (callBuy/callTotal)*100, putBuyPct = (putBuy/putTotal)*100;
    const netBullish = (callBuy + putSell) - (callSell + putBuy); // buying calls + selling puts = bullish money
    flowContainer.innerHTML = `
      <div class="oc-flow-row">
        <span class="oc-flow-lbl call">CALLS</span>
        <div class="oc-flow-track"><div class="oc-flow-fill buy" style="width:${callBuyPct}%"></div></div>
        <span class="oc-flow-nums"><span style="color:var(--bid)">${fmtVol(callBuy)} compra</span> / <span style="color:var(--ask)">${fmtVol(callSell)} venta</span></span>
      </div>
      <div class="oc-flow-row">
        <span class="oc-flow-lbl put">PUTS</span>
        <div class="oc-flow-track"><div class="oc-flow-fill buy" style="width:${putBuyPct}%"></div></div>
        <span class="oc-flow-nums"><span style="color:var(--bid)">${fmtVol(putBuy)} compra</span> / <span style="color:var(--ask)">${fmtVol(putSell)} venta</span></span>
      </div>
      <div class="oc-flow-verdict ${netBullish>=0?'bullish':'bearish'}">
        Flujo neto: ${netBullish>=0?'▲ ALCISTA':'▼ BAJISTA'} (${netBullish>=0?'+':''}${fmtVol(Math.abs(netBullish))})
      </div>`;
  }

  // header: call columns (reversed so nearest-strike-relevant order reads naturally) | STRIKE | put columns
  let header = '<div class="oc-header-row">';
  header += '<div class="oc-header-cell oc-trade-cell" style="cursor:default;">Trade</div>';
  visibleCols.slice().reverse().forEach(key=> header += `<div class="oc-header-cell" draggable="true" data-colkey="${key}" data-side="call">${colsByKey[key].label}</div>`);
  header += '<div class="oc-header-cell strike-col">Strike</div>';
  visibleCols.forEach(key=> header += `<div class="oc-header-cell" draggable="true" data-colkey="${key}" data-side="put">${colsByKey[key].label}</div>`);
  header += '<div class="oc-header-cell oc-trade-cell" style="cursor:default;">Trade</div>';
  header += '</div>';

  let body = '';
  strikes.forEach(strike=>{
    const callRow = rows.find(r=>r.strike===strike && r.optType==='call');
    const putRow = rows.find(r=>r.strike===strike && r.optType==='put');
    const isATM = strike === nearestStrike;
    // ITM/OTM shading: calls are ITM at-or-below spot, puts are ITM at-or-above spot — re-evaluated
    // every render against the live spot price, so the purple frontier moves with the stock in real time.
    const callIsITM = strike <= stock.price;
    const putIsITM = strike >= stock.price;
    body += '<div class="oc-row">';
    body += `<div class="oc-cell oc-trade-cell ${callIsITM?'itm-cell':''}">${callRow?`<input type="checkbox" class="oc-leg-check" data-strike="${strike}" data-opttype="call" ${isLegSelected(strike,'call')?'checked':''}><button class="oc-trade-btn buy" data-strike="${strike}" data-opttype="call">B</button><button class="oc-trade-btn sell" data-strike="${strike}" data-opttype="call">S</button>`:''}</div>`;
    visibleCols.slice().reverse().forEach(key=>{
      const col = colsByKey[key];
      const val = callRow ? col.fmt(callRow) : '';
      const color = callRow && col.color ? col.color(callRow) : '';
      const heatStyle = (key==='volume' && callRow) ? heatBgStyleFor(callRow) : '';
      body += `<div class="oc-cell oc-clickable ${callIsITM?'itm-cell':''}" data-strike="${strike}" data-opttype="call" style="${color?'color:'+color+';':''}${heatStyle}">${val}</div>`;
    });
    const isAccumulating = (callRow && callRow.accumulating) || (putRow && putRow.accumulating);
    const isNewMoney = (callRow && callRow.isNewMoney) || (putRow && putRow.isNewMoney);
    const oiPct = Math.max(2, Math.round((oiByStrike[strike]/maxStrikeOI)*100));
    body += `<div class="oc-cell strike-cell ${isATM?'atm':''}" title="${isNewMoney?'Volumen > Open Interest inicial · ':''}OI total: ${fmtVol(oiByStrike[strike])}">
      <div class="oc-oi-hist-bar" style="width:${oiPct}%"></div>
      <span class="oc-strike-label">${strike.toFixed(2)}${isAccumulating?'<span class="oc-accum-badge" title="Acumulación detectada">ACC</span>':''}</span>
    </div>`;
    visibleCols.forEach(key=>{
      const col = colsByKey[key];
      const val = putRow ? col.fmt(putRow) : '';
      const color = putRow && col.color ? col.color(putRow) : '';
      const heatStyle = (key==='volume' && putRow) ? heatBgStyleFor(putRow) : '';
      body += `<div class="oc-cell oc-clickable ${putIsITM?'itm-cell':''}" data-strike="${strike}" data-opttype="put" style="${color?'color:'+color+';':''}${heatStyle}">${val}</div>`;
    });
    body += `<div class="oc-cell oc-trade-cell">${putRow?`<input type="checkbox" class="oc-leg-check" data-strike="${strike}" data-opttype="put" ${isLegSelected(strike,'put')?'checked':''}><button class="oc-trade-btn buy" data-strike="${strike}" data-opttype="put">B</button><button class="oc-trade-btn sell" data-strike="${strike}" data-opttype="put">S</button>`:''}</div>`;
    body += '</div>';
  });

  ocTable.innerHTML = header + body;
  setupOptionColumnDrag(ocTable);
  // Remove previous delegated listener to prevent stacking
  if(ocTable._ocClickHandler){
    ocTable.removeEventListener('click', ocTable._ocClickHandler);
    ocTable._ocClickHandler = null;
  }
  ocTable.querySelectorAll('.oc-leg-check').forEach(cb=>{
    cb.addEventListener('change', (e)=>{
      e.stopPropagation();
      toggleSpreadLeg(+cb.dataset.strike, cb.dataset.opttype);
    });
  });
  ocTable.querySelectorAll('.oc-trade-btn').forEach(btn=>{
    btn.addEventListener('click', (e)=>{
      e.stopPropagation();
      const side = btn.classList.contains('buy') ? 'buy' : 'sell';
      const strike = +btn.dataset.strike;
      const optType = btn.dataset.opttype;
      fillOptionOrder(stock, strike, optType, side);
    });
  });
  // Event delegation — survives innerHTML re-renders
  // Remove old listener first to avoid duplicates
  ocTable._ocClickHandler && ocTable.removeEventListener('click', ocTable._ocClickHandler);
  ocTable._ocClickHandler = function(e){
    // Find the closest .oc-clickable parent
    const cell = e.target.closest('.oc-clickable');
    if(!cell) return;
    // Don't trigger if clicking a button or checkbox inside the cell
    if(e.target.closest('.oc-trade-btn') || e.target.closest('.oc-leg-check')) return;
    e.stopPropagation();
    openContractPopup(stock, +cell.dataset.strike, cell.dataset.opttype);
  };
  ocTable.addEventListener('click', ocTable._ocClickHandler);
}
/* ===================================================================
   ROUTING SELECTORS (Step B) — the player picks SWEEP/BLOCK/SPLIT/NORMAL
   before sending an order. This changes how the fill is classified and,
   for SPLIT, actually fragments the order into several sub-fills printed
   in quick succession instead of one single execution.
   =================================================================== */
let selectedRouting = 'normal'; // 'normal' | 'sweep' | 'block' | 'split'

/* ===================================================================
   CUSTOM SPREAD BUILDER (Step F) — the player checks legs directly in
   the Option Chain (any combination of strikes/types/sides), and the
   Risk Profile tab analyzes whatever is currently checked. Each entry
   tracks side so the SAME leg can be marked as a buy or a sell.
   =================================================================== */
let spreadBuilderLegs = []; // [{strike, optType, side, qty}]
function isLegSelected(strike, optType){
  return spreadBuilderLegs.some(l=>l.strike===strike && l.optType===optType);
}
function toggleSpreadLeg(strike, optType){
  const idx = spreadBuilderLegs.findIndex(l=>l.strike===strike && l.optType===optType);
  if(idx>=0){ spreadBuilderLegs.splice(idx,1); }
  else { spreadBuilderLegs.push({ strike, optType, side:'buy', qty:1 }); }
  renderAllData();
}
function setSpreadLegSide(strike, optType, side){
  const leg = spreadBuilderLegs.find(l=>l.strike===strike && l.optType===optType);
  if(leg){ leg.side = side; renderAllData(); }
}
function clearSpreadBuilder(){ spreadBuilderLegs = []; renderAllData(); }

/* Execute Spread (missing piece from the Risk Profile flow) — sends EVERY checked leg as a real
   order in one consolidated action, using the same executeOptionOrder/logOptionFlowEntry path
   each individual leg would use (so volume, OI, account, and the Option Flow Stream all update
   exactly like they would for separate trades) — just bundled under one confirmation. */
function confirmExecuteSpread(){
  if(currentMode !== 'stock'){ flashToast('Selecciona una acción (no un índice) para ejecutar el spread.', true); return; }
  if(!spreadBuilderLegs.length){ flashToast('No hay legs seleccionados para ejecutar.', true); return; }
  const stock = allStocks.find(s=>s.sym===currentSym);
  const legs = buildAnalysisLegs(stock); // pulls live bid/ask + iv per leg, same as the analyzer uses
  let netCashFlow = 0; // negative = net debit (costs cash), positive = net credit (receives cash)
  const legSummaries = legs.map(l=>{
    const cashFlow = (l.side==='buy' ? -1 : 1) * l.entryPrice * l.qty * OPTION_CONTRACT_MULTIPLIER;
    netCashFlow += cashFlow;
    return `${l.side==='buy'?'Compra':'Venta'} ${l.qty}x ${stock.sym} ${l.strike}${l.optType==='call'?'C':'P'} @ ${l.entryPrice.toFixed(2)}`;
  });
  if(netCashFlow < 0 && Math.abs(netCashFlow) > playerAccount.cashBalance){
    flashInsufficientCashAlert(Math.abs(netCashFlow));
    return;
  }
  showConfirmModal(
    '⚡ Confirmar Ejecución de Spread',
    `Vas a ejecutar ${legs.length} legs de una vez:<br><br>
     ${legSummaries.join('<br>')}<br><br>
     ${netCashFlow<0 ? 'Débito neto' : 'Crédito neto'}: <b style="color:${netCashFlow<0?'var(--ask)':'var(--bid)'};">${fmtMoney(Math.abs(netCashFlow))}</b>`,
    ()=> executeSpreadOrder(stock, legs)
  );
}
function executeSpreadOrder(stock, legs){
  legs.forEach(l=>{
    executeOptionOrder(stock.sym, l.strike, l.optType, currentExpirationKey, l.side, 'open', l.qty, l.entryPrice);
    logOptionFlowEntry({ sym: stock.sym, strike: l.strike, optType: l.optType, expiryKey: currentExpirationKey, qty: l.qty, premium: l.entryPrice, side: l.side==='buy'?'ASK':'BID', isPlayer: true, printClass: 'STRAT_SWEEP' });
  });
  flashToast(`Spread ejecutado: ${legs.length} legs en ${stock.sym}.`);
  renderAllData();
  schedulePersist();
}


function renderSpreadBuilderList(){
  const listEl = document.getElementById('rpLegsList');
  if(!listEl) return;
  if(!spreadBuilderLegs.length){
    listEl.innerHTML = `<div class="rp-builder-empty">Sin legs seleccionados. Marca el checkbox junto a cualquier strike en el Option Chain.</div>`;

        <button class="${leg.side==='sell'?'active sell':''}" data-strike="${leg.strike}" data-opttype="${leg.optType}" data-side="sell">SELL</button>
      </div>
      <input type="number" class="rp-leg-qty" data-strike="${leg.strike}" data-opttype="${leg.optType}" value="${leg.qty}" min="1" style="width:40px; background:var(--panel-elevated); border:1px solid var(--border); color:var(--amber); font-family:var(--mono); font-size:10px; padding:2px 4px; border-radius:3px;">
      <button class="rp-leg-remove" data-strike="${leg.strike}" data-opttype="${leg.optType}">✕</button>
    </div>`).join('');
  listEl.querySelectorAll('.rp-leg-side-toggle button').forEach(btn=>{
    btn.addEventListener('click', ()=> setSpreadLegSide(+btn.dataset.strike, btn.dataset.opttype, btn.dataset.side));
  });
  listEl.querySelectorAll('.rp-leg-qty').forEach(inp=>{
    inp.addEventListener('change', ()=>{
      const leg = spreadBuilderLegs.find(l=>l.strike===+inp.dataset.strike && l.optType===inp.dataset.opttype);
      if(leg) leg.qty = Math.max(1, parseInt(inp.value)||1);
    });
  });
  listEl.querySelectorAll('.rp-leg-remove').forEach(btn=>{
    btn.addEventListener('click', ()=> toggleSpreadLeg(+btn.dataset.strike, btn.dataset.opttype));
  });
}

/* Builds the actual leg objects (with entry price + IV pulled from live contract state) the
   math engine needs, from whatever the player currently has checked in the Option Chain. */
function getSpreadMultiplier(){
  const inp = document.getElementById('rpSpreadMultiplier');
  return inp ? Math.max(1, parseInt(inp.value)||1) : 1;
}
function buildAnalysisLegs(stock){
  const multiplier = getSpreadMultiplier();
  return spreadBuilderLegs.map(sel=>{
    const row = getOrInitContractState(stock, sel.strike, sel.optType, currentExpirationKey);
    const entryPrice = sel.side==='buy' ? row.ask : row.bid;
    return { strike: sel.strike, optType: sel.optType, side: sel.side, qty: sel.qty*multiplier, entryPrice, iv: row.iv };
  });
}
function renderRiskProfileChart(){
  const svgEl = document.getElementById('rpChartSvg');
  const metaEl = document.getElementById('rpMetaRow');
  const metricsEl = document.getElementById('rpMetricsGrid');
  if(!svgEl) return;
  if(currentMode !== 'stock'){
    svgEl.innerHTML = `<text x="50%" y="50%" text-anchor="middle" fill="var(--text-dim)" font-size="11">Selecciona una acción para analizar.</text>`;
    return;
  }
  if(!spreadBuilderLegs.length){
    svgEl.innerHTML = `<text x="50%" y="50%" text-anchor="middle" fill="var(--text-dim)" font-size="11">Marca al menos un leg en el Option Chain y presiona Analizar.</text>`;
    if(metaEl) metaEl.innerHTML = '';
    if(metricsEl) metricsEl.innerHTML = '';
    return;
  }
  const stock = allStocks.find(s=>s.sym===currentSym);
  const legs = buildAnalysisLegs(stock);
  const expiry = EXPIRATIONS.find(e=>e.key===currentExpirationKey);
  // real time-remaining (DTE Physics) — ties directly into the actual game clock/calendar so the
  // T+0 line genuinely decays as the 15-minute session advances, merging into the solid line at 0DTE
  const sessionFractionElapsed = isPreMarket() ? 0 : currentDayProgress();
  const minutesRemainingToday = expiry.minutesToExpiry * (1 - sessionFractionElapsed);
  const tYearsRemaining = Math.max(0.000001, minutesRemainingToday / (60*24*365));

  const { expirationCurve, t0Curve } = computeRiskProfileCurve(legs, tYearsRemaining, stock.price, 0.25);
  const { maxProfit, maxLoss } = computeMaxProfitLoss(legs, stock.price, 0.25);
  const breakEvens = computeBreakEvens(legs, stock.price, 0.25);

  if(metaEl) metaEl.innerHTML = `
    <span>Expiración: <b style="color:#fff;">${expiry.label}</b></span>
    <span>Tiempo restante: <b style="color:var(--amber);">${minutesRemainingToday.toFixed(1)} min</b></span>
    <span>Legs: <b style="color:#fff;">${legs.length}</b></span>`;

  // SVG render: cartesian plane, X = spot price, Y = PnL ($), with a zero line and both curves
  const w=560, h=240, padL=46, padR=10, padT=14, padB=24;
  const plotW = w-padL-padR, plotH = h-padT-padB;
  const allPnls = [...expirationCurve.map(p=>p.pnl), ...t0Curve.map(p=>p.pnl)];
  const minY = Math.min(0, ...allPnls), maxY = Math.max(0, ...allPnls);
  const padY = (maxY-minY)*0.1 || 10;
  const yMin = minY-padY, yMax = maxY+padY;
  const minX = expirationCurve[0].spot, maxX = expirationCurve[expirationCurve.length-1].spot;
  const xPix = spot => padL + ((spot-minX)/(maxX-minX))*plotW;
  const yPix = pnl => padT + (1-((pnl-yMin)/(yMax-yMin)))*plotH;

  let svg = '';
  // zero line
  const zeroY = yPix(0);
  svg += `<line x1="${padL}" y1="${zeroY}" x2="${w-padR}" y2="${zeroY}" stroke="var(--text-dim)" stroke-width="1" opacity="0.5"/>`;
  // current spot marker
  const spotX = xPix(stock.price);
  svg += `<line x1="${spotX}" y1="${padT}" x2="${spotX}" y2="${h-padB}" stroke="var(--amber)" stroke-width="1" stroke-dasharray="2,3" opacity="0.6"/>`;
  // expiration curve (solid)
  let expPath = expirationCurve.map((p,i)=> (i===0?'M':'L')+xPix(p.spot).toFixed(1)+','+yPix(p.pnl).toFixed(1)).join(' ');
  svg += `<path d="${expPath}" fill="none" stroke="var(--amber)" stroke-width="2"/>`;
  // T+0 curve (dashed) — merges visually with the solid line as time runs out
  let t0Path = t0Curve.map((p,i)=> (i===0?'M':'L')+xPix(p.spot).toFixed(1)+','+yPix(p.pnl).toFixed(1)).join(' ');
  svg += `<path d="${t0Path}" fill="none" stroke="var(--blue)" stroke-width="1.5" stroke-dasharray="4,3"/>`;
  // break-even markers
  breakEvens.forEach(be=>{
    const bx = xPix(be);
    if(bx>=padL && bx<=w-padR) svg += `<circle cx="${bx}" cy="${zeroY}" r="3" fill="#fff" stroke="var(--text-dim)"/>`;
  });
  // axis labels (a few price ticks)
  for(let i=0;i<=4;i++){
    const spot = minX + (maxX-minX)*(i/4);
    svg += `<text x="${xPix(spot)}" y="${h-6}" font-size="8" fill="var(--text-dim)" text-anchor="middle" font-family="monospace">${spot.toFixed(0)}</text>`;
  }
  svg += `<text x="2" y="${zeroY+3}" font-size="8" fill="var(--text-dim)" font-family="monospace">$0</text>`;
  svgEl.setAttribute('viewBox', `0 0 ${w} ${h}`);
  svgEl.innerHTML = svg;

  if(metricsEl) metricsEl.innerHTML = `
    <div class="rp-metric"><div class="rpm-lbl">Max Profit</div><div class="rpm-val" style="color:var(--bid);">${maxProfit===Infinity?'∞':fmtMoney(maxProfit)}</div></div>
    <div class="rp-metric"><div class="rpm-lbl">Max Loss</div><div class="rpm-val" style="color:var(--ask);">${maxLoss===-Infinity?'-∞':fmtMoney(maxLoss)}</div></div>
    <div class="rp-metric"><div class="rpm-lbl">Break-Even</div><div class="rpm-val">${breakEvens.length?breakEvens.join(' / '):'—'}</div></div>`;
}

function routingPrintClass(routing){
  if(routing==='sweep') return 'SWEEP';
  if(routing==='block') return 'BLOCK';
  if(routing==='split') return 'SPLIT';
  return 'NORMAL';
}
function fillOptionOrder(stock, strike, optType, side, qty, forcePriceMode, action){
  qty = qty || 1;
  action = action || 'open';

  // When CLOSING a position (selling what we own, or buying back a short), the contract MUST
  // exist regardless of whether its strike is still in the visible chain window — after a big
  // move the strike can fall outside the ±12 visible strikes while the position is still open.
  // So for close actions, look directly in optionMarketState first (the persistent source of
  // truth), falling back to the chain only for opens where the contract might not exist yet.
  let row;
  const contractKey = contractStateKey(stock.sym, strike, optType, currentExpirationKey);
  const persistentRow = optionMarketState[contractKey];
  if(persistentRow){
    row = persistentRow;
    // make sure bid/ask are fresh (tick it forward once so prices aren't stale)
    tickOptionContract(stock, strike, optType, currentExpirationKey);
    row = optionMarketState[contractKey]; // re-read after tick
  } else {
    // contract not yet initialized — generate from chain (only valid for opening new positions)
    const chain = genOptionChainForStock(stock, currentExpirationKey);
    const chainRow = chain.find(r=>r.strike===strike && r.optType===optType);
    if(!chainRow){
      flashToast(`No se encontró el contrato ${stock.sym} ${strike}${optType==='call'?'C':'P'} — puede que el strike ya no esté en el chain activo.`, true);
      return;
    }
    row = chainRow;
  }

  const priceMode = forcePriceMode || (side==='buy' ? 'ask' : 'bid');
  const price = priceMode === 'ask' ? row.ask : row.bid;
  const forcedClass = selectedRouting !== 'normal' ? routingPrintClass(selectedRouting) : null; // 'normal' lets the system auto-classify by size, same as before this step

  if(side==='buy' && action==='open'){
    const cost = qty*price*OPTION_CONTRACT_MULTIPLIER;
    if(cost > playerAccount.cashBalance){ flashInsufficientCashAlert(cost); return; }
  }

  if(selectedRouting === 'split' && qty > 1){
    // SPLIT: fragment the order into several smaller sub-fills across "multiple exchanges",
    // each printing its own Time & Sales / Option Flow row in quick succession.
    const numLegs = Math.min(qty, 3 + Math.floor(Math.random()*3)); // 3-5 fragments
    const legSizes = splitQtyIntoLegs(qty, numLegs);
    legSizes.forEach((legQty, i)=>{
      setTimeout(()=>{
        executeOptionOrder(stock.sym, strike, optType, currentExpirationKey, side, action, legQty, price);
        logOptionFlowEntry({ sym: stock.sym, strike, optType, expiryKey: currentExpirationKey, qty: legQty, premium: price, side: priceMode.toUpperCase(), isPlayer: true, printClass: 'SPLIT' });
        renderAllData();
      }, i*120); // a few hundred ms apart, fast but visibly staggered
    });
    flashToast(`SPLIT: ${qty}x ${stock.sym} ${strike}${optType==='call'?'C':'P'} fragmentado en ${numLegs} órdenes.`);
  } else {
    const result = executeOptionOrder(stock.sym, strike, optType, currentExpirationKey, side, action, qty, price);
    if(result === null){
      flashToast('No tienes posición abierta en este contrato para vender.', true);
      return;
    }
    logOptionFlowEntry({ sym: stock.sym, strike, optType, expiryKey: currentExpirationKey, qty, premium: price, side: priceMode.toUpperCase(), isPlayer: true, printClass: forcedClass });
    flashToast(`${side==='buy'?'Compra':'Venta'} ${qty}x ${stock.sym} ${strike}${optType==='call'?'C':'P'} @ ${price.toFixed(2)} (${priceMode.toUpperCase()}${forcedClass?' · '+forcedClass:''})`);
  }
  renderAllData();
  schedulePersist();
}
function splitQtyIntoLegs(totalQty, numLegs){
  const base = Math.floor(totalQty/numLegs);
  const legs = Array.from({length:numLegs}, ()=>base);
  legs[legs.length-1] += totalQty - base*numLegs; // remainder goes to the last leg
  return legs.filter(q=>q>0);
}

  popup.querySelector('.cp-buy-all').onclick = ()=>{
    const row = getOrInitContractState(stock, strike, optType, currentExpirationKey);
    const maxQty = Math.floor(playerAccount.cashBalance / (row.ask * 100));
    if(maxQty < 1){ flashToast('Cash insuficiente para BUY ALL', true); return; }
    fillOptionOrder(stock, strike, optType, 'buy', maxQty, 'ask', 'open');
    refreshContractPopup(stock, strike, optType, sid);
  };
  popup.querySelector('.cp-sell-all').onclick = ()=>{
    const p = pos();
    const qty = p && p.qty > 0 ? p.qty : getQty();
    fillOptionOrder(stock, strike, optType, 'sell', qty, 'bid', p && p.qty>0 ? 'close':'open');
    refreshContractPopup(stock, strike, optType, sid);
  };
  popup.querySelector('.cp-close-pos').onclick = ()=>{
    const p = pos();
    if(!p || p.qty===0){ flashToast('Sin posición para cerrar', false); return; }
    const closeSide = p.qty>0 ? 'sell' : 'buy';
    fillOptionOrder(stock, strike, optType, closeSide, Math.abs(p.qty), p.qty>0?'bid':'ask', 'close');
    refreshContractPopup(stock, strike, optType, sid);
  };

  // ── Draggable ───────────────────────────────────────────────────
  makePopupDraggable(popup, popup.querySelector('.cp-header'));

  // ── Chart render ─────────────────────────────────────────────────
  setTimeout(()=>{
    const svgEl = document.getElementById('cpChartSvg-'+sid);
    if(svgEl){
      optionPriceTickHistory[key] = null;
      const candles = buildOptionCandlesForTimeframe(key, getOrInitContractState(stock,strike,optType,currentExpirationKey), '5m');
      if(candles.length) renderChartSVG(svgEl, candles, 'med');
    }
  }, 80);

  // ── Interval refresh ────────────────────────────────────────────
  const interval = setInterval(()=> refreshContractPopup(stock, strike, optType, sid), ENGINE_TICK_MS);
  openContractPopups[key] = { el:popup, interval, timeframe:'5m' };
  refreshContractPopup(stock, strike, optType, sid);
}

  const bidEl  = document.getElementById('cpBid-'+safeId);

let draggedColKey = null;
function setupOptionColumnDrag(ocTable){
  const headerCells = ocTable.querySelectorAll('.oc-header-cell[draggable="true"]');
  headerCells.forEach(cell=>{
    cell.addEventListener('dragstart', ()=>{ draggedColKey = cell.dataset.colkey; cell.classList.add('dragging-col'); });
    cell.addEventListener('dragend', ()=> cell.classList.remove('dragging-col'));
    cell.addEventListener('dragover', (e)=>{ e.preventDefault(); cell.classList.add('drag-over-col'); });
    cell.addEventListener('dragleave', ()=> cell.classList.remove('drag-over-col'));
    cell.addEventListener('drop', (e)=>{
      e.preventDefault();
      cell.classList.remove('drag-over-col');
      const targetKey = cell.dataset.colkey;
      if(!draggedColKey || draggedColKey === targetKey) return;
      const fromIdx = optionColumnOrder.indexOf(draggedColKey);
      const toIdx = optionColumnOrder.indexOf(targetKey);
      optionColumnOrder.splice(fromIdx, 1);
      optionColumnOrder.splice(toIdx, 0, draggedColKey);
      renderAllData();
    });
  });
}
